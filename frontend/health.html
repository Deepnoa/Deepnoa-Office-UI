<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health — Deepnoa AI Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07111d;
      --panel: rgba(10, 20, 35, 0.82);
      --line: rgba(130, 164, 214, 0.18);
      --text: #eef6ff;
      --muted: #8ea4c1;
      --accent: #82f2cb;
      --warn: #ffd08a;
      --danger: #ff7a7a;
      --shadow: 0 4px 32px rgba(0,0,0,0.32);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(50, 110, 192, 0.18), transparent 40%),
        linear-gradient(180deg, #0a1422 0%, #07111d 60%, #060e18 100%);
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 17, 29, 0.72);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-logo { font-weight: 700; font-size: 15px; color: var(--accent); margin-right: auto; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    nav a.active { color: var(--text); background: rgba(255,255,255,0.07); }

    /* Layout */
    main { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }

    /* Page header */
    .page-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
    }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .poll-badge {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      margin-left: auto;
    }
    .last-updated {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }

    /* Overall status banner */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-radius: 12px;
      border: 1px solid var(--line);
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.3s, border-color 0.3s;
    }
    .status-banner .banner-icon { font-size: 22px; }
    .status-banner .banner-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }
    .banner-ok {
      background: rgba(130,242,203,0.07);
      border-color: rgba(130,242,203,0.25);
      color: var(--accent);
    }
    .banner-degraded {
      background: rgba(255,208,138,0.07);
      border-color: rgba(255,208,138,0.25);
      color: var(--warn);
    }
    .banner-error {
      background: rgba(255,122,122,0.08);
      border-color: rgba(255,122,122,0.25);
      color: var(--danger);
    }
    .banner-loading {
      background: var(--panel);
      border-color: var(--line);
      color: var(--muted);
    }

    /* Cards */
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 20px 22px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    /* Run stat chips */
    .run-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .run-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }
    .run-chip .chip-count {
      font-size: 22px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
    }
    .run-chip .chip-label { font-size: 12px; color: var(--muted); }
    .chip-done .chip-count   { color: var(--accent); }
    .chip-running .chip-count{ color: var(--warn); }
    .chip-failed .chip-count { color: var(--danger); }
    .chip-queued .chip-count { color: var(--muted); }

    /* Latest failed run */
    .failed-run-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,122,122,0.06);
      border: 1px solid rgba(255,122,122,0.18);
      border-radius: 8px;
      font-size: 13px;
    }
    .failed-run-id {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }
    .failed-run-id:hover { text-decoration: underline; }
    .failed-run-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      white-space: nowrap;
    }
    .failed-run-msg {
      font-size: 12px;
      color: var(--danger);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* All-clear message */
    .all-clear {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--accent);
      padding: 8px 0;
    }

    /* Connector rows */
    .connector-list { display: flex; flex-direction: column; gap: 8px; }
    .connector-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      font-size: 13px;
    }
    .connector-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-connected { background: var(--accent); }
    .dot-degraded  { background: var(--warn); }
    .dot-error     { background: var(--danger); }
    .dot-offline   { background: var(--muted); }
    .connector-name { font-weight: 500; min-width: 160px; }
    .connector-status {
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .cs-connected { background: rgba(130,242,203,0.12); color: var(--accent); }
    .cs-degraded  { background: rgba(255,208,138,0.15); color: var(--warn); }
    .cs-error     { background: rgba(255,122,122,0.15); color: var(--danger); }
    .cs-offline   { background: rgba(142,164,193,0.12); color: var(--muted); }
    .connector-sync {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      margin-left: auto;
    }
    .connector-pending {
      font-size: 11px;
      color: var(--warn);
      font-family: "IBM Plex Mono", monospace;
    }

    /* Alert rows */
    .alert-list { display: flex; flex-direction: column; gap: 8px; }
    .alert-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,122,122,0.2);
      background: rgba(255,122,122,0.05);
    }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-summary { font-size: 13px; line-height: 1.5; }
    .alert-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      margin-top: 3px;
    }
    .alert-warn {
      border-color: rgba(255,208,138,0.25);
      background: rgba(255,208,138,0.05);
    }

    /* Role rows */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .role-card {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
    }
    .role-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .role-state {
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      padding: 2px 7px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .rs-idle     { background: rgba(142,164,193,0.12); color: var(--muted); }
    .rs-active   { background: rgba(130,242,203,0.12); color: var(--accent); }
    .rs-working  { background: rgba(255,208,138,0.15); color: var(--warn); }
    .rs-error    { background: rgba(255,122,122,0.15); color: var(--danger); }
    .role-detail {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Error state */
    .error-banner {
      padding: 12px 16px;
      background: rgba(255,122,122,0.1);
      border: 1px solid rgba(255,122,122,0.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-logo">Deepnoa AI Office</span>
    <a href="/dashboard">Dashboard</a>
    <a href="/internal">Internal</a>
    <a href="/runs">Runs</a>
    <a href="/health" class="active">Health</a>
  </nav>

  <main>
    <div class="page-header">
      <h1>Health</h1>
      <span class="last-updated" id="last-updated"></span>
      <span class="poll-badge" id="poll-badge">読込中…</span>
    </div>

    <!-- Overall status banner -->
    <div class="status-banner banner-loading" id="status-banner">
      <span class="banner-icon">⏳</span>
      <div>
        <div id="banner-text">読込中…</div>
        <div class="banner-sub" id="banner-sub"></div>
      </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <!-- Today's Runs -->
    <div class="card">
      <div class="card-title" id="runs-card-title">今日の実行</div>
      <div class="run-chips">
        <div class="run-chip chip-done">
          <span class="chip-count" id="cnt-done">—</span>
          <span class="chip-label">done</span>
        </div>
        <div class="run-chip chip-running">
          <span class="chip-count" id="cnt-running">—</span>
          <span class="chip-label">running</span>
        </div>
        <div class="run-chip chip-failed">
          <span class="chip-count" id="cnt-failed">—</span>
          <span class="chip-label">failed</span>
        </div>
        <div class="run-chip chip-queued">
          <span class="chip-count" id="cnt-queued">—</span>
          <span class="chip-label">queued</span>
        </div>
      </div>
      <div id="latest-failed-wrap" style="display:none"></div>
    </div>

    <!-- Connectors -->
    <div class="card">
      <div class="card-title" id="connector-card-title">コネクター</div>
      <div id="connector-body">
        <div class="all-clear">⏳ 読込中…</div>
      </div>
    </div>

    <!-- Active Alerts -->
    <div class="card">
      <div class="card-title">アクティブアラート</div>
      <div id="alerts-body">
        <div class="all-clear">⏳ 読込中…</div>
      </div>
    </div>

    <!-- Agent Roles -->
    <div class="card">
      <div class="card-title">エージェント / ロール</div>
      <div class="role-grid" id="roles-body">
        <div style="color:var(--muted);font-size:13px">読込中…</div>
      </div>
    </div>
  </main>

  <script>
    const POLL_MS = 30000;
    let pollTimer = null;

    // ── helpers ──────────────────────────────────────────────────────────────

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function set(id, html) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text ?? '';
    }

    function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }
    function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }

    function formatTime(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        if (isToday) {
          return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        return d.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    function relativeTime(iso) {
      if (!iso) return '—';
      try {
        const ms = Date.now() - Date.parse(iso);
        if (!isFinite(ms) || ms < 0) return formatTime(iso);
        const s = Math.round(ms / 1000);
        if (s < 60) return `${s}秒前`;
        if (s < 3600) return `${Math.floor(s/60)}分前`;
        if (s < 86400) return `${Math.floor(s/3600)}時間前`;
        return formatTime(iso);
      } catch { return iso; }
    }

    // ── status banner ────────────────────────────────────────────────────────

    function renderBanner(overall, connectors, alerts, runs) {
      const banner = document.getElementById('status-banner');
      const text = document.getElementById('banner-text');
      const sub = document.getElementById('banner-sub');
      banner.className = 'status-banner';

      let icon, label, subParts = [];

      if (overall === 'ok') {
        banner.classList.add('banner-ok');
        icon = '✅';
        label = '全システム正常';
      } else if (overall === 'degraded') {
        banner.classList.add('banner-degraded');
        icon = '⚠️';
        label = '一部機能に問題あり';
        if (runs.failed > 0) subParts.push(`今日 ${runs.failed} 件失敗`);
        if (connectors.length > 0) subParts.push(`コネクター ${connectors.length} 件劣化`);
      } else {
        banner.classList.add('banner-error');
        icon = '🔴';
        label = '障害検知';
        const errors = connectors.filter(c => c.status === 'error' || c.status === 'offline');
        const critAlerts = alerts.filter(a => a.severity === 'error' || a.severity === 'critical');
        if (errors.length > 0) subParts.push(`コネクター ${errors.length} 件エラー`);
        if (critAlerts.length > 0) subParts.push(`クリティカルアラート ${critAlerts.length} 件`);
      }

      set('status-banner', `
        <span class="banner-icon">${icon}</span>
        <div>
          <div>${esc(label)}</div>
          <div class="banner-sub">${esc(subParts.join(' · ') || ' ')}</div>
        </div>
      `);
    }

    // ── today's runs ─────────────────────────────────────────────────────────

    function renderRuns(runsToday) {
      setText('cnt-done',    runsToday.done ?? 0);
      setText('cnt-running', runsToday.running ?? 0);
      setText('cnt-failed',  runsToday.failed ?? 0);
      setText('cnt-queued',  runsToday.queued ?? 0);
      setText('runs-card-title', `今日の実行 (${runsToday.date || '—'})`);
    }

    function renderLatestFailed(rec) {
      const wrap = document.getElementById('latest-failed-wrap');
      if (!rec) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';
      wrap.innerHTML = `
        <div class="failed-run-row">
          <span style="font-size:12px;color:var(--muted);flex-shrink:0">最新失敗:</span>
          <a class="failed-run-id" href="/runs/${encodeURIComponent(rec.run_id)}">${esc(rec.run_id)}</a>
          <span class="failed-run-meta">${esc(rec.kind || '—')} · ${formatTime(rec.queued_at)}</span>
          ${rec.error_message
            ? `<span class="failed-run-msg" title="${esc(rec.error_message)}">${esc(rec.error_message)}</span>`
            : ''}
        </div>`;
    }

    // ── connectors ───────────────────────────────────────────────────────────

    function dotClass(status) {
      const m = { connected: 'dot-connected', degraded: 'dot-degraded', error: 'dot-error', offline: 'dot-offline' };
      return m[status] || 'dot-offline';
    }

    function statusClass(status) {
      const m = { connected: 'cs-connected', degraded: 'cs-degraded', error: 'cs-error', offline: 'cs-offline' };
      return m[status] || 'cs-offline';
    }

    function renderConnectors(connectors, total) {
      const body = document.getElementById('connector-body');
      const titleSuffix = total > 0 ? ` (${connectors.length} 件劣化 / 全 ${total} 件)` : '';
      setText('connector-card-title', `コネクター${titleSuffix}`);

      if (!connectors.length) {
        body.innerHTML = '<div class="all-clear">✅ コネクター全て正常</div>';
        return;
      }
      body.innerHTML = `<div class="connector-list">${
        connectors.map(c => `
          <div class="connector-row">
            <span class="connector-dot ${dotClass(c.status)}"></span>
            <span class="connector-name">${esc(c.name)}</span>
            <span class="connector-status ${statusClass(c.status)}">${esc(c.status)}</span>
            ${c.pending_actions > 0
              ? `<span class="connector-pending">${c.pending_actions} 件保留</span>`
              : ''}
            <span class="connector-sync">${relativeTime(c.last_sync)}</span>
          </div>`
        ).join('')
      }</div>`;
    }

    // ── alerts ───────────────────────────────────────────────────────────────

    function renderAlerts(alerts) {
      const body = document.getElementById('alerts-body');
      if (!alerts.length) {
        body.innerHTML = '<div class="all-clear">✅ アクティブアラートなし</div>';
        return;
      }
      const alertIcon = (sev) => ({ error: '🔴', critical: '🔴', warning: '⚠️' }[sev] || '⚠️');
      const isWarn = (sev) => sev !== 'error' && sev !== 'critical';
      body.innerHTML = `<div class="alert-list">${
        alerts.map(a => `
          <div class="alert-row ${isWarn(a.severity) ? 'alert-warn' : ''}">
            <span class="alert-icon">${alertIcon(a.severity)}</span>
            <div>
              <div class="alert-summary">${esc(a.summary || '—')}</div>
              <div class="alert-meta">${esc(a.agent_id || '—')} · ${formatTime(a.timestamp)}</div>
            </div>
          </div>`
        ).join('')
      }</div>`;
    }

    // ── roles ─────────────────────────────────────────────────────────────────

    function roleStateClass(state) {
      if (!state || state === 'idle' || state === 'offline') return 'rs-idle';
      if (state === 'error') return 'rs-error';
      if (['writing','researching','executing','syncing'].includes(state)) return 'rs-working';
      return 'rs-active';
    }

    function renderRoles(roles) {
      const body = document.getElementById('roles-body');
      if (!roles.length) {
        body.innerHTML = '<div style="color:var(--muted);font-size:13px">ロール情報なし</div>';
        return;
      }
      body.innerHTML = roles.map(r => `
        <div class="role-card">
          <div class="role-name">${esc(r.name || r.key || '—')}</div>
          <span class="role-state ${roleStateClass(r.state)}">${esc(r.state || 'idle')}</span>
          <div class="role-detail">${esc(r.detail || r.profile || '—')}</div>
        </div>`
      ).join('');
    }

    // ── fetch & render ────────────────────────────────────────────────────────

    async function fetchHealth() {
      const badge = document.getElementById('poll-badge');
      const errBanner = document.getElementById('error-banner');
      try {
        badge.textContent = '読込中…';
        const res = await fetch('/api/internal/health');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();
        if (!d.ok) throw new Error(d.error || 'API error');

        renderBanner(d.overall_status, d.connectors || [], d.alerts || [], d.runs_today || {});
        renderRuns(d.runs_today || {});
        renderLatestFailed(d.latest_failed_run);
        renderConnectors(d.connectors || [], d.connector_total || 0);
        renderAlerts(d.alerts || []);
        renderRoles(d.roles || []);

        errBanner.style.display = 'none';
        const now = new Date().toLocaleTimeString('ja-JP');
        setText('last-updated', `更新: ${now}`);
        badge.textContent = `${POLL_MS / 1000}秒後に更新`;
      } catch (err) {
        badge.textContent = 'エラー';
        errBanner.textContent = `取得エラー: ${err.message}`;
        errBanner.style.display = '';
      }
    }

    function schedulePoll() {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(async () => {
        await fetchHealth();
        schedulePoll();
      }, POLL_MS);
    }

    fetchHealth().then(schedulePoll);
  </script>
</body>
</html>
