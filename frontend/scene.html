<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var k="dn-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)"),t=s==="light"||s==="dark"?s:m.matches?"light":"dark";document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Deepnoa AI Office Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles/tokens.css">
  <style>
    :root {
      --bg: var(--color-scene-embed-bg);
      --surface: rgba(10, 18, 30, 0.42);
      --surface-line: rgba(255, 255, 255, 0.1);
      --text: var(--color-text);
      --muted: var(--color-muted);
      --accent: var(--color-public-accent);
      --danger: var(--color-danger);
      --scene-shadow: 0 34px 90px rgba(0, 0, 0, 0.35);
    }

    html[data-theme="light"] {
      --scene-shadow: 0 24px 56px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    .scene-theme-fab {
      position: fixed;
      top: 16px;
      right: 16px;
      bottom: auto;
      z-index: 60;
      pointer-events: auto;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, var(--color-scene-radial), transparent 30%),
        linear-gradient(180deg, var(--color-scene-grad-top) 0%, var(--color-scene-grad-bottom) 100%);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: var(--space-public-shell-x);
    }

    body.embed-mode {
      padding: 0;
      background: var(--color-scene-embed-bg);
    }

    .scene-shell {
      position: relative;
      width: min(100%, 1440px);
      aspect-ratio: 16 / 9;
      min-height: min(100vh - calc(var(--space-public-shell-x) * 2), 420px);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--scene-shadow);
      background: var(--color-scene-canvas);
    }

    body.embed-mode .scene-shell {
      width: 100vw;
      min-height: 100vh;
      border-radius: 0;
      border: 0;
      box-shadow: none;
    }

    html[data-theme="light"] .scene-shell {
      border-color: var(--color-line);
    }
    html[data-theme="light"] .scene-brand,
    html[data-theme="light"] .scene-live,
    html[data-theme="light"] .scene-legend {
      background: var(--color-panel);
      border-color: var(--color-line);
      box-shadow: var(--shadow-surface-sm);
    }
    html[data-theme="light"] .scene-tooltip,
    html[data-theme="light"] .scene-detail {
      background: var(--color-panel);
      border-color: var(--color-line);
      box-shadow: var(--shadow-surface);
    }
    html[data-theme="light"] .legend-chip {
      background: var(--color-panel-alt);
    }
    html[data-theme="light"] .legend-chip.is-active {
      color: var(--color-text);
      background: var(--color-panel-2);
      box-shadow: 0 0 0 1px var(--color-line) inset;
    }

    .background-layer,
    .zone-layer,
    .accent-layer,
    .shadow-layer,
    .sprite-layer,
    .occluder-layer,
    .ui-layer {
      position: absolute;
      inset: 0;
    }

    .background-layer {
      background-color: #0a1018;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(12, 22, 36, 0.92) 0%, rgba(6, 10, 16, 0.98) 100%);
      background-size: 48px 48px, 48px 48px, auto;
      background-position: center;
    }

    .background-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(126, 226, 194, 0.14), transparent 21%),
        radial-gradient(circle at 84% 20%, rgba(94, 145, 255, 0.16), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02) 35%, rgba(3,7,12,0.18));
      pointer-events: none;
    }

    .zone-layer {
      pointer-events: none;
      opacity: 0.018;
    }

    .zone {
      position: absolute;
      border-radius: 28px;
      border: 1px solid rgba(116, 150, 196, 0.1);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .zone.walkway {
      left: 17%;
      right: 15%;
      bottom: 10%;
      height: 18%;
      border-style: solid;
      border-color: rgba(120, 167, 214, 0.12);
      background:
        linear-gradient(180deg, rgba(173, 204, 232, 0.06), rgba(255,255,255,0.02)),
        repeating-linear-gradient(90deg, rgba(120,167,214,0.02) 0 22px, rgba(255,255,255,0.006) 22px 44px);
    }

    .zone.work-left {
      left: 10%;
      top: 18%;
      width: 31%;
      height: 28%;
    }

    .zone.work-right {
      right: 10%;
      top: 18%;
      width: 31%;
      height: 28%;
    }

    .zone.meeting {
      left: 38%;
      top: 16%;
      width: 24%;
      height: 20%;
      border-color: rgba(126, 226, 194, 0.12);
      background: rgba(126, 226, 194, 0.06);
    }

    .zone.corridor {
      left: 45%;
      top: 26%;
      width: 10%;
      height: 40%;
      border-color: rgba(120, 167, 214, 0.08);
      background: rgba(120, 167, 214, 0.03);
    }

    .accent-layer {
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 72%, rgba(255, 221, 139, 0.07), transparent 14%),
        radial-gradient(circle at 49% 28%, rgba(126, 226, 194, 0.08), transparent 14%),
        radial-gradient(circle at 74% 70%, rgba(110, 160, 255, 0.08), transparent 14%);
      mix-blend-mode: screen;
    }

    .shadow-layer {
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .agent-shadow {
      position: absolute;
      width: 26px;
      height: 8px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(72, 96, 133, 0.16);
      filter: blur(1.6px);
      will-change: transform;
    }

    .sprite-layer {
      overflow: hidden;
      z-index: 3;
      pointer-events: auto;
    }

    .occluder-layer {
      z-index: 4;
      pointer-events: none;
    }

    .occluder {
      position: absolute;
      background: linear-gradient(180deg, rgba(247, 252, 255, 0.2), rgba(232, 242, 250, 0.14));
      border: 1px solid rgba(104, 128, 164, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
      opacity: 0.42;
    }

    .occluder.left-row-lower {
      left: 13.8%;
      top: 41.8%;
      width: 26%;
      height: 5.8%;
      clip-path: polygon(1% 0, 96% 0, 100% 55%, 4% 100%);
    }

    .occluder.left-row-upper {
      left: 24.8%;
      top: 28.8%;
      width: 23.6%;
      height: 5.6%;
      clip-path: polygon(1% 0, 97% 0, 100% 56%, 4% 100%);
    }

    .occluder.right-cluster {
      left: 59.4%;
      top: 24.8%;
      width: 27%;
      height: 5.8%;
      clip-path: polygon(2% 0, 97% 0, 100% 56%, 5% 100%);
    }

    .occluder.console-front {
      left: 43%;
      top: 50.5%;
      width: 21.6%;
      height: 8.2%;
      border-radius: 0 0 40px 40px;
      clip-path: polygon(6% 10%, 94% 10%, 100% 54%, 79% 100%, 21% 100%, 0 54%);
    }

    .occluder.sofa-front {
      left: 25%;
      top: 70.2%;
      width: 28%;
      height: 6.8%;
      border-radius: 30px;
      clip-path: polygon(8% 6%, 92% 6%, 100% 54%, 90% 100%, 10% 100%, 0 54%);
    }

    .agent {
      position: absolute;
      width: 72px;
      transform: translate(-50%, -50%);
      text-align: center;
      will-change: transform;
      --outline: #4c6388;
      z-index: 1;
      pointer-events: auto;
      cursor: pointer;
      transition: filter 140ms ease, opacity 140ms ease;
    }

    .agent:hover,
    .agent.is-selected {
      filter: brightness(1.03);
    }

    .staff {
      position: relative;
      width: 32px;
      height: 42px;
      margin: 0 auto;
      filter: drop-shadow(0 6px 10px rgba(34, 50, 78, 0.16));
      animation: walk-bob 1s ease-in-out infinite;
    }

    .agent.is-paused .staff,
    .agent.is-error .staff {
      animation: paused-breathe 2.8s ease-in-out infinite;
    }

    .agent.is-error .staff {
      animation: none;
    }

    .staff-part {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .staff-head {
      top: 2px;
      width: 12px;
      height: 12px;
      border-radius: 4px;
      background: #ffd8be;
      box-shadow: 0 0 0 1.5px var(--outline);
    }

    .staff-hair {
      top: 0;
      width: 14px;
      height: 5px;
      border-radius: 4px 4px 2px 2px;
      background: var(--hair, #202a39);
      box-shadow: 0 0 0 1px rgba(76, 99, 136, 0.55);
    }

    .staff-body {
      top: 16px;
      width: 18px;
      height: 13px;
      border-radius: 5px 5px 4px 4px;
      background: var(--tone, #8bc5ff);
      box-shadow:
        0 0 0 1.5px var(--outline),
        -10px 3px 0 -7px var(--tone, #8bc5ff),
        10px 3px 0 -7px var(--tone, #8bc5ff),
        -10px 3px 0 -5.5px var(--outline),
        10px 3px 0 -5.5px var(--outline);
    }

    .staff-accent {
      top: 19px;
      width: 8px;
      height: 5px;
      border-radius: 3px;
      background: var(--accent-tone, #e5f2ff);
      box-shadow:
        0 0 0 1px rgba(235, 246, 255, 0.55);
    }

    .staff-accent::after {
      content: "";
      position: absolute;
      top: 0;
      right: -8px;
      width: 4px;
      height: 8px;
      border-radius: 2px;
      background: var(--accent-tone, #e5f2ff);
      box-shadow: 0 0 0 1px rgba(76, 99, 136, 0.42);
    }

    .staff-feet {
      top: 31px;
      width: 14px;
      height: 8px;
      background: transparent;
      box-shadow:
        -4px 0 0 0 var(--leg, #243246),
        4px 0 0 0 var(--leg, #243246);
    }

    .agent.role-dev { --tone: #7fb8f6; --accent-tone: #dfeefe; --hair: #33496a; --leg: #40587c; }
    .agent.role-ops { --tone: #f3bb69; --accent-tone: #fdf0cc; --hair: #44556f; --leg: #65523e; }
    .agent.role-research { --tone: #98d8be; --accent-tone: #e9fbf1; --hair: #39536e; --leg: #42615a; }
    .agent.role-visitor {
      --tone: #bfc9da;
      --accent-tone: #edf2f8;
      --hair: #4e5d73;
      --leg: #58657a;
      width: 62px;
      opacity: 0.92;
    }
    .agent.role-visitor .staff {
      transform: scale(0.9);
      filter: drop-shadow(0 5px 8px rgba(34, 50, 78, 0.12));
    }
    .agent.role-visitor .agent-badge {
      background: #9eb4d4;
    }

    .agent .state-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 65%);
      opacity: 0;
      pointer-events: none;
    }

    .agent-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.72);
      background: var(--state-color, #7ee2c2);
      box-shadow: 0 0 0 3px rgba(11, 21, 37, 0.28);
    }

    .agent.is-researching .state-glow,
    .agent.is-syncing .state-glow {
      opacity: 0.6;
    }

    .agent.is-error .state-glow {
      opacity: 0.8;
      background: radial-gradient(circle, rgba(255, 107, 125, 0.28), transparent 68%);
      animation: error-pulse 1.1s ease-in-out infinite;
    }

    .ui-layer {
      z-index: 8;
      pointer-events: none;
    }

    .scene-brand,
    .scene-live,
    .scene-legend {
      position: absolute;
      border-radius: 16px;
      border: 1px solid var(--surface-line);
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }

    .scene-brand {
      top: 16px;
      left: 16px;
      padding: 9px 11px;
      max-width: min(34vw, 260px);
    }

    .scene-kicker {
      color: var(--accent);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: var(--font-public-eyebrow-spacing);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .scene-title {
      font-size: clamp(15px, 1.7vw, 20px);
      font-weight: var(--font-public-title-weight);
      line-height: 1.05;
      margin: 0;
    }

    .scene-subtitle {
      color: var(--color-public-copy-soft);
      font-size: 11px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .scene-legend {
      left: 16px;
      bottom: 16px;
      padding: 7px 9px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(72vw, 560px);
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .legend-chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--chip, #7ee2c2);
    }

    .legend-chip.idle { --chip: #7ee2c2; }
    .legend-chip.executing { --chip: #ffc46b; }
    .legend-chip.researching { --chip: #8bc5ff; }
    .legend-chip.syncing { --chip: #c4a2ff; }
    .legend-chip.error { --chip: #ff6b7d; }
    .legend-chip.is-active {
      color: var(--color-text);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .scene-live {
      right: 16px;
      bottom: 16px;
      padding: 8px 10px;
      text-align: right;
      min-width: 118px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: var(--font-public-eyebrow-spacing);
      text-transform: uppercase;
      color: var(--color-public-copy-support);
    }

    .live-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(126, 226, 194, 0.6);
      animation: live-blink 1.3s ease-in-out infinite;
    }

    .live-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .scene-tooltip,
    .scene-detail {
      position: absolute;
      border-radius: 16px;
      border: 1px solid var(--surface-line);
      background: rgba(8, 14, 24, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.26);
      pointer-events: none;
    }

    .scene-tooltip {
      z-index: 6;
      min-width: 170px;
      max-width: 240px;
      padding: 9px 11px;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 120ms ease;
    }

    .scene-tooltip.is-visible {
      opacity: 1;
    }

    .tooltip-name,
    .detail-name {
      font-size: 13px;
      font-weight: var(--font-public-title-weight);
      line-height: 1.2;
    }

    .tooltip-meta,
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .status-pill,
    .role-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--color-text);
      background: rgba(255,255,255,0.07);
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--pill-color, #7ee2c2);
    }

    .tooltip-summary,
    .detail-summary {
      margin-top: 7px;
      color: var(--color-public-copy-support);
      font-size: 11px;
      line-height: 1.4;
    }

    .scene-detail {
      z-index: 5;
      right: 16px;
      top: 16px;
      width: min(290px, calc(100% - 32px));
      padding: 12px 13px;
      pointer-events: auto;
    }

    .scene-detail.is-empty {
      opacity: 0.84;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .detail-close {
      appearance: none;
      border: 0;
      background: rgba(255,255,255,0.06);
      color: var(--color-public-copy-support);
      width: 28px;
      height: 28px;
      border-radius: 999px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 6px 10px;
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.45;
      color: var(--muted);
    }

    .detail-label {
      color: #9eb2ce;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 10px;
    }

    .detail-value {
      color: var(--color-text);
      min-width: 0;
      word-break: break-word;
    }

    .capabilities-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 6px;
    }

    .capability-item {
      font-size: 11px;
      line-height: 1.4;
      color: var(--color-public-copy-support);
      display: flex;
      gap: 6px;
    }

    .capability-item::before {
      content: "•";
      color: var(--accent);
      flex: 0 0 auto;
    }

    .is-hidden {
      display: none !important;
    }

    .scene-shell.scene-ops-map .zone-layer,
    .scene-shell.scene-ops-map .accent-layer,
    .scene-shell.scene-ops-map .shadow-layer,
    .scene-shell.scene-ops-map .sprite-layer,
    .scene-shell.scene-ops-map .occluder-layer {
      display: none !important;
    }

    .ops-map {
      position: absolute;
      z-index: 5;
      left: 18px;
      right: 18px;
      top: 92px;
      bottom: 88px;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    body.embed-mode .ops-map {
      top: 80px;
      bottom: 80px;
    }

    .ops-map-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ops-map-flow {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) auto minmax(0, 0.9fr) auto minmax(0, 1.2fr) auto minmax(0, 0.88fr);
      gap: 8px 6px;
      align-items: stretch;
    }

    .ops-col {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 14, 24, 0.55);
      backdrop-filter: blur(14px);
      padding: 12px 14px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    html[data-theme="light"] .ops-col {
      background: rgba(255, 255, 255, 0.72);
      border-color: var(--color-line);
    }

    .ops-col-title {
      margin: 0;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-public-copy-support);
      font-weight: 600;
    }

    .ops-chip-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .ops-chip {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    html[data-theme="light"] .ops-chip {
      background: rgba(15, 23, 42, 0.04);
      border-color: rgba(15, 23, 42, 0.08);
    }

    .ops-chip-label {
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .ops-chip-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .ops-flow-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.22);
      font-size: 14px;
      user-select: none;
      padding: 0 2px;
    }

    .ops-flow-arrows--agents .ops-arrow {
      margin-top: 18px;
    }

    .ops-router-node {
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(126, 226, 194, 0.22);
      background: linear-gradient(145deg, rgba(126, 226, 194, 0.1), rgba(8, 14, 24, 0.5));
      flex: 1;
      min-height: 120px;
    }

    .ops-router-status {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .ops-router-sub {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }

    .ops-router-task {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(126, 226, 194, 0.22);
      background: rgba(126, 226, 194, 0.08);
      font-size: 11px;
      line-height: 1.45;
    }

    .ops-router-task-head {
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .ops-router-task-body {
      color: var(--color-text);
      word-break: break-word;
    }

    .ops-router-task-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .ops-agent-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .aom-node {
      text-align: left;
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .aom-node:hover {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
    }

    .aom-node.is-selected {
      border-color: rgba(126, 226, 194, 0.45);
      box-shadow: 0 0 0 1px rgba(126, 226, 194, 0.12);
    }

    .aom-node.is-assigned {
      border-color: rgba(126, 226, 194, 0.36);
      box-shadow: inset 0 0 0 1px rgba(126, 226, 194, 0.1);
    }

    .aom-node-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .aom-node-name {
      font-size: 13px;
      font-weight: 600;
    }

    .aom-node-state {
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .aom-node-summary {
      font-size: 11px;
      color: var(--color-public-copy-support);
      line-height: 1.4;
      word-break: break-word;
    }

    .aom-node-meta {
      margin-top: 6px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      color: rgba(158, 178, 206, 0.85);
    }

    .aom-node-route {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(126, 226, 194, 0.26);
      color: #9fe8d0;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .ops-review-panel {
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    .ops-review-line + .ops-review-line {
      margin-top: 8px;
    }

    .ops-timeline-wrap {
      flex-shrink: 0;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(6, 10, 16, 0.55);
      padding: 10px 12px;
    }

    .ops-timeline-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .ops-timeline-title {
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-public-copy-support);
    }

    .ops-timeline-note {
      font-size: 10px;
      color: rgba(158, 178, 206, 0.75);
    }

    .ops-timeline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .ops-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--color-text);
    }

    .ops-step.is-inferred {
      border-style: dashed;
      opacity: 0.88;
    }

    @media (max-width: 1100px) {
      .ops-map-flow {
        grid-template-columns: 1fr;
      }
      .ops-flow-arrows {
        display: none;
      }
    }

    @keyframes walk-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }

    @keyframes paused-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.5px); }
    }

    @keyframes live-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @keyframes error-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.82; }
      50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.56; }
    }

    /* ── runtime status badges ── */
    .live-runtime-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .rt-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      transition: border-color 0.3s ease, color 0.3s ease;
    }

    .rt-badge .rt-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--rt-color, #9eb4d4);
      flex-shrink: 0;
    }

    .rt-badge.is-running {
      --rt-color: #5e91ff;
      border-color: rgba(94,145,255,0.28);
      color: #a8c7ff;
    }

    .rt-badge.is-running .rt-dot {
      animation: rt-pulse 1.1s ease-in-out infinite;
    }

    .rt-badge.is-completed {
      --rt-color: #7ee2c2;
      border-color: rgba(126,226,194,0.24);
      color: #9fe8d0;
    }

    .rt-badge.is-failed {
      --rt-color: #ff6b7d;
      border-color: rgba(255,107,125,0.26);
      color: #ff93a2;
    }

    .rt-badge.is-queued {
      --rt-color: #c4a2ff;
      border-color: rgba(196,162,255,0.2);
    }

    /* ── activity feed (right side) ── */
    .scene-activity-feed {
      position: absolute;
      right: 16px;
      bottom: 80px;
      width: 200px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(8,14,24,0.68);
      backdrop-filter: blur(10px);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 10;
    }

    html[data-theme="light"] .scene-activity-feed {
      background: var(--color-panel);
      border-color: var(--color-line);
      box-shadow: var(--shadow-surface-sm);
    }

    .feed-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: var(--muted);
      opacity: 0;
      animation: feed-in 0.35s ease forwards;
    }

    .feed-row:last-child {
      border-bottom: 0;
    }

    .feed-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--fd-color, #9eb4d4);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .feed-text {
      line-height: 1.35;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── intake toast ── */
    .intake-toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,14,24,0.84);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(126,226,194,0.32);
      border-radius: 12px;
      padding: 7px 14px;
      font-size: 11px;
      color: var(--color-text);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 20;
    }

    .intake-toast.is-visible {
      opacity: 1;
    }

    .intake-toast::before {
      content: "✦ ";
      color: var(--accent);
    }

    @keyframes rt-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.25); }
    }

    @keyframes feed-in {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .scene-shell {
        border-radius: 22px;
        min-height: auto;
      }

      .scene-brand {
        max-width: 72vw;
      }

      .scene-legend {
        max-width: calc(100% - 32px);
      }

      .scene-detail {
        top: auto;
        right: 12px;
        bottom: 62px;
        width: min(280px, calc(100% - 24px));
      }

      .scene-activity-feed {
        display: none;
      }
    }
  </style>
</head>

      const publicRewrites = [

        { re: /\bdegraded\b|\bissue\b|\bissues\b/, text: "異常" },
      ];

      const countMatch = raw.match(/\b(\d+)\b/);
      const countText = countMatch ? countMatch[1] : "";

      let subject = "";
      for (const pattern of nounPatterns) {
        if (pattern.re.test(lower)) {
          subject = pattern.text;
          break;

      }

      let action = "";
      for (const pattern of actionPatterns) {
        if (pattern.re.test(lower)) {
          action = pattern.text;
          break;

      if (subject && action) {
        if (action === "分析中" && subject === "ログ") return key === "research" ? "情報整理中" : "稼働状況を確認中";

        if (action === "要確認") return `${subject}が要確認`;

          phrase = phrase.replace(re, text);

        [/GitHub webhook queue is being processed and deployment flow is active\./i, "GitHubキューを処理中"],

      if (translated && /中$|待ち$/.test(translated)) {
        return translated;

      const firstKeyword = [
        [/\banaly(s|z)ing\b/i, "分析中"],
        [/\bchecking\b|\breviewing\b|\bverifying\b/i, "確認中"],
        [/\bprocessing\b|\bworking\b|\bhandling\b|\brunning\b|\bexecuting\b/i, "処理中"],
        [/\bgenerating\b|\bcreating\b|\bbuilding\b|\bdrafting\b/i, "生成中"],

        [/\bwaiting\b|\bidle\b|\bstanding by\b/i, "待機中"],
        [/\brouting\b|\bdispatching\b|\bforwarding\b/i, "振分中"],
      ];
      for (const [re, text] of firstKeyword) {
        if (re.test(raw)) return text;

      if (state === "executing" || key === "dev") return "システム更新を処理中";
      if (key === "ops") return "業務を確認中";

    function getSpeed(state) {
      const normalized = String(state || "").toLowerCase();
      if (normalized === "executing") return 0.03;
      if (normalized === "researching") return 0.035;
      if (normalized === "syncing" || normalized === "routing") return 0.055;
      if (normalized === "writing") return 0.028;
      if (normalized === "error") return 0;
      return 0.016;
    }

    function getVisitorScenario(nowSeconds = Date.now() / 1000) {
      const phase = (nowSeconds + VISITOR_EVENT.startOffset) % VISITOR_EVENT.cycleSeconds;
      if (phase > VISITOR_EVENT.activeSeconds) {
        return { active: false };
      }
      const cycleIndex = Math.floor((nowSeconds + VISITOR_EVENT.startOffset) / VISITOR_EVENT.cycleSeconds);
      const kind = cycleIndex % 2 === 0 ? "inquiry" : "request";
      const point = snapToWalkmap(WALKMAP.points.entry_guest || { x: 0.545, y: 0.835 });
      return {
        active: true,
        kind,
        point,
        name: t("visitor.name", "Visitor"),
        roleLabelText: t("visitor.role", "External"),
        stateLabelText: t("visitor.state", "visiting"),
        displayDetail: t(`visitor.summary.${kind}`, kind),
        stateColorValue: "#9eb4d4",
      };
    }

    async function ensureWalkmaskLoaded() {
      if (sceneState.walkmask.ready) return;
      const img = document.getElementById("scene-walkmask");
      if (!img.complete) {
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });
      }
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      sceneState.walkmask = {
        ready: true,
        width: canvas.width,
        height: canvas.height,
        data: ctx.getImageData(0, 0, canvas.width, canvas.height).data,
      };
    }

    function sampleWalkmask(normalizedPoint) {
      if (!sceneState.walkmask.ready || !sceneState.walkmask.data) return 255;
      const px = Math.max(0, Math.min(sceneState.walkmask.width - 1, Math.round(normalizedPoint.x * (sceneState.walkmask.width - 1))));
      const py = Math.max(0, Math.min(sceneState.walkmask.height - 1, Math.round(normalizedPoint.y * (sceneState.walkmask.height - 1))));
      const idx = (py * sceneState.walkmask.width + px) * 4;
      return sceneState.walkmask.data[idx];
    }

    function snapToWalkmap(point) {
      if (sampleWalkmask(point) >= 180) {
        return point;
      }
      let bestPoint = point;
      let bestDist = Infinity;
      const maxRadius = 36;
      const xStep = 1 / Math.max(1, sceneState.walkmask.width - 1);
      const yStep = 1 / Math.max(1, sceneState.walkmask.height - 1);
      for (let radius = 1; radius <= maxRadius; radius += 1) {
        for (let dx = -radius; dx <= radius; dx += 1) {
          for (let dy = -radius; dy <= radius; dy += 1) {
            if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) continue;
            const candidate = {
              x: Math.max(0, Math.min(1, point.x + dx * xStep)),
              y: Math.max(0, Math.min(1, point.y + dy * yStep)),
            };
            if (sampleWalkmask(candidate) < 180) continue;
            const dist = Math.hypot(candidate.x - point.x, candidate.y - point.y);
            if (dist < bestDist) {
              bestPoint = candidate;
              bestDist = dist;
            }
          }
        }
        if (bestDist < Infinity) break;
      }
      return bestPoint;
    }

    function nudgeTowardWalkable(point, radius = 10) {
      if (sampleWalkmask(point) >= 180) return point;
      let bestPoint = point;
      let bestScore = Infinity;
      const xStep = 1 / Math.max(1, sceneState.walkmask.width - 1);
      const yStep = 1 / Math.max(1, sceneState.walkmask.height - 1);
      for (let dx = -radius; dx <= radius; dx += 1) {
        for (let dy = -radius; dy <= radius; dy += 1) {
          const candidate = {
            x: Math.max(0, Math.min(1, point.x + dx * xStep)),
            y: Math.max(0, Math.min(1, point.y + dy * yStep)),
          };
          if (sampleWalkmask(candidate) < 180) continue;
          const score = Math.hypot(dx, dy);
          if (score < bestScore) {
            bestScore = score;
            bestPoint = candidate;
          }
        }
      }
      return bestPoint;
    }

    function resolveRoutePoints(pointIds) {
      return (pointIds || []).map((id) => {
        const source = WALKMAP.points[id] || { x: 0.5, y: 0.5, pause: 1 };
        const snapped = snapToWalkmap(source);
        return { ...source, x: snapped.x, y: snapped.y, id };
      });
    }

    function computeRoutePosition(route, progress) {
      if (!route || !route.length) return { x: 0.5, y: 0.5, paused: false };
      if (route.length === 1) return { x: route[0].x, y: route[0].y, paused: true };
      const segments = [];
      let total = 0;
      for (let i = 0; i < route.length; i += 1) {
        const start = route[i];
        const end = route[(i + 1) % route.length];
        const dist = Math.hypot(end.x - start.x, end.y - start.y);
        const move = Math.max(dist / 0.08, 0.45);
        const pause = Math.max(start.pause || 0, 0);
        segments.push({ type: "move", start, end, duration: move });
        total += move;
        if (pause) {
          segments.push({ type: "pause", point: start, duration: pause });
          total += pause;
        }
      }
      let cursor = (progress % total + total) % total;
      for (const segment of segments) {
        if (cursor > segment.duration) {
          cursor -= segment.duration;
          continue;
        }
        if (segment.type === "pause") {
          return { x: segment.point.x, y: segment.point.y, paused: true };
        }
        const ratio = segment.duration ? cursor / segment.duration : 0;
        return {
          x: segment.start.x + (segment.end.x - segment.start.x) * ratio,
          y: segment.start.y + (segment.end.y - segment.start.y) * ratio,
          paused: false,
        };
      }
      return { x: route[0].x, y: route[0].y, paused: false };
    }

    function motion(agent, time) {
      const state = String(agent.state || "idle").toLowerCase();
      const speed = getSpeed(state);
      if (!speed) {
        const anchor = agent.anchor || agent.route[0] || { x: 0.5, y: 0.5 };
        const snapped = snapToWalkmap(anchor);
        return { x: snapped.x, y: snapped.y, paused: true };
      }
      const wave = time + agent.phase;
      const base = computeRoutePosition(agent.route, wave * speed * 10);
      let x = base.x;
      let y = base.y;
      if (state === "researching") {
        y += Math.sin(wave * 0.75) * 0.0025;
      } else if (state === "executing") {
        x += Math.sin(wave * 1.2) * 0.0016;
        y += Math.cos(wave * 0.9) * 0.0012;
      } else if (state === "syncing" || state === "routing") {
        x += Math.cos(wave * 1.1) * 0.003;
        y += Math.sin(wave * 0.95) * 0.002;
      } else if (state === "idle") {
        y += Math.sin(wave * 0.55) * 0.0011;
      } else if (state === "writing") {
        x += Math.sin(wave * 0.7) * 0.0016;
        y += Math.cos(wave * 0.55) * 0.0012;
      }
      const corrected = nudgeTowardWalkable({ x, y }, 8);
      return { x: corrected.x, y: corrected.y, paused: base.paused };
    }

    function resolveBehaviorProfile(agent) {
      const profile = routeProfiles[agent.key] || routeProfiles.default;
      const state = String(agent.state || "idle").toLowerCase();
      const routeKey = profile[state] ? state : state === "writing" && profile.executing ? "executing" : "idle";
      const route = resolveRoutePoints(profile[routeKey] || profile.idle || [profile.home || "center_mid"]);
      const anchorSource = WALKMAP.points[profile.home] || route[0] || { x: 0.5, y: 0.5 };
      const anchor = snapToWalkmap(anchorSource);
      return { route, anchor };
    }

    function getSceneEntityByKey(key) {
      if (!key) return null;
      return sceneState.agentMap.get(key) || null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function buildMapAgents(agents) {
      const priority = ["ops", "dev", "research", "main", "runner", "worker"];
      return (agents || [])
        .filter((agent) => agent.key !== "reception")
        .sort((a, b) => {
          const ai = priority.indexOf(a.key);
          const bi = priority.indexOf(b.key);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        })
        .slice(0, 8)
        .map((agent, index) => {
          const key = agent.key || `agent-${index}`;
          const state = String(agent.state || "idle").toLowerCase();
          const rawDetail = summarizeAgent(agent);
          return {
            key,
            name: agentDisplayName(key, agent.name || key),
            roleLabelText: roleLabel(key),
            state,
            stateLabelText: compactText(agent.status_label || stateLabel(state)),
            detail: rawDetail,
            displayDetail: translateSummary(rawDetail, key, state),
            updated_at: agent.updated_at || agent.last_seen || agent.last_update || "",
            source: compactText(agent.source || ""),
            status_label: compactText(agent.status_label || ""),
            capabilities: getAgentCapabilities(key),
          };
        });
    }

    function textBlob(row) {
      if (!row || typeof row !== "object") return "";
      const parts = [
        row.type,
        row.message,
        row.title,
        row.summary,
        row.label,
        row.name,
        row.detail,
        row.description,
        row.text,
      ].filter(Boolean);
      return compactText(parts.join(" "));
    }

    function classifyIncoming(text, source) {
      const s = `${text} ${source}`.toLowerCase();
      if (/formspree|web form|form submission/.test(s)) return "Formspree";
      if (/\bslack\b/.test(s)) return "Slack";
      if (/github|pull request|\bpr\b|webhook/.test(s)) return "GitHub";
      if (/cron|scheduled job|schedule/.test(s)) return "Scheduled";
      return "Inbound";
    }

    function buildIncomingChips(data) {
      const out = [];
      const seen = new Set();
      function pushChip(label, sub) {
        const line = `${label}|${sub}`;
        if (!sub || seen.has(line) || out.length >= 10) return;
        seen.add(line);
        out.push({ label, sub });
      }
      const rows = [...(data.intake || []), ...(data.activity || []), ...(data.recent_work || [])].slice(0, 48);
      for (const row of rows) {
        const txt = textBlob(row);
        const src = compactText(row.source || row.provenance_label || row.channel || row.origin || "");
        const label = classifyIncoming(txt, src);
        const sub = compactText(row.title || row.summary || row.type || txt.slice(0, 72)) || label;
        pushChip(label, sub);
      }
      for (const sys of (data.systems || []).slice(0, 4)) {
        const n = compactText(sys.name || sys.id || sys.kind || sys.label || "System");
        if (n) pushChip("System", n);
      }
      if (!out.length) {
        pushChip("Inbound", t("map.incoming.idle", "Waiting for public signals"));
      }
      return out.slice(0, 10);
    }

    function deriveRecognizedTask(data, agents) {
      const rows = [...(data.intake || []), ...(data.activity || []), ...(data.recent_work || [])];
      const first = rows[0] || null;
      if (!first) {
        return {
          text: t("map.incoming.idle", "Waiting for public signals"),
          source: "",
          assignedKey: agents[0] ? agents[0].key : "",
          inferred: true,
        };
      }

      const text = compactText(first.title || first.summary || first.detail || first.message || first.type || textBlob(first) || "task");
      const source = compactText(first.source || first.provenance_label || first.channel || first.origin || classifyIncoming(text, ""));
      const lc = `${text} ${source}`.toLowerCase();
      const agentKey =
        /deploy|runtime|health|alert|formspree|slack|ops/.test(lc) ? "ops"
        : /github|pr|pull request|code|implementation/.test(lc) ? "dev"
        : /research|investigation|market|summary/.test(lc) ? "research"
        : (agents[0] ? agents[0].key : "");

      return {
        text,
        source,
        assignedKey: agentKey,
        inferred: true,
      };
    }

    function deriveRouterLines(data, agents, recognizedTask) {
      const busy = agents.filter((a) => ["executing", "routing", "syncing", "writing", "researching"].includes(a.state));
      const gateway = data.gateway || {};
      const gLine = compactText(gateway.status_label || gateway.summary || gateway.detail || "");
      if (busy.length) {
        const target = recognizedTask && recognizedTask.assignedKey
          ? recognizedTask.assignedKey
          : (busy.map((a) => a.key).includes("ops") ? "ops" : busy[0].key);
        const dispatch =
          sceneState.lang === "ja"
            ? `${target} へ振分け中`
            : sceneState.lang === "zh"
              ? `分发至 ${target}`
              : `Dispatching toward ${target}`;
        return {
          status: t("map.router.routing", "Routing inbound work"),
          sub: `${dispatch}${gLine ? ` · ${gLine}` : ""}`,
        };
      }
      return {
        status: t("map.router.standby", "Standing by for inbound work"),
        sub: gLine || compactText((data.summary && data.summary.status) || ""),
      };
    }

    function buildReviewHtml(data) {
      const s = data.summary || {};
      const lines = [];
      if (s.status) {
        lines.push(`<div class="ops-review-line"><strong>${escapeHtml(t("map.review.summary", "Summary"))}</strong> · ${escapeHtml(String(s.status))}</div>`);
      }
      if (s.active_tasks != null) {
        lines.push(`<div class="ops-review-line">${escapeHtml(t("map.review.active_tasks", "Active tasks"))}: ${escapeHtml(String(s.active_tasks))}</div>`);
      }
      if (s.awaiting_approval) {
        lines.push(`<div class="ops-review-line">${escapeHtml(t("map.review.approvals", "Approvals"))}: ${escapeHtml(String(s.awaiting_approval))}</div>`);
      }
      if (s.blocked) {
        lines.push(`<div class="ops-review-line">${escapeHtml(t("map.review.blocked", "Blocked"))}: ${escapeHtml(String(s.blocked))}</div>`);
      }
      if (s.alerts) {
        lines.push(`<div class="ops-review-line">${escapeHtml(t("map.review.alerts", "Alerts"))}: ${escapeHtml(String(s.alerts))}</div>`);
      }
      if (!lines.length) {
        lines.push(`<div class="ops-review-line">${escapeHtml(t("map.review.empty", "No aggregate output in the public payload."))}</div>`);
      }
      return lines.join("");
    }

    function buildHandoffSteps(chips, agents, assignedKey = "") {
      const steps = [];
      const first = chips[0];
      if (first) steps.push({ text: `${first.label} → Universal`, inferred: true });
      steps.push({ text: `Universal → ${assignedKey || "ops"}`, inferred: true });
      const hasGitHub = chips.some((c) => c.label === "GitHub");
      const devBusy = agents.find((a) => a.key === "dev" && ["executing", "writing", "syncing", "researching"].includes(a.state));
      if (hasGitHub && devBusy) steps.push({ text: "GitHub → dev", inferred: true });
      const resBusy = agents.find((a) => a.key === "research" && ["executing", "researching", "writing", "syncing"].includes(a.state));
      if (resBusy) steps.push({ text: "Universal → research", inferred: true });
      const idleAgents = agents.filter((a) => a.state === "idle").length;
      if (agents.length && idleAgents < agents.length) {
        steps.push({ text: "ops → Review", inferred: true });
      }
      return steps.slice(0, 8);
    }

    function renderOperationsMap(data, agents) {
      sceneState.agents = agents;
      sceneState.agentMap = new Map(agents.map((a) => [a.key, a]));
      sceneState.visitor = null;
      const recognizedTask = deriveRecognizedTask(data, agents);
      sceneState.assignedRoutingKey = recognizedTask.assignedKey || "";

      const chips = buildIncomingChips(data);
      const incomingEl = document.getElementById("ops-incoming-chips");
      incomingEl.innerHTML = chips
        .map(
          (c) => `
        <div class="ops-chip">
          <div class="ops-chip-label">${escapeHtml(c.label)}</div>
          <div class="ops-chip-sub">${escapeHtml(c.sub)}</div>
        </div>`,
        )
        .join("");

      const router = deriveRouterLines(data, agents, recognizedTask);
      document.getElementById("ops-router-status").textContent = router.status;
      document.getElementById("ops-router-sub").textContent = router.sub || "—";
      document.getElementById("ops-router-task-body").textContent = recognizedTask.text || "—";
      const routerMeta = [
        recognizedTask.source ? `${t("map.router.source", "Source")}: ${recognizedTask.source}` : "",
        recognizedTask.assignedKey ? `${t("map.router.assigned", "Assigned")}: ${recognizedTask.assignedKey}` : "",
        recognizedTask.inferred ? t("map.router.inferred", "inferred from public signal") : "",
      ].filter(Boolean).join(" · ");
      document.getElementById("ops-router-task-meta").textContent = routerMeta || "—";

      document.getElementById("ops-review-panel").innerHTML = buildReviewHtml(data);

      const steps = buildHandoffSteps(chips, agents, sceneState.assignedRoutingKey);
      document.getElementById("ops-handoff-note").textContent = t("map.handoff.inferred", "Dashed steps are inferred from public signals.");
      document.getElementById("ops-handoff-timeline").innerHTML = steps
        .map(
          (s) => `
        <span class="ops-step${s.inferred ? " is-inferred" : ""}" role="listitem">${escapeHtml(s.text)}</span>`,
        )
        .join("");

      const grid = document.getElementById("ops-agent-grid");
      if (!agents.length) {
        grid.innerHTML = `<div class="ops-chip-sub">${escapeHtml(t("scene.no_agents", "No visible agents"))}</div>`;
      } else {
        grid.innerHTML = agents
          .map((a) => {
            const metaBits = [];
            if (a.source) metaBits.push(a.source);
            if (a.updated_at) metaBits.push(safeDate(a.updated_at));
            const meta = metaBits.join(" · ");
            const assignedClass = sceneState.assignedRoutingKey === a.key ? " is-assigned" : "";
            return `
          <div class="aom-node${assignedClass}" data-agent-key="${escapeHtml(a.key)}" role="button" tabindex="0">
            <div class="aom-node-head">
              <span class="aom-node-name">${escapeHtml(a.name)}</span>
              <span class="aom-node-state">${escapeHtml(a.state)}</span>
            </div>
            <div class="aom-node-summary">${escapeHtml(a.displayDetail || a.detail)}</div>
            ${meta ? `<div class="aom-node-meta">${escapeHtml(meta)}</div>` : ""}
            ${sceneState.assignedRoutingKey === a.key ? `<div class="aom-node-route">Universal → ${escapeHtml(a.key)}</div>` : ""}
          </div>`;
          })
          .join("");
      }

      const target = document.getElementById("sprite-layer");
      const shadowTarget = document.getElementById("shadow-layer");
      if (target) target.innerHTML = "";
      if (shadowTarget) shadowTarget.innerHTML = "";

      bindOpsMapInteractions();
      applyI18n();
      syncLegend();
      syncSelection();
    }

    function bindOpsMapInteractions() {
      const root = document.getElementById("ops-map");
      if (!root || root.dataset.mapBound === "1") return;
      root.addEventListener("click", (event) => {
        const node = event.target.closest(".aom-node");
        if (node) {
          const key = node.getAttribute("data-agent-key");
          sceneState.selectedKey = sceneState.selectedKey === key ? null : key;
          syncSelection();
        }
      });
      root.dataset.mapBound = "1";
    }

    function getAgentCapabilities(key) {
      const list = AGENT_CAPABILITIES[String(key || "").toLowerCase()] || AGENT_CAPABILITIES.default;
      return list.map(capabilityText);
    }

    function buildSceneAgents(agents) {
      const priority = ["dev", "ops", "research"];
      return (agents || [])
        .filter((agent) => agent.key !== "reception")
        .sort((a, b) => {
          const ai = priority.indexOf(a.key);
          const bi = priority.indexOf(b.key);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        })
        .slice(0, 3)
        .map((agent, index) => {

            route: behavior.route,
            baseRoute: behavior.route,
            anchor: behavior.anchor,
            baseAnchor: behavior.anchor,
            phase: index * 1.1,
            detail: summarizeAgent(agent),
            baseDetail: translateSummary(summarizeAgent(agent), key, state),

            updated_at: agent.updated_at || agent.last_seen || agent.last_update || "",

        `;

      detail.classList.remove("is-empty");
      detail.innerHTML = `

          <div class="detail-label">${t("detail.status", "Status")}</div>
          <div class="detail-value">${getEntityStatus(agent)}</div>
          <div class="detail-label">${t("detail.summary", "Current work")}</div>
          <div class="detail-value">${agent.displayDetail || agent.detail}</div>
          <div class="detail-label">${t("detail.updated", "Updated")}</div>
          <div class="detail-value">${safeDate(agent.updated_at)}</div>
          ${agent.status_label && agent.status_label !== getEntityStatus(agent) ? `<div class="detail-label">${t("detail.status_label", "Status label")}</div><div class="detail-value">${agent.status_label}</div>` : ""}
          ${agent.source ? `<div class="detail-label">${t("detail.source", "Source")}</div><div class="detail-value">${agent.source}</div>` : ""}
        </div>
        <div class="capabilities-list">
          <div class="detail-label">${t("detail.capabilities", "Capabilities")}</div>
          ${(agent.capabilities || []).map((item) => `<div class="capability-item">${escapeHtml(item)}</div>`).join("")}
        </div>
      `;
      const closeButton = detail.querySelector(".detail-close");
      if (closeButton) {
        closeButton.addEventListener("click", () => {
          sceneState.selectedKey = null;
          syncSelection();
        });
      }
    }

    function renderTooltip(agent, point) {
      const tooltip = document.getElementById("scene-tooltip");
      if (!agent || !point) {
        tooltip.classList.add("is-hidden");
        tooltip.classList.remove("is-visible");
        tooltip.innerHTML = "";
        return;
      }
      tooltip.innerHTML = `
        <div class="tooltip-name">${agent.name}</div>
        <div class="tooltip-meta">
              <span class="role-pill">${getEntityRole(agent)}</span>
          <span class="status-pill" style="--pill-color:${getEntityStateColor(agent)}">${getEntityStatus(agent)}</span>
        </div>
        <div class="tooltip-summary">${agent.displayDetail || agent.detail}</div>
      `;
      tooltip.style.left = `${point.x}px`;
      tooltip.style.top = `${Math.max(48, point.y - 14)}px`;
      tooltip.classList.remove("is-hidden");
      tooltip.classList.add("is-visible");
    }

    function syncSelection() {
      if (sceneState.selectedKey) {
        sceneState.hoveredKey = null;
        renderTooltip(null);
      }
      for (const agent of sceneState.agents) {
        if (agent.node) {
          agent.node.classList.toggle("is-selected", sceneState.selectedKey === agent.key);
        }
      }
      document.querySelectorAll(".aom-node").forEach((el) => {
        el.classList.toggle("is-selected", sceneState.selectedKey === el.getAttribute("data-agent-key"));
      });
      const selected = getSceneEntityByKey(sceneState.selectedKey);
      renderDetailPanel(selected || null);
    }

    function syncLegend() {
      const activeStates = new Set(sceneState.agents.map((agent) => String(agent.state || "idle").toLowerCase()));
      for (const chip of document.querySelectorAll(".legend-chip")) {
        const state = Array.from(chip.classList).find((name) => STATE_COLORS[name]);
        chip.classList.toggle("is-active", !!state && activeStates.has(state));
      }
    }

    function bindAgentInteractions() {
      const shell = document.querySelector(".scene-shell");
      for (const agent of sceneState.agents) {
        if (!agent.node) continue;
        agent.node.addEventListener("pointerenter", () => {
          sceneState.hoveredKey = agent.key;
          renderTooltip(agent, agent.lastScreenPoint || { x: 120, y: 120 });
        });
        agent.node.addEventListener("pointerleave", () => {
          if (sceneState.hoveredKey === agent.key) {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
        });
        agent.node.addEventListener("click", () => {
          sceneState.selectedKey = sceneState.selectedKey === agent.key ? null : agent.key;
          if (sceneState.selectedKey) {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
          syncSelection();
        });
      }
      if (shell && !shell.dataset.detailBound) {
        shell.addEventListener("click", (event) => {
          if (event.target.closest(".agent") || event.target.closest(".scene-detail") || event.target.closest(".aom-node")) return;
          sceneState.selectedKey = null;
          syncSelection();
        });
        shell.dataset.detailBound = "1";
      }
    }

    function renderAgents(agents) {
      const target = document.getElementById("sprite-layer");
      const shadowTarget = document.getElementById("shadow-layer");
      if (target) target.innerHTML = "";
      if (shadowTarget) shadowTarget.innerHTML = "";
      sceneState.agents = Array.isArray(agents) ? agents : [];
      sceneState.agentMap = new Map(sceneState.agents.map((a) => [a.key, a]));
      sceneState.visitor = null;
      sceneState.selectedKey = null;
      sceneState.assignedRoutingKey = "";
      renderTooltip(null);
      renderDetailPanel(null);
      const grid = document.getElementById("ops-agent-grid");
      if (grid) {
        grid.innerHTML = `<div class="ops-chip-sub">${escapeHtml(t("scene.no_agents", "No visible agents"))}</div>`;
      }
      syncLegend();
      syncSelection();
    }

    function applyVisitorEvent(nowSeconds) {
      if (!VISITOR_DEMO_ENABLED) return;
      const visitor = sceneState.visitor;
      const scenario = getVisitorScenario(nowSeconds);
      const ops = sceneState.agentMap.get("ops");
      const signature = scenario.active ? `${scenario.kind}` : "inactive";
      if (signature === sceneState.lastVisitorSignature) {
        return;
      }
      sceneState.lastVisitorSignature = signature;

      if (ops) {
        ops.route = ops.baseRoute;
        ops.anchor = ops.baseAnchor;
        ops.displayDetail = ops.baseDetail;
      }

      if (!visitor) return;

      if (!scenario.active) {
        visitor.active = false;
        visitor.node.classList.add("is-hidden");
        visitor.shadowNode.classList.add("is-hidden");
        if (sceneState.selectedKey === "visitor") {
          sceneState.selectedKey = null;
        }
        if (sceneState.hoveredKey === "visitor") {
          sceneState.hoveredKey = null;
          renderTooltip(null);
        }
        syncSelection();
        return;
      }

      visitor.active = true;
      visitor.kind = scenario.kind;
      visitor.name = scenario.name;
      visitor.roleLabelText = scenario.roleLabelText;
      visitor.stateLabelText = scenario.stateLabelText;
      visitor.displayDetail = scenario.displayDetail;
      visitor.point = scenario.point;
      visitor.node.classList.remove("is-hidden");
      visitor.shadowNode.classList.remove("is-hidden");

      if (ops && String(ops.state || "").toLowerCase() !== "error") {
        ops.route = resolveRoutePoints(VISITOR_EVENT.supportRoute);
        ops.anchor = snapToWalkmap(WALKMAP.points.entry_guest_ops || ops.baseAnchor);
        ops.displayDetail = t(`ops.event.${scenario.kind}`, scenario.kind);
      }

      if (sceneState.selectedKey === "visitor" || sceneState.selectedKey === "ops") {
        syncSelection();
      }
    }

    function ensureAnimation() {
      if (sceneState.frameHandle) {
        window.cancelAnimationFrame(sceneState.frameHandle);
        sceneState.frameHandle = null;
      }
    }

    async function loadPublicState() {
      const response = await fetch(`/api/public/state?v={{VERSION_TIMESTAMP}}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`public-state:${response.status}`);
      }
      return response.json();
    }

    async function loadInternalState() {
      try {
        const r = await fetch("/api/internal/state", { cache: "no-store" });
        if (!r.ok) return null;
        return r.json();
      } catch {
        return null;
      }
    }

    const _FEED_STATE_COLOR = {
      researching: "#8bc5ff",
      executing: "#ffc46b",
      writing: "#ffc46b",
      syncing: "#c4a2ff",
      routing: "#c4a2ff",
      error: "#ff6b7d",
      idle: "#7ee2c2",
    };

    function _feedDotColor(eventType, state) {
      if (state && _FEED_STATE_COLOR[state]) return _FEED_STATE_COLOR[state];
      const et = String(eventType || "").toLowerCase();
      if (/draft|reply|complet/.test(et)) return "#7ee2c2";
      if (/start|run|execut/.test(et)) return "#ffc46b";
      if (/fail|error/.test(et)) return "#ff6b7d";
      return "#9eb4d4";
    }

    function resolveRuntimeUiStatus(data) {
      const summary = data && data.summary ? data.summary : {};
      const intake = Array.isArray(data && data.intake) ? data.intake : [];
      const activity = Array.isArray(data && data.activity) ? data.activity : [];
      const events = Array.isArray(data && data.events) ? data.events : [];

      const hasFailed = events.some((e) => /runtime\.(failed|error)|task\.failed|error/i.test(String(e && e.event_type || "")))
        || activity.some((a) => String(a && a.state || "").toLowerCase() === "error");
      if (hasFailed) return "failed";

      const hasRunning = Number(summary.active_tasks || 0) > 0
        || activity.some((a) => ["researching", "executing", "syncing", "routing", "writing"].includes(String(a && a.state || "").toLowerCase()))
        || events.some((e) => /runtime\.(started|retrying|running)|task\.started/i.test(String(e && e.event_type || "")));
      if (hasRunning) return "running";

      const hasQueued = events.some((e) => /runtime\.queued|queued|retry/i.test(String(e && e.event_type || "")))
        || intake.some((item) => item && item.runtime_task_id && !item.reply_draft_content);
      if (hasQueued) return "queued";

      const hasCompleted = intake.some((item) => !!(item && item.reply_draft_content))
        || events.some((e) => /reply|draft|completed|task\.done/i.test(String(e && e.event_type || "")));
      if (hasCompleted) return "completed";

      return "idle";
    }

    function runtimeStatusLabel(status) {
      const normalized = String(status || "idle").toLowerCase();
      return `runtime: ${normalized}`;
    }

    function renderRuntimeStatus(data) {
      const row = document.getElementById("live-runtime-row");
      if (!row) return;
      const status = resolveRuntimeUiStatus(data);
      const statusClass = status === "running"
        ? "is-running"
        : status === "queued"
          ? "is-queued"
          : status === "completed"
            ? "is-completed"
            : status === "failed"
              ? "is-failed"
              : "";
      row.innerHTML = `<span class="rt-badge ${statusClass}"><span class="rt-dot"></span>${escapeHtml(runtimeStatusLabel(status))}</span>`;
      row.dataset.runtimeStatus = status;
    }

    function mapEventToSafeMessage(item, runtimeStatus) {
      const eventType = String(item && item.event_type || "").toLowerCase();
      if (/runtime\.queued|queued/.test(eventType)) return "待機中のruntimeがあります";
      if (/runtime\.offline|offline/.test(eventType)) return "runtimeはオフラインのため待機しています";
      if (/retry/.test(eventType)) return "待機中タスクを再実行しています";
      if (/draft|reply/.test(eventType)) return "返信案を作成しました";
      if (/task\.started|runtime\.started/.test(eventType)) return "返信案を生成中";
      if (/task\.failed|runtime\.failed|error/.test(eventType)) return "runtime処理でエラーが発生しました";

      if (runtimeStatus === "running") return "返信案を生成中";
      if (runtimeStatus === "queued") return "待機中のruntimeがあります";
      if (runtimeStatus === "completed") return "返信案を作成しました";
      if (runtimeStatus === "failed") return "runtime処理でエラーが発生しました";
      return "runtimeは待機中です";
    }

    function renderActivityFeed(data) {
      const feed = document.getElementById("scene-activity-feed");
      if (!feed) return;
      const runtimeStatus = resolveRuntimeUiStatus(data);
      const items = [];

      const intakeCount = Array.isArray(data && data.intake) ? data.intake.length : 0;
      if (intakeCount > 0) {
        items.push({ message: "新しい問い合わせを検知", event_type: "intake.detected", state: "syncing" });
      }

      for (const eventItem of (Array.isArray(data && data.events) ? data.events : []).slice(0, 8)) {
        const message = mapEventToSafeMessage(eventItem, runtimeStatus);
        if (!items.some((x) => x.message === message)) {
          items.push({ message, event_type: eventItem.event_type, state: eventItem.state });
        }
        if (items.length >= 5) break;
      }

      if (!items.length) {
        items.push({ message: "runtimeは待機中です", event_type: "runtime.idle", state: "idle" });
      }

      feed.innerHTML = items.slice(0, 5).map((row, idx) => {
        const color = _feedDotColor(row.event_type, row.state);
        return `<div class="feed-row" style="animation-delay:${idx * 0.06}s"><span class="feed-dot" style="background:${escapeHtml(color)}"></span><span class="feed-text">${escapeHtml(row.message)}</span></div>`;
      }).join("");
    }

    let _lastIntakeCount = -1;
    let _toastTimer = null;

    function maybeShowIntakeToast(data) {
      const toast = document.getElementById("intake-toast");
      if (!toast) return;
      const count = (data.intake || []).length;
      if (_lastIntakeCount < 0) { _lastIntakeCount = count; return; }
      if (count > _lastIntakeCount) {
        const msg = sceneState.lang === "ja" ? "新しい問い合わせが届きました"
          : sceneState.lang === "zh" ? "收到新咨询"
          : "New inquiry received";
        toast.textContent = msg;
        toast.classList.add("is-visible");
        if (_toastTimer) clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 4500);
      }
      _lastIntakeCount = count;
    }

    async function refreshScene() {
      try {
        const [publicData, internalData] = await Promise.all([
          loadPublicState(),
          loadInternalState(),
        ]);
        const agents = buildMapAgents((publicData && publicData.agents) || []);
        renderOperationsMap(publicData, agents);
        document.getElementById("live-sub").textContent = `${t("scene.updated", "Updated")} ${safeDate(publicData.health && publicData.health.latest_update)}`;
        if (internalData) {
          renderRuntimeStatus(internalData);
          renderActivityFeed(internalData);
          maybeShowIntakeToast(internalData);
        } else {
          renderRuntimeStatus({ summary: {}, intake: [], activity: [], events: [] });
          renderActivityFeed({ summary: {}, intake: [], activity: [], events: [] });
        }
      } catch (error) {
        document.getElementById("live-sub").textContent = t("scene.loading", "Loading office scene…");
        renderAgents([]);
        renderRuntimeStatus({ summary: {}, intake: [], activity: [], events: [] });
        renderActivityFeed({ summary: {}, intake: [], activity: [], events: [] });
        console.error(error);
      }
    }

    function startPolling() {
      if (sceneState.pollHandle) {
        window.clearInterval(sceneState.pollHandle);
      }
      sceneState.pollHandle = window.setInterval(refreshScene, 5000);
    }

    sceneState.lang = resolveLang();
    window.localStorage.setItem(LANG_KEY, sceneState.lang);
    applyI18n();
    applyEmbedOptions();
    refreshScene();
    ensureAnimation();
    startPolling();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        if (sceneState.pollHandle) window.clearInterval(sceneState.pollHandle);
        sceneState.pollHandle = window.setInterval(refreshScene, 45000);
        return;
      }
      refreshScene();
      startPolling();
    });
  </script>
<script>
(function(){
  var r=document.documentElement;
  window.dnSyncThemeToggleUi=function(){
    var cur=(r.getAttribute("data-theme")||"dark")==="dark"?"dark":"light",
        tip=cur==="dark"?"Switch to light mode":"Switch to dark mode";
    document.querySelectorAll("[data-theme-toggle]").forEach(function(b){
      b.setAttribute("aria-label",tip);
      b.setAttribute("title",tip);
    });
  };
  window.dnSetTheme=function(t){
    t=t==="light"?"light":"dark";
    r.setAttribute("data-theme",t);
    try{localStorage.setItem("dn-theme",t);}catch(e){}
    try{window.dnSyncThemeToggleUi();}catch(z){}
  };
  document.addEventListener("click",function(e){
    var x=e.target.closest("[data-theme-toggle]");
    if(!x)return;
    e.preventDefault();
    var c=(r.getAttribute("data-theme")||"dark")==="dark"?"dark":"light";
    window.dnSetTheme(c==="dark"?"light":"dark");
  });
  try{
    var mq=window.matchMedia("(prefers-color-scheme: light)");
    mq.addEventListener("change",function(){
      try{if(localStorage.getItem("dn-theme"))return;}catch(z){}
      window.dnSetTheme(mq.matches?"light":"dark");
    });
  }catch(y){}
  try{window.dnSyncThemeToggleUi();}catch(z2){}
})();
</script>
