        "feed.main.received":"お問い合わせを受け付けました","feed.main.started":"処理を開始しました","feed.main.completed":"処理が完了しました","feed.main.failed":"処理で問題が発生しました","feed.main.blocked":"確認待ちです","feed.main.alert":"実行環境でアラートを検知しました","feed.main.conn":"接続状態が変化しました","feed.main.analyzing":"お問い合わせ内容を分析しています","feed.main.drafting":"返信案を作成しています","feed.main.status":"処理状況を更新しました","feed.main.stuck":"処理が長時間続いています",
        "feed.sub.role.active":"が対応しています","feed.sub.role.done":"が完了しました",
        "tp.task":"処理中タスク","tp.done":"✓ 完了","tp.done.sub":"対応完了",
        "tp.runtime":"実行","tp.reply":"返信",
        "office.name":"AI Operations",
        "fetch.checking":"接続確認中",
        "fetch.live":"Live",
      },
      en: {
        "stage.incoming":"Incoming","stage.routing":"Routing","stage.agent":"Agent","stage.runtime":"Runtime","stage.result":"Result",
        "state.idle":"","state.queued":"queued","state.active":"active","state.completed":"done","state.failed":"error",
        "k.count":"count","k.cat":"category","k.svc":"service","k.recv":"recv","k.role":"role","k.why":"reason",
        "k.task":"task","k.stat":"status","k.tools":"tools","k.agent":"agent","k.reply":"reply","k.connector":"conn",
        "k.dur":"dur","k.since":"elapsed","k.sub":"sub",
        "role.dev":"Engineering","role.ops":"Operations","role.research":"Research","role.main":"Universal","role.universal":"Universal",
        "astate.idle":"standby","astate.executing":"executing","astate.researching":"researching","astate.syncing":"syncing",
        "astate.routing":"routing","astate.writing":"working","astate.error":"error","astate.available":"available",
        "rs.planning":"planning","rs.generating":"generating","rs.finishing":"finishing","rs.completed":"completed",
        "feed.recv":"recv","feed.start":"started","feed.done":"done","feed.fail":"failed",
        "feed.block":"blocked","feed.alert":"alert","feed.conn":"conn","feed.agent":"agent",
        "toast.intake":"New inquiry received",
        "no.data":"No data","updated":"Updated",
        "conn.ok":"ok","conn.error":"error","conn.degraded":"degraded",
        "reply.completed":"reply done","reply.pending":"pending","reply.failed":"failed",
        "status.waiting":"waiting","status.processing":"processing","status.done":"done","status.attention":"attention",
        "story.processing":"AI is working","story.completed":"Reply draft is ready","story.queued":"Waiting in queue","story.failed":"Needs attention",
        "story.desc.analyzing":"Analyzing the inquiry","story.desc.drafting":"Drafting a reply","story.desc.finishing":"Finishing the reply draft","story.desc.completed":"Processing is complete","story.desc.queued":"Waiting for its turn to run","story.desc.failed":"A processing issue was detected","story.desc.stuck":"Processing is taking longer than expected",
        "story.now":"NOW","reply.badge.completed":"reply ready","reply.badge.pending":"drafting reply","reply.badge.failed":"reply needs attention",
        "feed.main.received":"Inquiry received","feed.main.started":"Processing started","feed.main.completed":"Processing completed","feed.main.failed":"A processing issue occurred","feed.main.blocked":"Waiting for confirmation","feed.main.alert":"Runtime alert detected","feed.main.conn":"Connection status changed","feed.main.analyzing":"Analyzing the inquiry","feed.main.drafting":"Drafting a reply","feed.main.status":"Processing status updated","feed.main.stuck":"Processing is taking longer than expected",
        "feed.sub.role.active":"is handling this","feed.sub.role.done":"completed the task",
        "tp.task":"Current Task","tp.done":"✓ Done","tp.done.sub":"Completed",
        "tp.runtime":"runtime","tp.reply":"reply",
        "office.name":"AI Operations",
        "fetch.checking":"Reconnecting…",
        "fetch.live":"Live",
      },
    };

    /* ── App state ── */
    const params = new URLSearchParams(window.location.search);
    const app = {
      lang: "ja",
      lastIntakeCount: -1,
      toastTimer: null,
      pollHandle: null,
      prevResultState: null,
      completedGlowUntil: 0,
      selectedTaskId: null,   // null = auto-detect current
      taskListOpen: false,
      lastData: null,         // cached for switcher re-renders
      fetchState: "ok",       // ok | degraded
      lastFetchWarnAt: 0,
      taskEventMap: new Map(),
      taskStateMap: new Map(),
    };

    const FETCH_TIMEOUT_MS = 12000;
    const FETCH_WARN_THROTTLE_MS = 60000;

    function resolveLang() {
      const c = String(params.get("lang") || localStorage.getItem("deepnoa_ui_lang") || "ja").toLowerCase();
      return ["ja","en"].includes(c) ? c : "ja";
    }
    function t(key, fb) { return (I18N[app.lang] || I18N.ja)[key] ?? (I18N.ja[key] ?? (fb ?? key)); }
    function nowStr() { return new Date().toLocaleTimeString(app.lang === "ja" ? "ja-JP" : "en-US", { hour:"2-digit", minute:"2-digit" }); }
    function timeStr(iso) {
      if (!iso) return "--:--";
      const d = new Date(iso);
      return isNaN(d) ? "--:--" : d.toLocaleTimeString(app.lang === "ja" ? "ja-JP" : "en-US", { hour:"2-digit", minute:"2-digit" });
    }
    function isWithin(iso, secs) {
      if (!iso) return false;
      const ms = new Date(iso).getTime();
      return !isNaN(ms) && (Date.now() - ms) < secs * 1000;
    }
    function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    /* ── Duration formatting ── */
    function fmtDur(ms) {
      if (ms === null || ms === undefined || ms < 0) return null;
      if (ms < 1000)  return `0.${Math.floor(ms / 100)}s`;
      const s = Math.round(ms / 1000);
      if (s < 60)    return `${s}s`;
      const m = Math.floor(s / 60), rs = s % 60;
      return rs ? `${m}m ${rs}s` : `${m}m`;
    }
    function durCls(ms, done) {
      if (done) return "dc-done";
      if (ms > 180000) return "dc-long";
      return "";
    }

    /* ── Safe field extraction ── */
    function parseMeta(summary) {
      const s = String(summary || "");
      return {
        category: (s.match(/category=([a-z_]+)/i)  || [])[1] || null,
        service:  (s.match(/service=([a-zA-Z0-9_.\-]+)/i) || [])[1] || null,
      };
    }
    function safeDetail(detail) {
      const s = String(detail || "");
      if (/has_email=|has_phone=|has_message=|formspree/i.test(s)) {
        const m = parseMeta(s);
        return [m.category, m.service].filter(Boolean).join(" / ") || null;
      }
      return s || null;
    }
    function shortId(id) {
      const s = String(id || "");
      return s.length > 14 ? s.slice(0, 14) + "…" : s;
    }
    function connStatus(connectors) {
      if (!connectors || !connectors.length) return null;
      if (connectors.some(c => c.status === "error" || c.status === "offline")) return { label: t("conn.error"), cls: "danger" };
      if (connectors.some(c => c.status === "degraded")) return { label: t("conn.degraded"), cls: "danger" };
      return { label: t("conn.ok"), cls: "accent" };
    }

    function taskHasRecentFailure(events) {
      return (events || []).some(e => e.event_type === "task.failed" && isWithin(e.timestamp, 180));
    }
    function deriveTaskUx(latest, connOk, events, isStuck) {
      const rReply = latest?.reply_draft_status || null;
      const failed = !connOk || taskHasRecentFailure(events);
      if (isStuck) {
        return { badgeLabel: t("status.attention"), badgeCls: "b-failed", title: t("story.failed"), desc: t("story.desc.stuck") };
      }
      const completed = rReply === "completed" || latest?.runtime_status === "completed" || (events || []).some(e => e.event_type === "task.completed");
      if (failed) {
        return { badgeLabel: t("status.attention"), badgeCls: "b-failed", title: t("story.failed"), desc: t("story.desc.failed") };
      }
      if (completed) {
        return { badgeLabel: t("status.done"), badgeCls: "b-done", title: t("story.completed"), desc: t("story.desc.completed") };
      }
      if (rReply === "pending") {
        return { badgeLabel: t("status.processing"), badgeCls: "b-pending", title: t("story.processing"), desc: t("story.desc.finishing") };
      }
      if (latest) {
        return { badgeLabel: t("status.waiting"), badgeCls: "b-idle", title: t("story.queued"), desc: t("story.desc.queued") };
      }
      return { badgeLabel: "—", badgeCls: "b-idle", title: "", desc: "" };
    }
    function replyBadgeLabel(status) {
      if (!status) return null;
      return t(`reply.badge.${status}`, t(`reply.${status}`, status));
    }
    function describeFeedEvent(e) {
      const rp = e.raw_payload || {};
      const ri = rp.raw_item || {};
      const meta = parseMeta(rp.summary || ri.summary || e.display_summary || "");
      const roleKey = ri.role || e.agent_id || "";
      const roleLabel = roleKey ? t(`role.${roleKey}`, roleKey) : "";
      if (e.event_type === "channel.message.received") {
        return {
          main: t("feed.main.received"),
          sub: [meta.category, meta.service].filter(Boolean).join(" / ") || roleLabel,
        };
      }
      if (e.event_type === "task.started") {
        return {
          main: t("feed.main.started"),
          sub: roleLabel ? `${roleLabel} ${t("feed.sub.role.active")}` : "",
        };
      }
      if (e.event_type === "task.completed") {
        return {
          main: t("feed.main.completed"),
          sub: roleLabel ? `${roleLabel} ${t("feed.sub.role.done")}` : "",
        };
      }
      if (e.event_type === "task.failed") return { main: t("feed.main.failed"), sub: roleLabel };
      if (e.event_type === "task.blocked") return { main: t("feed.main.blocked"), sub: roleLabel };
      if (e.event_type === "connector.status.changed") return { main: t("feed.main.conn"), sub: e.source || "" };
      if (e.event_type === "runtime.alert") return { main: t("feed.main.alert"), sub: e.severity || "" };
      if (e.event_type === "runtime.stuck_warning") return { main: t("feed.main.stuck"), sub: e.route_reason || "" };
      const state = rp.state || ri.state || e.status || "";
      if (state === "researching") return { main: t("feed.main.analyzing"), sub: roleLabel };
      if (state === "executing" || state === "writing") return { main: t("feed.main.drafting"), sub: roleLabel };
      return { main: t("feed.main.status"), sub: roleLabel || state };
    }

    /* ── Task status classification ── */
    function taskKey(item) {
      if (!item || typeof item !== "object") return "";
      return String(item.runtime_task_id || item.id || item.task_id || "").trim();
    }

    function eventSignature(e) {
      return [
        eventTaskId(e) || "",
        e?.event_type || "",
        e?.timestamp || "",
        e?.status || "",
        e?.runtime_status || "",
        e?.route_reason || "",
      ].join("|");
    }

    function buildTaskEventMap(events) {
      const map = new Map();
      for (const e of events || []) {
        const tid = eventTaskId(e);
        if (!tid) continue;
        if (!map.has(tid)) map.set(tid, []);
        map.get(tid).push(e);
      }
      return map;
    }

    function buildTaskStateMap(taskEventMap) {
      const state = new Map();
      for (const [tid, evs] of (taskEventMap || new Map()).entries()) {
        const sorted = [...(evs || [])].sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
        if (sorted.length) state.set(tid, sorted[0]);
      }
      return state;
    }

    function mergeTaskEventMaps(currentMap, incomingMap) {
      const merged = new Map();
      for (const [tid, evs] of (currentMap || new Map()).entries()) {
        merged.set(tid, [...(evs || [])]);
      }
      for (const [tid, evs] of (incomingMap || new Map()).entries()) {
        const existing = merged.get(tid) || [];
        const sigs = new Set(existing.map(eventSignature));
        for (const e of (evs || [])) {
          const sig = eventSignature(e);
          if (sigs.has(sig)) continue;
          sigs.add(sig);
          existing.push(e);
        }
        existing.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
        merged.set(tid, existing.slice(0, 120));
      }
      return merged;
    }

    function intakeTaskIds(item) {
      if (!item || typeof item !== "object") return new Set();
      const s = new Set();
      for (const v of [item.runtime_task_id, item.id, item.task_id]) {
        const x = String(v || "").trim();
        if (x) s.add(x);
      }
      return s;
    }

    function intakeMatchesEventTask(intakeItem, eventTaskIdStr) {
      if (!intakeItem || !eventTaskIdStr) return false;
      return intakeTaskIds(intakeItem).has(String(eventTaskIdStr).trim());
    }

    function intakeMatchesCompleted(item, completedIds) {
      if (!completedIds || !completedIds.size) return false;
      for (const id of intakeTaskIds(item)) {
        if (completedIds.has(id)) return true;
      }
      return false;
    }

    function taskItemStatus(item, completedIds) {
      if (intakeMatchesCompleted(item, completedIds) || item.reply_draft_status === "completed") return "done";
      /* "active" = no completion signal AND received within 6 hours */
      if (isWithin(item.updated_at, 21600)) return "active";
      return "old";
    }

    /* ── Pick the best "current" task ── */
    /* Priority: not-completed → most recent updated_at → fallback intake[0] */
    function pickCurrentTask(intake, events) {
      /* Honour manual selection if task still exists */
      if (app.selectedTaskId) {
        const manual = intake.find(i => intakeTaskIds(i).has(app.selectedTaskId));
        if (manual) return manual;
        app.selectedTaskId = null; /* gone from list — clear override */
      }

      /* IDs that have a task.completed event */
      const completedIds = new Set(
        (events || []).filter(e => e.event_type === "task.completed")
          .map(e => eventTaskId(e)).filter(Boolean)
      );
      for (const [tid, st] of (app.taskStateMap || new Map()).entries()) {
        const et = String(st?.event_type || "");
        if (et === "task.completed" || et === "runtime.completed") completedIds.add(tid);
      }

      /* Filter: exclude tasks that are definitively done */
      const open = intake.filter(item => {
        if (intakeMatchesCompleted(item, completedIds)) return false;
        if (item.reply_draft_status === "completed") return false;
        if (item.runtime_status   === "completed") return false;
        return true;
      });

      /* Sort open tasks: most recent first */
      open.sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));

      return open[0] || intake[0] || null;
    }

    function taskEventsFor(events, intakeItem) {
      if (!intakeItem) return [];
      const ids = intakeTaskIds(intakeItem);
      if (!ids.size) return [];
      const merged = [];
      const seen = new Set();
      for (const id of ids) {
        const cached = (app.taskEventMap && app.taskEventMap.get(id)) || [];
        for (const e of cached) {
          const sig = eventSignature(e);
          if (seen.has(sig)) continue;
          seen.add(sig);
          merged.push(e);
        }
      }
      for (const e of (events || [])) {
        if (!intakeMatchesEventTask(intakeItem, eventTaskId(e))) continue;
        const sig = eventSignature(e);
        if (seen.has(sig)) continue;
        seen.add(sig);
        merged.push(e);
      }
      merged.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
      return merged;
    }

    function latestTaskEvent(taskEvents) {
      if (!taskEvents || !taskEvents.length) return null;
      const sorted = [...taskEvents].sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
      return sorted[0] || null;
    }

    function isTaskStuck(taskEvents) {
      if (!taskEvents || !taskEvents.length) return false;

      let lastWarning = 0;
      let lastCompleted = 0;
      let lastStarted = 0;

      for (const e of taskEvents) {
        const t = new Date(e.timestamp || 0).getTime();
        if (isNaN(t)) continue;

        if (e.event_type === "runtime.stuck_warning") {
          lastWarning = Math.max(lastWarning, t);
        }

        if (e.event_type === "runtime.started") {
          lastStarted = Math.max(lastStarted, t);
        }

        if (
          e.event_type === "runtime.completed" ||
          e.event_type === "task.completed" ||
          e.event_type === "runtime.retry_completed"
        ) {
          lastCompleted = Math.max(lastCompleted, t);
        }
      }

      if (lastWarning > lastCompleted) return true;

      if (lastStarted > 0 && lastCompleted < lastStarted) {
        return (Date.now() - lastStarted) >= 300000;
      }
      return false;
    }

    /* ── Extract task_id from event ── */
    function eventTaskId(e) {
      if (!e) return null;
      const rp = e.raw_payload || {};
      const ri = rp.raw_item   || {};
      return e.task_id || ri.runtime_task_id || rp.task_id || null;
    }

    /* ── Pipeline stage derivation ── */
    function deriveStages(data) {
      const intake     = data.intake     || [];
      const events     = (data.events    || []).slice(0, 60);
      const roles      = data.roles      || [];
      const connectors = data.connectors || [];
      const manager    = data.manager    || {};

      const latest  = pickCurrentTask(intake, events);
      const meta    = parseMeta(latest?.summary || "");
      const rTaskId = taskKey(latest) || null;
      const rRole   = latest?.role || null;
      const rReply  = latest?.reply_draft_status || null;
      const taskEvents = taskEventsFor(events, latest);
      const latestEvt = (rTaskId && app.taskStateMap.get(rTaskId)) || latestTaskEvent(taskEvents);
      const taskMeta = parseMeta(latestEvt?.raw_payload?.summary || latestEvt?.display_summary || "");

      const routeEvent  = taskEvents.find(e => e.event_type === "task.started" && e.raw_payload?.route_reason);
      const routeReason = routeEvent?.raw_payload?.route_reason || null;

      function recentEvt(type, secs = 90) { return taskEvents.some(e => e.event_type === type && isWithin(e.timestamp, secs)); }

      /* ── Timing derivation ── */
      const now = Date.now();
      /* Events are newest-first; find the matching pair for latest intake */
      const intakeTs = latest?.updated_at ? new Date(latest.updated_at).getTime() : null;

      /* task.started that is closest to (not before) intake timestamp */
      const startEvt  = routeEvent || taskEvents.find(e => e.event_type === "task.started") || taskEvents.find(e => e.event_type === "runtime.started") || null;
      const startTs   = startEvt ? new Date(startEvt.timestamp).getTime() : null;

      /* task.completed nearest to start */
      const doneEvt   = taskEvents.find(e => e.event_type === "task.completed" || e.event_type === "runtime.completed") || null;
      const doneTs    = doneEvt  ? new Date(doneEvt.timestamp).getTime()   : null;
      const isStuck   = isTaskStuck(taskEvents);

      /* Durations (ms) */
      const routingDurMs = (intakeTs && startTs) ? Math.max(0, startTs - intakeTs) : null;
      const agentDurMs   = startTs ? (doneTs ? doneTs - startTs : now - startTs) : null;
      const totalDurMs   = intakeTs ? (doneTs ? doneTs - intakeTs : now - intakeTs) : null;
      const agentDone    = !!doneTs;

      /* ── State derivation ── */
      const intakeState  = (intake.length > 0 || recentEvt("channel.message.received", 120)) ? "active" : "idle";
      const routeState   = recentEvt("task.started", 70) ? "active" : "idle";
      const agentState   = recentEvt("task.failed", 300) ? "failed" : (startEvt && !doneEvt ? "active" : "idle");
      const connStat     = connStatus(connectors);
      const connOk       = !connStat || connStat.cls !== "danger";
      const runtimeState = isStuck ? "failed" : (!connOk ? "failed" : (startEvt && !doneEvt) ? "active" : (rReply || doneEvt) ? "completed" : "idle");
      const resultState  = recentEvt("task.failed", 90) ? "failed"
                         : (rReply === "completed" || doneEvt) ? "completed"
                         : rReply ? "active" : "idle";

      /* ── Runtime sub-state ── */
      let runtimeSubState = null;
      if (runtimeState !== "idle") {
        if (resultState === "completed" || rReply === "completed" || doneEvt)
          runtimeSubState = "completed";
        else if (isStuck)
          runtimeSubState = "stuck";
        else if (rReply === "pending")
          runtimeSubState = "finishing";
        else if (recentEvt("runtime.started", 600) || startEvt)
          runtimeSubState = "generating";
      }

      const routeAgentLabel = (rRole || routeEvent?.agent_id || latestEvt?.agent_id || "").toLowerCase();
      const agentLabel = (latestEvt?.agent_id || rRole || "").toLowerCase();

      const taskActiveStates = new Set(["active","queued","completed"]);

      /* Helper: duration chip HTML */
      function durRow(k, ms, done) {
        const str = fmtDur(ms);
        if (!str) return null;
        return { k, v: str, cls: ms > 180000 ? "danger" : done ? "blue" : "orange" };
      }

      const STAGES = [
        {
          id: "incoming", sym: "↓", state: intakeState,
          taskId: intakeState !== "idle" ? rTaskId : null,
          rows: [
            intake.length      ? { k:t("k.count"), v:`${intake.length}件`, cls:"accent" } : null,
            meta.category      ? { k:t("k.cat"),   v:meta.category } : null,
            meta.service       ? { k:t("k.svc"),   v:meta.service  } : null,
            latest?.updated_at ? { k:t("k.recv"),  v:timeStr(latest.updated_at), cls:"mono" } : null,
            /* Elapsed since intake (always counting up while active) */
            (totalDurMs !== null && intakeState !== "idle") ? durRow(t("k.since"), totalDurMs, agentDone) : null,
          ].filter(Boolean), tools: [],
        },
        {
          id: "routing", sym: "⇄", state: routeState,
          taskId: taskActiveStates.has(routeState) ? rTaskId : null,
          rows: [
            routeAgentLabel ? { k:t("k.role"), v:t(`role.${routeAgentLabel}`, routeAgentLabel) } : null,
            routeReason     ? { k:t("k.why"),  v:routeReason, cls:"mono" } : null,
            manager?.gateway?.status ? { k:t("k.stat"), v:String(manager.gateway.status) } : null,
            /* Routing duration — show even if ~0 when routing completed */
            (routingDurMs !== null && routeState !== "idle") ? durRow(t("k.dur"), routingDurMs, !!startTs) : null,
          ].filter(Boolean), tools: [],
        },
        {
          id: "agent", sym: "◉", state: agentState,
          taskId: taskActiveStates.has(agentState) ? rTaskId : null,
          rows: [
            agentLabel      ? { k:t("k.agent"), v:t(`role.${agentLabel}`, agentLabel) } : null,
            latestEvt?.status ? { k:t("k.stat"),  v:String(latestEvt.status) } : null,
            (latest?.service || taskMeta.service || meta.service) ? { k:t("k.svc"), v: latest?.service || taskMeta.service || meta.service } : null,
            /* Agent time since task started */
            (agentDurMs !== null && agentState !== "idle") ? durRow(t("k.since"), agentDurMs, agentDone) : null,
          ].filter(Boolean), tools: [],
        },
        {
          id: "runtime", sym: "▶", state: runtimeState,
          taskId: taskActiveStates.has(runtimeState) ? rTaskId : null,
          rows: [
            /* Sub-state row — this is the key "where in processing" indicator */
            runtimeSubState ? { k:t("k.sub"), v: runtimeSubState === "stuck" ? t("status.attention") : t(`rs.${runtimeSubState}`, runtimeSubState), cls: runtimeSubState === "stuck" ? "danger" : runtimeSubState === "completed" ? "blue" : runtimeSubState === "planning" ? "purple" : "orange" } : null,
            rReply   ? { k:t("k.reply"),     v:t(`reply.${rReply}`, rReply), cls: rReply === "completed" ? "blue" : "muted" } : null,
            connStat ? { k:t("k.connector"), v:connStat.label, cls:connStat.cls } : null,
            (agentDurMs !== null && runtimeState !== "idle") ? durRow(t("k.dur"), agentDurMs, agentDone) : null,
          ].filter(Boolean), tools: [],
        },
        {
          id: "result", sym: "✓", state: resultState,
          taskId: resultState !== "idle" ? rTaskId : null,
          rows: [
            rReply       ? { k:t("k.reply"), v:t(`reply.${rReply}`, rReply), cls: rReply === "completed" ? "blue" : "muted" } : null,
            rRole        ? { k:t("k.role"),  v:t(`role.${rRole}`, rRole) } : null,
            latest?.updated_at ? { k:t("k.recv"), v:timeStr(latest.updated_at), cls:"mono" } : null,
            /* Total duration on completion */
            (totalDurMs !== null && resultState !== "idle") ? durRow(t("k.dur"), totalDurMs, resultState === "completed") : null,
          ].filter(Boolean), tools: [],
        },
      ];

      const connectorActive = STAGES.slice(0,-1).map((s,i) => {
        const next = STAGES[i+1];
        return (s.state === "active" || s.state === "completed") && next.state !== "idle";
      });

      return { stages: STAGES, connectorActive, activeTaskId: rTaskId, resultState, intakeTs };
    }

    /* ── Pipeline render ── */
    function renderPipeline({ stages, connectorActive, activeTaskId, resultState }) {
      const track = document.getElementById("pipeline-track");
      if (!track) return;

      const glowing = Date.now() < app.completedGlowUntil;

      const parts = [];
      stages.forEach((s, i) => {
        const stateText = t(`state.${s.state}`);
        const rows = s.rows.map(r =>
          `<div class="stage-row"><span class="row-k">${esc(r.k)}</span><span class="row-v${r.cls?" "+r.cls:""}">${esc(r.v)}</span></div>`
        ).join("");
        const toolHtml = s.tools.length
          ? `<div class="tool-tags">${s.tools.map(tg=>`<span class="tool-tag">${esc(tg)}</span>`).join("")}</div>` : "";

        const showTaskId = s.taskId && activeTaskId && s.state !== "idle";
        const taskHi = s.state === "active";
        const taskFooter = showTaskId
          ? `<div class="stage-task-id${taskHi?" task-hi":""}">⊢ ${esc(shortId(s.taskId))}</div>` : "";

        const hasActiveTask = s.state === "active" && s.taskId;
        const isResultGlow  = s.id === "result" && glowing;

        parts.push(
          `<div class="stage-card stage-${s.state}${hasActiveTask?" has-active-task":""}${isResultGlow?" glow-once":""}">` +
          `<div class="stage-hd">` +
          `<div class="stage-ring"><span class="stage-sym">${esc(s.sym)}</span></div>` +
          `<div class="stage-lbl">${esc(t(`stage.${s.id}`))}</div>` +
          `<div class="stage-badge">${esc(stateText)}</div>` +
          `</div>` +
          `<div class="stage-bd">${rows}${toolHtml}${taskFooter}</div>` +
          `</div>`
        );

        if (i < stages.length - 1) {
          parts.push(
            `<div class="stage-gap${connectorActive[i]?" gap-active":""}">` +
            `<div class="gap-line"><div class="gap-sweep"></div></div>` +
            `<span class="gap-arrow">›</span>` +
            `</div>`
          );
        }
      });

      track.innerHTML = parts.join("");
    }

    /* ── Current Task Panel ── */
    function renderTaskPanel(data) {
      const panel = document.getElementById("task-panel");
      if (!panel) return;

      const intake   = data.intake || [];
      const events   = (data.events || []).slice(0, 60);

      /* Use smart selection — respects manual override */
      const latest   = pickCurrentTask(intake, events);
      const rTaskId  = taskKey(latest) || null;
      if (!latest || !rTaskId) { panel.classList.add("is-hidden"); return; }

      const isManual = !!app.selectedTaskId;

      const meta    = parseMeta(latest.summary || "");
      const rRole   = latest.role || null;
      const rReply  = latest.reply_draft_status || null;
      const taskEvents = taskEventsFor(events, latest);
      const latestEvt = (rTaskId && app.taskStateMap.get(rTaskId)) || latestTaskEvent(taskEvents);
      const eventMeta = parseMeta(latestEvt?.raw_payload?.summary || latestEvt?.display_summary || "");

      const connectors = data.connectors || [];
      const doneEvt     = taskEvents.find(e => e.event_type === "task.completed" || e.event_type === "runtime.completed") || null;
      const connStat    = connStatus(connectors);
      const connOk      = !connStat || connStat.cls !== "danger";
      const isStuck     = isTaskStuck(taskEvents);

      /* Timing */
      const now      = Date.now();
      const intakeTs = latest.updated_at ? new Date(latest.updated_at).getTime() : null;
      const doneTs   = doneEvt ? new Date(doneEvt.timestamp).getTime() : null;
      const totalMs  = intakeTs ? (doneTs || now) - intakeTs : null;
      const isCompleted = (rReply === "completed") || !!doneEvt;

      const taskUx = deriveTaskUx(latest, connOk, taskEvents, isStuck);
      const runtimeBadge = { label: taskUx.badgeLabel, cls: taskUx.badgeCls };

      let replyBadge = null;
      if (rReply) {
        const cls = rReply === "completed" ? "b-done" : rReply === "failed" ? "b-failed" : "b-pending";
        replyBadge = { label: replyBadgeLabel(rReply), cls };
      }

      const panelMod = isCompleted ? "tp-done" : rReply === "failed" ? "tp-failed" : "tp-active";
      const idCls    = isCompleted ? "tp-id-done" : rReply === "failed" ? "tp-id-failed" : "";

      /* Completion banner (shown left of task_id when done) */
      const doneBannerHtml = isCompleted
        ? `<div class="tp-done-banner"><span class="tp-done-mark">✓</span><span class="tp-done-label">${esc(t("tp.done.sub"))}</span></div>` : "";

      /* Fields */
      const durStr = totalMs !== null ? fmtDur(totalMs) : null;
      const fields = [
        meta.category ? { k:t("k.cat"),   v:meta.category, cls:"" } : null,
        (latest?.service || meta.service || eventMeta.service) ? { k:t("k.svc"), v: (latest?.service || meta.service || eventMeta.service), cls:"" } : { k:t("k.svc"), v:"—", cls:"tv-muted" },
        rRole         ? { k:t("k.role"),   v:t(`role.${rRole}`, rRole), cls:"" } : null,
        durStr        ? { k:t("k.since"),  v:durStr, cls:"tv-orange" } : null,
      ].filter(Boolean);

      const fieldsHtml = fields.map(f =>
        `<div class="tp-field"><span class="tp-k">${esc(f.k)}</span><span class="tp-v ${f.cls}">${esc(f.v)}</span></div>`
      ).join("");

      const badgesHtml = [
        `<div class="tp-badge ${runtimeBadge.cls}"><span class="tp-badge-dot"></span>${esc(runtimeBadge.label)}</div>`,
        replyBadge ? `<div class="tp-badge ${replyBadge.cls}"><span class="tp-badge-dot"></span>${esc(replyBadge.label)}</div>` : "",
      ].join("");

      const storyHtml =
        `<div class="tp-story">` +
        `<span class="tp-story-kicker">${esc(t("story.now"))}</span>` +
        `<div class="tp-story-title">${esc(taskUx.title)}</div>` +
        `<div class="tp-story-desc">${esc(taskUx.desc)}</div>` +
        `</div>`;

      /* Count chip — shows total intake count, clickable to open switcher */
      const totalCount  = intake.length;
      const openCount   = intake.filter(i => i.reply_draft_status !== "completed").length;
      const countLabel  = app.lang === "ja"
        ? `${openCount}件処理中 / ${totalCount}件`
        : `${openCount} open / ${totalCount}`;
      const manualTag   = isManual
        ? `<span class="tp-manual-tag">${app.lang === "ja" ? "手動選択" : "manual"}</span>` : "";
      const countChipHtml =
        `<span class="tp-count-chip${app.taskListOpen?" is-open":""}" id="task-count-chip" onclick="toggleTaskSwitcher()">` +
        `☰ ${esc(countLabel)}` +
        `</span>${manualTag}`;

      panel.className = `task-panel ${panelMod}`;
      panel.innerHTML =
        doneBannerHtml +
        `<div class="tp-id-col">` +
        `<span class="tp-id-label">${esc(t("tp.task"))}</span>` +
        `<span class="tp-id-val ${idCls}">${esc(shortId(rTaskId))}</span>` +
        `</div>` +
        storyHtml +
        `<div class="tp-fields">${fieldsHtml}</div>` +
        `<div class="tp-badges">${badgesHtml}${countChipHtml}</div>`;
    }

    /* ── Task Switcher ── */
    function renderTaskSwitcher() {
      const sw = document.getElementById("task-switcher");
      if (!sw || !app.lastData) return;

      const intake  = app.lastData.intake || [];
      const events  = (app.lastData.events || []).slice(0, 60);

      const autoTask     = pickCurrentTask(intake, events);
      const autoId       = autoTask ? taskKey(autoTask) : null;
      const selectedId   = app.selectedTaskId;

      /* Build completed-id set */
      const completedIds = new Set(
        events.filter(e => e.event_type === "task.completed")
          .map(e => eventTaskId(e)).filter(Boolean)
      );

      /* Sort: active first (not done), then by recency */
      const sorted = [...intake].sort((a, b) => {
        const aStatus = taskItemStatus(a, completedIds);
        const bStatus = taskItemStatus(b, completedIds);
        const order = { active: 0, old: 1, done: 2 };
        if (order[aStatus] !== order[bStatus]) return order[aStatus] - order[bStatus];
        return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
      });

      /* Section labels */
      let lastSection = null;
      const rows = sorted.map(item => {
        const id      = taskKey(item);
        const status  = taskItemStatus(item, completedIds);
        const meta    = parseMeta(item.summary || "");
        const isAuto  = id === autoId && !selectedId;
        const isSel   = !!(selectedId && intakeTaskIds(item).has(selectedId));
        const role    = t(`role.${item.role}`, item.role || "");
        const metaStr = [meta.category, meta.service].filter(Boolean).join(" / ");
        const dotCls  = status === "active" ? "d-active" : status === "done" ? "d-done" : "d-old";
        const badgeCls = status === "active" ? "tb-active" : status === "done" ? "tb-done" : "tb-old";
        const badgeLbl = status === "active"
          ? (app.lang === "ja" ? "処理中" : "open")
          : status === "done"
          ? (app.lang === "ja" ? "完了" : "done")
          : (app.lang === "ja" ? "古い" : "old");

        /* Section divider */
        let sectionHtml = "";
        if (status !== lastSection) {
          lastSection = status;
          const sLbl = status === "active"
            ? (app.lang === "ja" ? "処理中" : "In progress")
            : status === "done"
            ? (app.lang === "ja" ? "完了済み" : "Completed")
            : (app.lang === "ja" ? "古いタスク" : "Older");
          sectionHtml = `<div class="ts-section-lbl">${esc(sLbl)}</div>`;
        }

        const autoMarker = isAuto ? (app.lang === "ja" ? " ◀ 現在" : " ◀ current") : "";

        return (
          sectionHtml +
          `<div class="ts-row${isSel?" ts-selected":""}${isAuto?" ts-is-auto":""}" data-task-id="${esc(id)}">` +
          `<div class="ts-dot ${dotCls}"></div>` +
          `<div class="ts-body">` +
          `<div class="ts-id">${esc(shortId(id))}${esc(autoMarker)}</div>` +
          `<div class="ts-meta">${esc(role)}${metaStr ? " · " + esc(metaStr) : ""}</div>` +
          `</div>` +
          `<span class="ts-time">${esc(timeStr(item.updated_at))}</span>` +
          `<span class="ts-badge ${badgeCls}">${esc(badgeLbl)}</span>` +
          `</div>`
        );
      }).join("");

      const autoLbl   = app.lang === "ja" ? "自動に戻す" : "reset to auto";
      const headerLbl = app.lang === "ja"
        ? `タスク一覧 — ${intake.length}件`
        : `All tasks — ${intake.length}`;

      sw.innerHTML =
        `<div class="ts-hd">` +
        `<span class="ts-hd-lbl">${esc(headerLbl)}</span>` +
        `<div class="ts-hd-actions">` +
        (selectedId ? `<span class="ts-hd-auto" onclick="clearTaskSelection()">${esc(autoLbl)}</span>` : "") +
        `<span class="ts-hd-close" onclick="closeTaskSwitcher()">✕</span>` +
        `</div></div>` +
        `<div class="ts-list">${rows}</div>`;
    }

    function positionTaskSwitcher() {
      const chip = document.getElementById("task-count-chip");
      const sw   = document.getElementById("task-switcher");
      if (!chip || !sw) return;
      const rect = chip.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom - 8;
      const spaceAbove = rect.top - 8;
      if (spaceBelow >= 200 || spaceBelow >= spaceAbove) {
        sw.style.top    = (rect.bottom + 6) + "px";
        sw.style.bottom = "auto";
      } else {
        sw.style.bottom = (window.innerHeight - rect.top + 6) + "px";
        sw.style.top    = "auto";
      }
      /* Align right edge to chip right edge */
      const right = window.innerWidth - rect.right;
      sw.style.right = Math.max(8, right) + "px";
      sw.style.left  = "auto";
    }

    function toggleTaskSwitcher() {
      if (app.taskListOpen) { closeTaskSwitcher(); return; }
      app.taskListOpen = true;
      const sw = document.getElementById("task-switcher");
      if (!sw) return;
      sw.classList.remove("is-hidden");
      positionTaskSwitcher();
      renderTaskSwitcher();
      /* Sync chip open state */
      const chip = document.getElementById("task-count-chip");
      if (chip) chip.classList.add("is-open");
    }

    function closeTaskSwitcher() {
      app.taskListOpen = false;
      const sw   = document.getElementById("task-switcher");
      const chip = document.getElementById("task-count-chip");
      if (sw)   sw.classList.add("is-hidden");
      if (chip) chip.classList.remove("is-open");
    }

    function selectTask(taskId) {
      if (app.selectedTaskId === taskId) {
        app.selectedTaskId = null; /* toggle off */
      } else {
        app.selectedTaskId = taskId;
      }
      if (app.lastData) renderAll(app.lastData);
      renderTaskSwitcher();
    }

    function clearTaskSelection() {
      app.selectedTaskId = null;
      if (app.lastData) renderAll(app.lastData);
      renderTaskSwitcher();
    }

    /* ── Agent cards ── */
    function dotClass(state) {
      const s = String(state || "").toLowerCase();
      if (s === "executing" || s === "writing") return "s-active";
      if (s === "routing")     return "s-routing";
      if (s === "researching") return "s-research";
      if (s === "syncing")     return "s-syncing";
      if (s === "error")       return "s-error";
      if (s === "available")   return "s-universal";
      return "";
    }

    function renderAgentCards(data) {
      const scroll   = document.getElementById("agent-scroll");
      if (!scroll) return;
      const manager  = data.manager || {};
      const roles    = (data.roles || []).filter(r => ["dev","ops","research"].includes(r.key));
      const ev       = (data.events || []).slice(0, 60);
      const latest   = pickCurrentTask(data.intake || [], ev);
      const activeTaskId = taskKey(latest) || null;

      const cards = [];
      const gw = manager.gateway || {}, fw = manager.fallback_worker || {};
      cards.push({ name: fw.name || "Universal Router", role: t("role.universal"), state: gw.status || "受付中", dot: "s-universal", detail: gw.detail || fw.profile || "", tools: fw.allowed_tools || [], taskId: null, isActiveTask: false });

      const priority = ["research","dev","ops"];
      for (const r of [...roles].sort((a,b) => priority.indexOf(a.key) - priority.indexOf(b.key))) {
        const safeD    = safeDetail(r.detail || "");
        const rTaskId  = r.key === latest?.role ? activeTaskId : null;
        const isActive = ["executing","researching","writing"].includes(r.state);
        cards.push({ name: r.name || t(`role.${r.key}`, r.key), role: t(`role.${r.key}`, r.key), state: t(`astate.${r.state}`, r.state), dot: dotClass(r.state), detail: safeD, tools: (r.allowed_tools || []).slice(0, 3), taskId: rTaskId, isActiveTask: isActive && !!rTaskId });
      }

      scroll.innerHTML = cards.map(c => {
        const toolHtml   = c.tools.length ? `<div class="card-tools tool-tags">${c.tools.map(tg=>`<span class="tool-tag">${esc(tg)}</span>`).join("")}</div>` : "";
        const taskHtml   = c.taskId  ? `<div class="card-task">⊢ ${esc(shortId(c.taskId))}</div>` : "";
        const detailHtml = c.detail  ? `<div class="card-detail">${esc(c.detail)}</div>` : "";
        return (
          `<div class="agent-card${c.isActiveTask?" is-active-task":""}">` +
          `<div class="card-top"><div class="card-dot-wrap"><div class="card-dot ${c.dot}"></div></div>` +
          `<div class="card-info"><div class="card-name">${esc(c.name)}</div>` +
          `<div class="card-role-state"><span class="card-role">${esc(c.role)}</span><span class="card-state">${esc(c.state)}</span></div>` +
          `</div></div>${detailHtml}${toolHtml}${taskHtml}</div>`
        );
      }).join("");
    }

    /* ── Activity Feed (grouped by task_id, with deltas) ── */
    const FEED_TYPE = {
      "channel.message.received": { lbl:"feed.recv",  cls:"t-recv"  },
      "task.started":             { lbl:"feed.start", cls:"t-start" },
      "task.completed":           { lbl:"feed.done",  cls:"t-done"  },
      "task.blocked":             { lbl:"feed.block", cls:"t-block" },
      "task.failed":              { lbl:"feed.fail",  cls:"t-fail"  },
      "connector.status.changed": { lbl:"feed.conn",  cls:""        },
      "runtime.alert":            { lbl:"feed.alert", cls:"t-alert" },
      "runtime.stuck_warning":    { lbl:"feed.alert", cls:"t-alert" },
      "agent.status.changed":     { lbl:"feed.agent", cls:""        },
    };

    function buildFeedRow(e, grouped, isActiveTask, deltaMs) {
      const ft = FEED_TYPE[e.event_type];
      if (!ft) return null;
      const { main, sub } = describeFeedEvent(e);

      const isDone = e.event_type === "task.completed";
      const extraCls = isDone ? " is-done-row" : isActiveTask ? " is-active-task" : "";

      /* Delta chip */
      const dStr   = deltaMs !== null ? fmtDur(deltaMs) : null;
      const dClass = dStr ? (deltaMs > 180000 ? "fd-long" : isDone ? "fd-done" : "") : "";
      const deltaHtml = dStr ? `<span class="feed-delta ${dClass}">+${esc(dStr)}</span>` : `<span></span>`;

      return (
        `<div class="feed-row${grouped?" feed-row-grouped":""}${extraCls}">` +
        `<span class="feed-time">${esc(timeStr(e.timestamp))}</span>` +
        `<span class="feed-type ${ft.cls}">${esc(t(ft.lbl))}</span>` +
        `<div class="feed-body">` +
        `<div class="feed-main">${esc(main)}</div>` +
        (sub ? `<div class="feed-sub">${esc(sub)}</div>` : "") +
        `</div>` +
        deltaHtml +
        `</div>`
      );
    }

    function renderFeed(data) {
      const list = document.getElementById("feed-list");
      if (!list) return;

      const intake = data.intake || [];
      const events = (data.events || []).slice(0, 30).filter(e => FEED_TYPE[e.event_type]);
      const currentTask = pickCurrentTask(intake, data.events || []);
      const activeTaskId = taskKey(currentTask) || null;
      if (!events.length) { list.innerHTML = `<div class="feed-empty">${t("no.data")}</div>`; return; }

      /* Group consecutive events by task_id */
      const groups = [];
      for (const e of events) {
        const tid = eventTaskId(e);
        const last = groups[groups.length - 1];
        if (last && last.taskId === tid) last.evts.push(e);
        else groups.push({ taskId: tid, evts: [e] });
      }

      const parts = [];
      for (const g of groups) {
        const isActiveGroup = !!(g.taskId && currentTask && intakeMatchesEventTask(currentTask, g.taskId));
        const hasMulti = g.evts.length > 1;

        /* Compute anchor timestamp for delta (earliest = last in array if newest-first) */
        const anchors = g.evts.map(e => new Date(e.timestamp).getTime()).filter(n => !isNaN(n));
        const anchorTs = anchors.length ? Math.min(...anchors) : null;

        if (g.taskId && hasMulti) {
          /* Group header — show task_id + total span */
          const maxTs = anchors.length ? Math.max(...anchors) : null;
          const spanMs = (anchorTs && maxTs) ? maxTs - anchorTs : null;
          const spanStr = spanMs !== null ? fmtDur(spanMs) : null;
          parts.push(
            `<div class="feed-group-hd">` +
            `<span class="feed-group-tid">⊢ ${esc(shortId(g.taskId))}</span>` +
            `<div class="feed-group-bar"></div>` +
            `<span class="feed-group-meta">${g.evts.length}件${spanStr ? " · " + esc(spanStr) : ""}</span>` +
            `</div>`
          );
          for (const e of g.evts) {
            const eTs = new Date(e.timestamp).getTime();
            const delta = (anchorTs && !isNaN(eTs)) ? Math.abs(eTs - anchorTs) : null;
            const row = buildFeedRow(e, true, isActiveGroup, delta);
            if (row) parts.push(row);
          }
        } else {
          for (const e of g.evts) {
            const rowActive = !!(currentTask && intakeMatchesEventTask(currentTask, eventTaskId(e)));
            const row = buildFeedRow(e, false, rowActive, null);
            if (row) parts.push(row);
          }
        }
      }

      list.innerHTML = parts.join("");
      const upd = document.getElementById("feed-updated");
      if (upd) upd.textContent = `${t("updated")} ${nowStr()}`;
    }

    /* ── Header stats ── */
    function renderHeader(data) {
      const s = data.summary || {};
      const el = id => document.getElementById(id);
      if (el("stat-active")) el("stat-active").textContent = s.active_agents ?? "—";
      if (el("stat-intake")) el("stat-intake").textContent = (data.intake || []).length || "0";
      if (el("stat-tasks"))  el("stat-tasks").textContent  = s.active_tasks ?? "—";
    }

    /* ── Toast ── */
    function checkToast(intake) {
      const count = (intake || []).length;
      if (app.lastIntakeCount >= 0 && count > app.lastIntakeCount) {
        const el = document.getElementById("intake-toast");
        if (el) {
          clearTimeout(app.toastTimer);
          el.textContent = t("toast.intake");
          el.classList.add("visible");
          app.toastTimer = setTimeout(() => el.classList.remove("visible"), 5200);
        }
      }
      app.lastIntakeCount = count;
    }

    /* ── Full render ── */
    function renderAll(data) {
      app.lastData = data; /* cache for switcher */
      const incomingMap = buildTaskEventMap(data.events || []);
      app.taskEventMap = mergeTaskEventMaps(app.taskEventMap, incomingMap);
      app.taskStateMap = buildTaskStateMap(app.taskEventMap);

      const derived = deriveStages(data);

      /* Detect completion transition → trigger glow */
      const wasCompleted = app.prevResultState === "completed";
      const isCompleted  = derived.resultState === "completed";
      if (!wasCompleted && isCompleted) {
        app.completedGlowUntil = Date.now() + 3200;
      }
      app.prevResultState = derived.resultState;

      renderPipeline(derived);
      renderTaskPanel(data);
      renderAgentCards(data);
      renderFeed(data);
      renderHeader(data);
      checkToast(data.intake);

      /* Keep switcher content fresh while open */
      if (app.taskListOpen) renderTaskSwitcher();
    }

    function setFetchUi(degraded) {
      const lbl = document.getElementById("fetch-state-lbl");
      const badge = document.getElementById("live-badge");
      if (lbl) {
        if (degraded) {
          lbl.classList.remove("is-hidden");
          lbl.textContent = t("fetch.checking");
        } else {
          lbl.classList.add("is-hidden");
          lbl.textContent = "";
        }
      }
      if (badge) badge.classList.toggle("fetch-degraded", !!degraded);
    }

    function showFetchStaleUi() {
      const list = document.getElementById("feed-list");
      if (list) list.innerHTML = `<div class="feed-empty">${esc(t("fetch.checking"))}</div>`;
      const scroll = document.getElementById("agent-scroll");
      if (scroll) scroll.innerHTML = `<div class="feed-empty">${esc(t("fetch.checking"))}</div>`;
    }

    /* ── Fetch & poll ── */
    async function refresh() {
      const ac = new AbortController();
      const to = setTimeout(() => ac.abort(), FETCH_TIMEOUT_MS);
      try {
        const res = await fetch("/api/internal/state", { cache: "no-store", signal: ac.signal });
        clearTimeout(to);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        app.fetchState = "ok";
        setFetchUi(false);
        renderAll(data);
      } catch (err) {
        clearTimeout(to);
        app.fetchState = "degraded";
        setFetchUi(true);
        const now = Date.now();
        if (now - (app.lastFetchWarnAt || 0) > FETCH_WARN_THROTTLE_MS) {
          app.lastFetchWarnAt = now;
          const detail = err && err.name === "AbortError" ? "timeout" : (err && err.message) || String(err);
          console.warn("[scene] state fetch failed", detail);
        }
        if (app.lastData) renderAll(app.lastData);
        else showFetchStaleUi();
      }
    }
    function startPoll() {
      clearInterval(app.pollHandle);
      app.pollHandle = setInterval(refresh, 5000);
    }

    /* ── Init ── */
    app.lang = resolveLang();
    localStorage.setItem("deepnoa_ui_lang", app.lang);

    if (params.get("embed") && !["0","false","off","no"].includes(params.get("embed").toLowerCase()))
      document.body.classList.add("embed-mode");

    const nameEl = document.getElementById("office-name");
    if (nameEl) nameEl.textContent = t("office.name");

    const tickClock = () => { const el = document.getElementById("header-time"); if (el) el.textContent = nowStr(); };
    tickClock();
    setInterval(tickClock, 15000);

    refresh();
    startPoll();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) { clearInterval(app.pollHandle); app.pollHandle = setInterval(refresh, 30000); }
      else { refresh(); startPoll(); }
    });

    /* ── Task switcher: row click (event delegation) ── */
    const swEl = document.getElementById("task-switcher");
    if (swEl) {
      swEl.addEventListener("click", e => {
        const row = e.target.closest(".ts-row");
        if (row && row.dataset.taskId) selectTask(row.dataset.taskId);
      });
    }

    /* ── Task switcher: close on outside click ── */
    document.addEventListener("click", e => {
      if (!app.taskListOpen) return;
      const sw   = document.getElementById("task-switcher");
      const chip = document.getElementById("task-count-chip");
      if (sw && !sw.contains(e.target) && chip && !chip.contains(e.target)) {
        closeTaskSwitcher();
      }
    }, true /* capture to catch clicks before they bubble to chip */);

    /* ── Expose globals for inline onclick ── */
    window.toggleTaskSwitcher = toggleTaskSwitcher;
    window.closeTaskSwitcher  = closeTaskSwitcher;
    window.clearTaskSelection = clearTaskSelection;
  </script>
</body>
</html>
