<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Deepnoa AI Office — Business Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --bg: #08111d;
      --surface: rgba(10, 18, 30, 0.58);
      --line: rgba(255, 255, 255, 0.09);
      --line-hi: rgba(255, 255, 255, 0.16);
      --text: #eff6ff;
      --muted: #7a95b8;
      --muted-hi: #9eb4d0;
      --accent: #7ee2c2;
      --blue: #8bc5ff;
      --orange: #ffc46b;
      --purple: #c4a2ff;
      --danger: #ff6b7d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 12%, rgba(73,122,197,0.18), transparent 32%),
        radial-gradient(circle at 82% 82%, rgba(126,226,194,0.09), transparent 28%),
        linear-gradient(180deg, #0b1525 0%, #08111d 100%);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }

    body { display: grid; place-items: center; padding: 14px; }
    body.embed-mode { padding: 0; background: var(--bg); }

    /* ── Shell ── */
    .scene-shell {
      width: min(100%, 1480px);
      min-height: min(calc(100vh - 28px), 900px);
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(8, 13, 22, 0.62);
      backdrop-filter: blur(2px);
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }
    body.embed-mode .scene-shell { width: 100vw; min-height: 100vh; border-radius: 0; border: 0; }

    /* ── Header ── */
    .scene-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--line);
      background: rgba(8,14,24,0.36); gap: 14px; flex-shrink: 0;
    }
    .brand { display: flex; flex-direction: column; gap: 1px; }
    .brand-kicker { font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .brand-name { font-size: clamp(13px,1.4vw,17px); font-weight: 700; line-height: 1; }
    .header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .header-stats { display: flex; gap: 14px; }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .stat-lbl { font-family: "IBM Plex Mono", monospace; font-size: 8px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
    .live-badge { display: inline-flex; align-items: center; gap: 7px; font-family: "IBM Plex Mono", monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #d7e9ff; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px rgba(126,226,194,0.65); animation: live-pulse 1.4s ease-in-out infinite; }
    .live-badge.fetch-degraded { color: var(--orange); }
    .live-badge.fetch-degraded .live-dot { background: var(--orange); box-shadow: 0 0 8px rgba(255,196,107,0.45); animation: dot-pulse 2s ease-in-out infinite; }
    .fetch-state-lbl {
      font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.06em;
      color: var(--orange); max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-time { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); min-width: 38px; text-align: right; }

    /* ── Main ── */
    .scene-main {
      display: grid; grid-template-rows: auto auto 1fr;
      gap: 10px; padding: 12px 18px 14px;
      min-height: 0; overflow: hidden;
    }

    /* ── Pipeline ── */
    .pipeline-section { display: flex; flex-direction: column; gap: 7px; }
    .section-kicker { font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding-left: 2px; }

    .pipeline-track {
      display: flex; align-items: stretch; gap: 0;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 14px; backdrop-filter: blur(16px);
      overflow-x: auto; scrollbar-width: none;
    }
    .pipeline-track::-webkit-scrollbar { display: none; }

    .stage-card {
      flex: 1; min-width: 120px; display: flex; flex-direction: column;
      border-right: 1px solid var(--line); transition: background 0.4s ease;
    }
    .stage-card:last-child { border-right: 0; }
    .stage-card.has-active-task { background: rgba(126,226,194,0.03); }

    /* Completion glow — applied via JS for 3s on result stage */
    @keyframes result-glow {
      0%   { box-shadow: inset 0 0 0px rgba(139,197,255,0); }
      25%  { box-shadow: inset 0 0 48px rgba(139,197,255,0.22); }
      100% { box-shadow: inset 0 0 0px rgba(139,197,255,0); }
    }
    .stage-card.glow-once { animation: result-glow 3s ease-out forwards; }

    .stage-hd {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 14px 10px 10px; flex-shrink: 0;
    }
    .stage-ring {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--line); background: rgba(255,255,255,0.03);
      transition: border-color 0.45s, background 0.45s, box-shadow 0.45s; flex-shrink: 0;
    }
    .stage-sym { font-size: 15px; font-family: "IBM Plex Mono", monospace; color: var(--muted); transition: color 0.45s; user-select: none; }
    .stage-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-align: center; line-height: 1.2; transition: color 0.45s; white-space: nowrap; }
    .stage-badge { font-family: "IBM Plex Mono", monospace; font-size: 8px; padding: 2px 7px; border-radius: 999px; background: rgba(255,255,255,0.05); color: transparent; letter-spacing: 0.04em; white-space: nowrap; transition: color 0.45s, background 0.45s; }

    .stage-bd {
      flex: 1; padding: 8px 12px 10px; border-top: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 5px; min-height: 80px;
    }
    .stage-row { display: flex; gap: 5px; align-items: baseline; min-width: 0; }
    .row-k { font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; min-width: 32px; }
    .row-v { font-size: 10px; color: #d5e5f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
    .row-v.mono   { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--muted-hi); }
    .row-v.accent { color: var(--accent); }
    .row-v.blue   { color: var(--blue); }
    .row-v.orange { color: var(--orange); font-family: "IBM Plex Mono", monospace; font-size: 9px; }
    .row-v.danger { color: var(--danger); }
    .row-v.muted  { color: var(--muted); }
    .row-v.purple { color: var(--purple); font-family: "IBM Plex Mono", monospace; font-size: 9px; }

    /* Duration chip inside row (inline) */
    .dur-chip {
      font-family: "IBM Plex Mono", monospace; font-size: 8px;
      padding: 1px 5px; border-radius: 4px;
      background: rgba(255,196,107,0.1); color: var(--orange);
      white-space: nowrap; margin-left: 4px; flex-shrink: 0;
    }
    .dur-chip.dc-long { background: rgba(255,107,125,0.1); color: var(--danger); }
    .dur-chip.dc-done { background: rgba(139,197,255,0.1); color: var(--blue); }

    /* Stage task-id footer */
    .stage-task-id {
      font-family: "IBM Plex Mono", monospace; font-size: 8px;
      color: rgba(126,226,194,0.35); margin-top: auto; padding-top: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .stage-task-id.task-hi { color: rgba(126,226,194,0.6); }

    /* Tool tags */
    .tool-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; }
    .tool-tag { font-family: "IBM Plex Mono", monospace; font-size: 8px; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--muted); white-space: nowrap; }

    /* Connector arrow */
    .stage-gap { flex-shrink: 0; width: 18px; display: flex; flex-direction: column; align-items: center; padding-top: 30px; }
    .gap-line { width: 1.5px; flex: 1; background: var(--line); position: relative; overflow: hidden; transition: background 0.5s; }
    .gap-sweep { position: absolute; top: -60%; left: 0; width: 100%; height: 60%; background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity 0.5s; }
    .gap-arrow { font-size: 9px; color: var(--line); font-family: "IBM Plex Mono", monospace; transition: color 0.5s; user-select: none; margin-top: 1px; }
    .gap-active .gap-line  { background: rgba(126,226,194,0.22); }
    .gap-active .gap-sweep { opacity: 1; animation: sweep-down 1.8s ease-in-out infinite; }
    .gap-active .gap-arrow { color: rgba(126,226,194,0.55); }

    /* Stage state variants */
    .stage-idle      .stage-ring  { opacity: 0.38; }
    .stage-idle      .stage-badge { opacity: 0; }
    .stage-queued    .stage-ring  { border-color: rgba(122,149,184,0.4); }
    .stage-queued    .stage-badge { color: var(--muted); animation: txt-blink 1.5s ease-in-out infinite; }
    .stage-active    .stage-ring  { border-color: var(--accent); background: rgba(126,226,194,0.08); animation: ring-pulse 2.2s ease-in-out infinite; }
    .stage-active    .stage-sym   { color: var(--accent); }
    .stage-active    .stage-lbl   { color: var(--text); }
    .stage-active    .stage-badge { background: rgba(126,226,194,0.14); color: var(--accent); }
    .stage-completed .stage-ring  { border-color: var(--blue); background: rgba(139,197,255,0.07); }
    .stage-completed .stage-sym   { color: var(--blue); }
    .stage-completed .stage-lbl   { color: var(--text); }
    .stage-completed .stage-badge { background: rgba(139,197,255,0.12); color: var(--blue); }
    .stage-failed    .stage-ring  { border-color: var(--danger); background: rgba(255,107,125,0.08); animation: ring-error 1.2s ease-in-out infinite; }
    .stage-failed    .stage-sym   { color: var(--danger); }
    .stage-failed    .stage-badge { background: rgba(255,107,125,0.12); color: var(--danger); }

    /* ── Current Task Panel ── */
    .task-panel {
      display: flex; align-items: stretch; gap: 0;
      background: rgba(126,226,194,0.03);
      border: 1px solid rgba(126,226,194,0.15);
      border-radius: 12px; overflow: hidden; flex-shrink: 0;
      transition: border-color 0.5s, background 0.5s;
    }
    .task-panel.is-hidden { display: none; }
    .task-panel.tp-active { border-color: rgba(126,226,194,0.26); }
    .task-panel.tp-done   { border-color: rgba(139,197,255,0.28); background: rgba(139,197,255,0.03); }
    .task-panel.tp-failed { border-color: rgba(255,107,125,0.24); background: rgba(255,107,125,0.03); }

    /* Completion banner — shown inside task panel when done */
    .tp-done-banner {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 0 20px; flex-shrink: 0;
      background: rgba(139,197,255,0.08); border-right: 1px solid rgba(139,197,255,0.15);
      min-width: 110px;
    }
    .tp-done-mark { font-size: 18px; color: var(--blue); line-height: 1; }
    .tp-done-label { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--blue); letter-spacing: 0.08em; white-space: nowrap; }

    .tp-id-col {
      display: flex; flex-direction: column; justify-content: center;
      gap: 3px; padding: 10px 16px;
      border-right: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0; min-width: 146px;
    }
    .tp-id-label { font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .tp-id-val {
      font-family: "IBM Plex Mono", monospace; font-size: 11px; font-weight: 500;
      color: var(--muted-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 146px;
    }
    .tp-story {
      display: flex; flex-direction: column; justify-content: center;
      gap: 4px; padding: 11px 16px;
      border-right: 1px solid rgba(255,255,255,0.05);
      min-width: 260px; flex: 1.2;
    }
    .tp-story-kicker {
      font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .tp-story-title {
      font-size: 15px; font-weight: 700; line-height: 1.1; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tp-story-desc {
      font-size: 11px; color: var(--muted-hi); line-height: 1.35;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tp-id-val.tp-id-done   { color: var(--blue); }
    .tp-id-val.tp-id-failed { color: var(--danger); }

    .tp-fields { display: flex; flex: 1; align-items: center; gap: 0; overflow: hidden; }
    .tp-field {
      display: flex; flex-direction: column; justify-content: center;
      gap: 2px; padding: 10px 14px;
      border-right: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .tp-field:last-child { border-right: 0; }
    .tp-k { font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .tp-v { font-size: 11px; color: #d5e5f7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .tp-v.tv-accent { color: var(--accent); }
    .tp-v.tv-blue   { color: var(--blue); }
    .tp-v.tv-orange { color: var(--orange); font-family: "IBM Plex Mono", monospace; }
    .tp-v.tv-purple { color: var(--purple); font-family: "IBM Plex Mono", monospace; }
    .tp-v.tv-muted  { color: var(--muted); }

    .tp-badges { display: flex; gap: 6px; align-items: center; padding: 10px 16px; flex-shrink: 0; margin-left: auto; }
    .tp-badge {
      font-family: "IBM Plex Mono", monospace; font-size: 9px;
      padding: 3px 10px; border-radius: 6px; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .tp-badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .tp-badge.b-active  { background: rgba(126,226,194,0.12); color: var(--accent); }
    .tp-badge.b-active .tp-badge-dot  { background: var(--accent); animation: dot-pulse 2s infinite; }
    .tp-badge.b-done    { background: rgba(139,197,255,0.12); color: var(--blue); }
    .tp-badge.b-done .tp-badge-dot    { background: var(--blue); }
    .tp-badge.b-pending { background: rgba(255,196,107,0.12); color: var(--orange); }
    .tp-badge.b-pending .tp-badge-dot { background: var(--orange); animation: dot-pulse 1.8s infinite; }
    .tp-badge.b-failed  { background: rgba(255,107,125,0.12); color: var(--danger); }
    .tp-badge.b-failed .tp-badge-dot  { background: var(--danger); }
    .tp-badge.b-idle    { background: rgba(255,255,255,0.05); color: var(--muted); }
    .tp-badge.b-idle .tp-badge-dot    { background: var(--muted); }
    .tp-badge.b-planning { background: rgba(196,162,255,0.12); color: var(--purple); }
    .tp-badge.b-planning .tp-badge-dot { background: var(--purple); animation: dot-pulse 2.5s infinite; }

    /* Clickable count chip */
    .tp-count-chip {
      font-family: "IBM Plex Mono", monospace; font-size: 9px;
      padding: 3px 9px; border-radius: 6px; white-space: nowrap;
      cursor: pointer; user-select: none;
      background: rgba(255,255,255,0.06); color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 4px;
      transition: background 0.18s, color 0.18s;
      margin-left: 4px;
    }
    .tp-count-chip:hover { background: rgba(255,255,255,0.11); color: var(--muted-hi); }
    .tp-count-chip.is-open { background: rgba(126,226,194,0.1); color: var(--accent); border-color: rgba(126,226,194,0.22); }
    .tp-manual-tag {
      font-family: "IBM Plex Mono", monospace; font-size: 8px;
      color: var(--orange); padding: 1px 6px; border-radius: 4px;
      background: rgba(255,196,107,0.1); white-space: nowrap; margin-left: 2px;
    }

    /* ── Task Switcher popover ── */
    .task-switcher {
      position: fixed; z-index: 200;
      background: rgba(7,13,24,0.97);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 14px; backdrop-filter: blur(28px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      overflow: hidden; min-width: 360px; max-width: 480px;
      max-height: 360px; display: flex; flex-direction: column;
      animation: feed-enter 0.18s ease;
    }
    .task-switcher.is-hidden { display: none; }
    .ts-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .ts-hd-lbl { font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .ts-hd-actions { display: flex; gap: 8px; align-items: center; }
    .ts-hd-auto {
      font-family: "IBM Plex Mono", monospace; font-size: 8px;
      color: var(--orange); cursor: pointer; padding: 2px 7px;
      border-radius: 4px; background: rgba(255,196,107,0.1);
      border: 1px solid rgba(255,196,107,0.2);
    }
    .ts-hd-auto:hover { background: rgba(255,196,107,0.18); }
    .ts-hd-close { font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 7px; border-radius: 4px; }
    .ts-hd-close:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .ts-list { overflow-y: auto; flex: 1; scrollbar-width: thin; }
    .ts-list::-webkit-scrollbar { width: 3px; }
    .ts-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .ts-section-lbl { font-family: "IBM Plex Mono", monospace; font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 6px 14px 3px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ts-row {
      display: grid; grid-template-columns: 9px 1fr auto auto;
      gap: 10px; align-items: center;
      padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.15s;
    }
    .ts-row:last-child { border-bottom: 0; }
    .ts-row:hover { background: rgba(255,255,255,0.04); }
    .ts-row.ts-selected { background: rgba(126,226,194,0.07); }
    .ts-row.ts-is-auto  { background: rgba(126,226,194,0.035); }
    .ts-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ts-dot.d-active { background: var(--accent); box-shadow: 0 0 5px rgba(126,226,194,0.5); animation: dot-pulse 2s infinite; }
    .ts-dot.d-done   { background: var(--blue); }
    .ts-dot.d-old    { background: rgba(255,255,255,0.18); }
    .ts-body { min-width: 0; }
    .ts-id   { font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--muted-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ts-meta { font-size: 10px; color: var(--muted); white-space: nowrap; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; }
    .ts-time { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--muted); white-space: nowrap; }
    .ts-badge { font-family: "IBM Plex Mono", monospace; font-size: 8px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
    .ts-badge.tb-active { background: rgba(126,226,194,0.12); color: var(--accent); }
    .ts-badge.tb-done   { background: rgba(139,197,255,0.12); color: var(--blue); }
    .ts-badge.tb-old    { background: rgba(255,255,255,0.05); color: var(--muted); }

    /* ── Lower area ── */
    .lower-area { display: grid; grid-template-columns: 1fr 272px; gap: 12px; min-height: 0; }

    .glass-panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; backdrop-filter: blur(16px); display: flex; flex-direction: column; overflow: hidden; }
    .panel-hd { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .panel-lbl { font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── Activity Feed ── */
    .feed-list { flex: 1; overflow-y: auto; padding: 4px 0; display: flex; flex-direction: column; }
    .feed-list::-webkit-scrollbar { width: 3px; }
    .feed-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .feed-group-hd {
      display: flex; align-items: center; gap: 8px; padding: 5px 14px 3px;
      background: rgba(126,226,194,0.04);
      border-top: 1px solid rgba(126,226,194,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .feed-group-hd:first-child { border-top: 0; }
    .feed-group-tid { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: rgba(126,226,194,0.55); white-space: nowrap; }
    .feed-group-bar { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(126,226,194,0.2), transparent); }
    .feed-group-meta { font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted); white-space: nowrap; }

    /* Feed row — 4 columns: time | type | body | delta */
    .feed-row {
      display: grid; grid-template-columns: 38px 56px 1fr 36px;
      gap: 8px; align-items: center;
      padding: 6px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .feed-row:last-child { border-bottom: 0; }
    .feed-row:first-child { animation: feed-enter 0.3s ease; }
    .feed-row.feed-row-grouped { padding-left: 22px; }
    .feed-row.is-active-task { background: rgba(126,226,194,0.04); }
    .feed-row.is-active-task .feed-time { color: rgba(126,226,194,0.55); }

    /* Completion row emphasis */
    .feed-row.is-done-row .feed-main { color: var(--blue); font-weight: 600; }
    .feed-row.is-done-row { background: rgba(139,197,255,0.04); }

    .feed-time { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--muted); white-space: nowrap; }
    .feed-type { font-family: "IBM Plex Mono", monospace; font-size: 8px; padding: 1px 5px; border-radius: 4px; text-align: center; white-space: nowrap; background: rgba(255,255,255,0.06); color: var(--muted); }
    .feed-type.t-recv  { background: rgba(126,226,194,0.12); color: var(--accent); }
    .feed-type.t-start { background: rgba(255,196,107,0.12); color: var(--orange); }
    .feed-type.t-done  { background: rgba(139,197,255,0.14); color: var(--blue); font-weight: 600; }
    .feed-type.t-fail  { background: rgba(255,107,125,0.12); color: var(--danger); }
    .feed-type.t-block { background: rgba(196,162,255,0.10); color: var(--purple); }
    .feed-type.t-alert { background: rgba(255,107,125,0.10); color: var(--danger); }
    .feed-body { min-width: 0; }
    .feed-main { font-size: 11px; color: #d5e5f7; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-sub  { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feed-delta { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--orange); text-align: right; white-space: nowrap; }
    .feed-delta.fd-long { color: var(--danger); }
    .feed-delta.fd-done { color: var(--blue); }
    .feed-empty { padding: 20px 14px; font-size: 11px; color: var(--muted); text-align: center; }

    /* ── Agent Cards ── */
    .agent-scroll { flex: 1; overflow-y: auto; padding: 6px 0; scrollbar-width: none; }
    .agent-scroll::-webkit-scrollbar { display: none; }
    .agent-card { padding: 10px 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .agent-card:last-child { border-bottom: 0; }
    .agent-card.is-active-task { background: rgba(126,226,194,0.04); border-left: 2px solid rgba(126,226,194,0.3); padding-left: 11px; }
    .card-top { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 5px; }
    .card-dot-wrap { padding-top: 2px; flex-shrink: 0; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.16); transition: background 0.4s, box-shadow 0.4s; }
    .card-dot.s-active    { background: var(--accent);  box-shadow: 0 0 7px rgba(126,226,194,0.5);  animation: dot-pulse 2s ease-in-out infinite; }
    .card-dot.s-routing   { background: var(--purple);  box-shadow: 0 0 7px rgba(196,162,255,0.5); }
    .card-dot.s-research  { background: var(--blue);    box-shadow: 0 0 7px rgba(139,197,255,0.5);  animation: dot-pulse 2.4s ease-in-out infinite; }
    .card-dot.s-syncing   { background: var(--orange);  box-shadow: 0 0 7px rgba(255,196,107,0.5); }
    .card-dot.s-error     { background: var(--danger);  box-shadow: 0 0 7px rgba(255,107,125,0.5);  animation: dot-pulse 1.2s ease-in-out infinite; }
    .card-dot.s-universal { background: var(--purple);  box-shadow: 0 0 7px rgba(196,162,255,0.4);  animation: dot-pulse 3s ease-in-out infinite; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 11px; font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-role-state { display: flex; gap: 5px; align-items: center; margin-top: 2px; }
    .card-role  { font-family: "IBM Plex Mono", monospace; font-size: 8px; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--muted); white-space: nowrap; }
    .card-state { font-family: "IBM Plex Mono", monospace; font-size: 8px; color: var(--muted); white-space: nowrap; }
    .card-detail { font-size: 10px; color: var(--muted-hi); margin-top: 4px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tools { margin-top: 5px; }
    .card-task  { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Intake toast ── */
    .intake-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(10,18,32,0.94); border: 1px solid rgba(126,226,194,0.30); border-radius: 12px; padding: 9px 18px; font-size: 12px; font-weight: 500; color: var(--accent); backdrop-filter: blur(18px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; white-space: nowrap; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; }
    .intake-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Animations ── */
    @keyframes live-pulse  { 0%,100%{opacity:1;box-shadow:0 0 10px rgba(126,226,194,0.65);}50%{opacity:.45;box-shadow:0 0 4px rgba(126,226,194,0.2);} }
    @keyframes ring-pulse  { 0%,100%{box-shadow:0 0 0 0 rgba(126,226,194,0.38);}50%{box-shadow:0 0 0 8px rgba(126,226,194,0);} }
    @keyframes ring-error  { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,125,0.38);}50%{box-shadow:0 0 0 6px rgba(255,107,125,0);} }
    @keyframes dot-pulse   { 0%,100%{opacity:1;}50%{opacity:.5;} }
    @keyframes txt-blink   { 0%,100%{opacity:1;}50%{opacity:.25;} }
    @keyframes sweep-down  { 0%{top:-60%;}100%{top:160%;} }
    @keyframes feed-enter  { from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);} }

    .is-hidden { display: none !important; }

    @media (max-width: 820px) {
      body { padding: 8px; }
      .scene-shell { border-radius: 16px; min-height: calc(100vh - 16px); }
      .scene-main { padding: 10px; gap: 10px; }
      .header-stats { display: none; }
      .stage-card { min-width: 100px; }
      .stage-hd { padding: 10px 8px 8px; }
      .stage-ring { width: 38px; height: 38px; }
      .stage-sym { font-size: 13px; }
      .stage-bd { padding: 6px 9px 10px; min-height: 60px; }
      .lower-area { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .agent-panel { max-height: 240px; }
      .task-panel { flex-wrap: wrap; }
      .tp-id-col { min-width: 0; border-right: 0; }
      .tp-story {
        order: 1; min-width: 100%;
        border-right: 0; border-top: 1px solid rgba(255,255,255,0.05);
      }
      .tp-fields { flex-wrap: wrap; width: 100%; order: 2; }
      .tp-badges { flex-wrap: wrap; width: 100%; order: 3; margin-left: 0; padding-top: 0; justify-content: flex-start; }
      .feed-row { grid-template-columns: 38px 50px 1fr; }
      .feed-delta { display: none; }
    }
  </style>
</head>
<body>
  <main class="scene-shell">
    <header class="scene-header">
      <div class="brand">
        <div class="brand-kicker">Deepnoa AI Office</div>

  <div class="intake-toast" id="intake-toast" aria-live="polite"></div>
  <div class="task-switcher is-hidden" id="task-switcher"></div>

  <script>
    /* ── i18n ── */
    const I18N = {
      ja: {
        "stage.incoming":"受付","stage.routing":"振り分け","stage.agent":"エージェント","stage.runtime":"実行","stage.result":"完了",
