<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var k="dn-theme",s=localStorage.getItem(k),m=window.matchMedia("(prefers-color-scheme: light)"),t=s==="light"||s==="dark"?s:m.matches?"light":"dark";document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Deepnoa AI Office Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles/tokens.css">
  <style>
    :root {
      --bg: var(--color-scene-embed-bg);
      --surface: rgba(10, 18, 30, 0.42);
      --surface-line: rgba(255, 255, 255, 0.1);
      --text: var(--color-text);
      --muted: var(--color-muted);
      --accent: var(--color-public-accent);
      --danger: var(--color-danger);
      --scene-shadow: 0 34px 90px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    .scene-theme-fab {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 60;
      pointer-events: auto;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, var(--color-scene-radial), transparent 30%),
        linear-gradient(180deg, var(--color-scene-grad-top) 0%, var(--color-scene-grad-bottom) 100%);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: var(--space-public-shell-x);
    }

    body.embed-mode {
      padding: 0;
      background: var(--color-scene-embed-bg);
    }

    .scene-shell {
      position: relative;
      width: min(100%, 1440px);
      aspect-ratio: 16 / 9;
      min-height: min(100vh - calc(var(--space-public-shell-x) * 2), 420px);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: var(--scene-shadow);
      background: var(--color-scene-canvas);
    }

    body.embed-mode .scene-shell {
      width: 100vw;
      min-height: 100vh;
      border-radius: 0;
      border: 0;
      box-shadow: none;
    }

    html[data-theme="light"] .scene-shell {
      border-color: rgba(15, 23, 42, 0.12);
    }
    html[data-theme="light"] .scene-brand,
    html[data-theme="light"] .scene-live,
    html[data-theme="light"] .scene-legend {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(15, 23, 42, 0.12);
    }
    html[data-theme="light"] .scene-tooltip,
    html[data-theme="light"] .scene-detail {
      background: rgba(255, 255, 255, 0.94);
      border-color: rgba(15, 23, 42, 0.12);
    }

    .background-layer,
    .zone-layer,
    .accent-layer,
    .shadow-layer,
    .sprite-layer,
    .occluder-layer,
    .ui-layer {
      position: absolute;
      inset: 0;
    }

    .background-layer {
      background:
        linear-gradient(180deg, rgba(8, 14, 25, 0.08), rgba(8, 14, 25, 0.36)),
        url('/static/office_bg_small.webp?v={{VERSION_TIMESTAMP}}') center 46% / 110% auto no-repeat,
        linear-gradient(180deg, #17263b 0%, #0a121d 100%);
    }

    .background-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(126, 226, 194, 0.14), transparent 21%),
        radial-gradient(circle at 84% 20%, rgba(94, 145, 255, 0.16), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02) 35%, rgba(3,7,12,0.18));
      pointer-events: none;
    }

    .zone-layer {
      pointer-events: none;
      opacity: 0.018;
    }

    .zone {
      position: absolute;
      border-radius: 28px;
      border: 1px solid rgba(116, 150, 196, 0.1);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .zone.walkway {
      left: 17%;
      right: 15%;
      bottom: 10%;
      height: 18%;
      border-style: solid;
      border-color: rgba(120, 167, 214, 0.12);
      background:
        linear-gradient(180deg, rgba(173, 204, 232, 0.06), rgba(255,255,255,0.02)),
        repeating-linear-gradient(90deg, rgba(120,167,214,0.02) 0 22px, rgba(255,255,255,0.006) 22px 44px);
    }

    .zone.work-left {
      left: 10%;
      top: 18%;
      width: 31%;
      height: 28%;
    }

    .zone.work-right {
      right: 10%;
      top: 18%;
      width: 31%;
      height: 28%;
    }

    .zone.meeting {
      left: 38%;
      top: 16%;
      width: 24%;
      height: 20%;
      border-color: rgba(126, 226, 194, 0.12);
      background: rgba(126, 226, 194, 0.06);
    }

    .zone.corridor {
      left: 45%;
      top: 26%;
      width: 10%;
      height: 40%;
      border-color: rgba(120, 167, 214, 0.08);
      background: rgba(120, 167, 214, 0.03);
    }

    .accent-layer {
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 72%, rgba(255, 221, 139, 0.07), transparent 14%),
        radial-gradient(circle at 49% 28%, rgba(126, 226, 194, 0.08), transparent 14%),
        radial-gradient(circle at 74% 70%, rgba(110, 160, 255, 0.08), transparent 14%);
      mix-blend-mode: screen;
    }

    .shadow-layer {
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .agent-shadow {
      position: absolute;
      width: 26px;
      height: 8px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(72, 96, 133, 0.16);
      filter: blur(1.6px);
      will-change: transform;
    }

    .sprite-layer {
      overflow: hidden;
      z-index: 3;
      pointer-events: auto;
    }

    .occluder-layer {
      z-index: 4;
      pointer-events: none;
    }

    .occluder {
      position: absolute;
      background: linear-gradient(180deg, rgba(247, 252, 255, 0.2), rgba(232, 242, 250, 0.14));
      border: 1px solid rgba(104, 128, 164, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
      opacity: 0.42;
    }

    .occluder.left-row-lower {
      left: 13.8%;
      top: 41.8%;
      width: 26%;
      height: 5.8%;
      clip-path: polygon(1% 0, 96% 0, 100% 55%, 4% 100%);
    }

    .occluder.left-row-upper {
      left: 24.8%;
      top: 28.8%;
      width: 23.6%;
      height: 5.6%;
      clip-path: polygon(1% 0, 97% 0, 100% 56%, 4% 100%);
    }

    .occluder.right-cluster {
      left: 59.4%;
      top: 24.8%;
      width: 27%;
      height: 5.8%;
      clip-path: polygon(2% 0, 97% 0, 100% 56%, 5% 100%);
    }

    .occluder.console-front {
      left: 43%;
      top: 50.5%;
      width: 21.6%;
      height: 8.2%;
      border-radius: 0 0 40px 40px;
      clip-path: polygon(6% 10%, 94% 10%, 100% 54%, 79% 100%, 21% 100%, 0 54%);
    }

    .occluder.sofa-front {
      left: 25%;
      top: 70.2%;
      width: 28%;
      height: 6.8%;
      border-radius: 30px;
      clip-path: polygon(8% 6%, 92% 6%, 100% 54%, 90% 100%, 10% 100%, 0 54%);
    }

    .agent {
      position: absolute;
      width: 72px;
      transform: translate(-50%, -50%);
      text-align: center;
      will-change: transform;
      --outline: #4c6388;
      z-index: 1;
      pointer-events: auto;
      cursor: pointer;
      transition: filter 140ms ease, opacity 140ms ease;
    }

    .agent:hover,
    .agent.is-selected {
      filter: brightness(1.03);
    }

    .staff {
      position: relative;
      width: 32px;
      height: 42px;
      margin: 0 auto;
      filter: drop-shadow(0 6px 10px rgba(34, 50, 78, 0.16));
      animation: walk-bob 1s ease-in-out infinite;
    }

    .agent.is-paused .staff,
    .agent.is-error .staff {
      animation: paused-breathe 2.8s ease-in-out infinite;
    }

    .agent.is-error .staff {
      animation: none;
    }

    .staff-part {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .staff-head {
      top: 2px;
      width: 12px;
      height: 12px;
      border-radius: 4px;
      background: #ffd8be;
      box-shadow: 0 0 0 1.5px var(--outline);
    }

    .staff-hair {
      top: 0;
      width: 14px;
      height: 5px;
      border-radius: 4px 4px 2px 2px;
      background: var(--hair, #202a39);
      box-shadow: 0 0 0 1px rgba(76, 99, 136, 0.55);
    }

    .staff-body {
      top: 16px;
      width: 18px;
      height: 13px;
      border-radius: 5px 5px 4px 4px;
      background: var(--tone, #8bc5ff);
      box-shadow:
        0 0 0 1.5px var(--outline),
        -10px 3px 0 -7px var(--tone, #8bc5ff),
        10px 3px 0 -7px var(--tone, #8bc5ff),
        -10px 3px 0 -5.5px var(--outline),
        10px 3px 0 -5.5px var(--outline);
    }

    .staff-accent {
      top: 19px;
      width: 8px;
      height: 5px;
      border-radius: 3px;
      background: var(--accent-tone, #e5f2ff);
      box-shadow:
        0 0 0 1px rgba(235, 246, 255, 0.55);
    }

    .staff-accent::after {
      content: "";
      position: absolute;
      top: 0;
      right: -8px;
      width: 4px;
      height: 8px;
      border-radius: 2px;
      background: var(--accent-tone, #e5f2ff);
      box-shadow: 0 0 0 1px rgba(76, 99, 136, 0.42);
    }

    .staff-feet {
      top: 31px;
      width: 14px;
      height: 8px;
      background: transparent;
      box-shadow:
        -4px 0 0 0 var(--leg, #243246),
        4px 0 0 0 var(--leg, #243246);
    }

    .agent.role-dev { --tone: #7fb8f6; --accent-tone: #dfeefe; --hair: #33496a; --leg: #40587c; }
    .agent.role-ops { --tone: #f3bb69; --accent-tone: #fdf0cc; --hair: #44556f; --leg: #65523e; }
    .agent.role-research { --tone: #98d8be; --accent-tone: #e9fbf1; --hair: #39536e; --leg: #42615a; }
    .agent.role-visitor {
      --tone: #bfc9da;
      --accent-tone: #edf2f8;
      --hair: #4e5d73;
      --leg: #58657a;
      width: 62px;
      opacity: 0.92;
    }
    .agent.role-visitor .staff {
      transform: scale(0.9);
      filter: drop-shadow(0 5px 8px rgba(34, 50, 78, 0.12));
    }
    .agent.role-visitor .agent-badge {
      background: #9eb4d4;
    }

    .agent .state-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 65%);
      opacity: 0;
      pointer-events: none;
    }

    .agent-badge {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.72);
      background: var(--state-color, #7ee2c2);
      box-shadow: 0 0 0 3px rgba(11, 21, 37, 0.28);
    }

    .agent.is-researching .state-glow,
    .agent.is-syncing .state-glow {
      opacity: 0.6;
    }

    .agent.is-error .state-glow {
      opacity: 0.8;
      background: radial-gradient(circle, rgba(255, 107, 125, 0.28), transparent 68%);
      animation: error-pulse 1.1s ease-in-out infinite;
    }

    .ui-layer {
      z-index: 3;
      pointer-events: none;
    }

    .scene-brand,
    .scene-live,
    .scene-legend {
      position: absolute;
      border-radius: 16px;
      border: 1px solid var(--surface-line);
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }

    .scene-brand {
      top: 16px;
      left: 16px;
      padding: 9px 11px;
      max-width: min(34vw, 260px);
    }

    .scene-kicker {
      color: var(--accent);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: var(--font-public-eyebrow-spacing);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .scene-title {
      font-size: clamp(15px, 1.7vw, 20px);
      font-weight: var(--font-public-title-weight);
      line-height: 1.05;
      margin: 0;
    }

    .scene-subtitle {
      color: var(--color-public-copy-soft);
      font-size: 11px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .scene-legend {
      left: 16px;
      bottom: 16px;
      padding: 7px 9px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: min(72vw, 560px);
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .legend-chip::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--chip, #7ee2c2);
    }

    .legend-chip.idle { --chip: #7ee2c2; }
    .legend-chip.executing { --chip: #ffc46b; }
    .legend-chip.researching { --chip: #8bc5ff; }
    .legend-chip.syncing { --chip: #c4a2ff; }
    .legend-chip.error { --chip: #ff6b7d; }
    .legend-chip.is-active {
      color: var(--color-text);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .scene-live {
      right: 16px;
      bottom: 16px;
      padding: 8px 10px;
      text-align: right;
      min-width: 118px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: var(--font-public-eyebrow-spacing);
      text-transform: uppercase;
      color: var(--color-public-copy-support);
    }

    .live-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(126, 226, 194, 0.6);
      animation: live-blink 1.3s ease-in-out infinite;
    }

    .live-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
    }

    .scene-tooltip,
    .scene-detail {
      position: absolute;
      border-radius: 16px;
      border: 1px solid var(--surface-line);
      background: rgba(8, 14, 24, 0.76);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.26);
      pointer-events: none;
    }

    .scene-tooltip {
      z-index: 6;
      min-width: 170px;
      max-width: 240px;
      padding: 9px 11px;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 120ms ease;
    }

    .scene-tooltip.is-visible {
      opacity: 1;
    }

    .tooltip-name,
    .detail-name {
      font-size: 13px;
      font-weight: var(--font-public-title-weight);
      line-height: 1.2;
    }

    .tooltip-meta,
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .status-pill,
    .role-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--color-text);
      background: rgba(255,255,255,0.07);
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--pill-color, #7ee2c2);
    }

    .tooltip-summary,
    .detail-summary {
      margin-top: 7px;
      color: var(--color-public-copy-support);
      font-size: 11px;
      line-height: 1.4;
    }

    .scene-detail {
      z-index: 5;
      right: 16px;
      top: 16px;
      width: min(290px, calc(100% - 32px));
      padding: 12px 13px;
      pointer-events: auto;
    }

    .scene-detail.is-empty {
      opacity: 0.84;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .detail-close {
      appearance: none;
      border: 0;
      background: rgba(255,255,255,0.06);
      color: var(--color-public-copy-support);
      width: 28px;
      height: 28px;
      border-radius: 999px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 6px 10px;
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.45;
      color: var(--muted);
    }

    .detail-label {
      color: #9eb2ce;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 10px;
    }

    .detail-value {
      color: var(--color-text);
      min-width: 0;
      word-break: break-word;
    }

    .is-hidden {
      display: none !important;
    }

    @keyframes walk-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }

    @keyframes paused-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.5px); }
    }

    @keyframes live-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @keyframes error-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.82; }
      50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.56; }
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .scene-shell {
        border-radius: 22px;
        min-height: auto;
      }

      .scene-brand {
        max-width: 72vw;
      }

      .scene-legend {
        max-width: calc(100% - 32px);
      }

      .scene-detail {
        top: auto;
        right: 12px;
        bottom: 62px;
        width: min(280px, calc(100% - 24px));
      }
    }
  </style>
</head>
<body>
  <button type="button" class="theme-toggle scene-theme-fab" data-theme-toggle title="Toggle light / dark theme">Theme</button>
  <main class="scene-shell">
    <div class="background-layer"></div>
    <img id="scene-walkmask" src="/static/scene-walkmask.png?v={{VERSION_TIMESTAMP}}" alt="" hidden>

    <div class="zone-layer" aria-hidden="true">
      <div class="zone work-left"></div>
      <div class="zone meeting"></div>
      <div class="zone work-right"></div>
      <div class="zone corridor"></div>
      <div class="zone walkway"></div>
    </div>

    <div class="accent-layer" aria-hidden="true"></div>
    <div class="shadow-layer" id="shadow-layer"></div>
    <div class="sprite-layer" id="sprite-layer"></div>
    <div class="occluder-layer" aria-hidden="true">
      <div class="occluder left-row-lower"></div>
      <div class="occluder left-row-upper"></div>
      <div class="occluder right-cluster"></div>
      <div class="occluder console-front"></div>
      <div class="occluder sofa-front"></div>
    </div>

    <div class="ui-layer">
      <div class="scene-brand" id="scene-brand">
        <div class="scene-kicker" data-i18n="scene.kicker">Deepnoa AI Office</div>
        <div class="scene-title" data-i18n="scene.title">Live Office Scene</div>
      </div>

      <div class="scene-legend" id="scene-legend" aria-label="legend">
        <div class="legend-chip idle" data-i18n="legend.idle">idle</div>
        <div class="legend-chip executing" data-i18n="legend.executing">executing</div>
        <div class="legend-chip researching" data-i18n="legend.researching">researching</div>
        <div class="legend-chip syncing" data-i18n="legend.syncing">syncing</div>
        <div class="legend-chip error" data-i18n="legend.error">error</div>
      </div>

      <div class="scene-live" id="scene-live">
        <div class="live-pill" data-i18n="scene.live">Live</div>
        <div class="live-sub" id="live-sub" data-i18n="scene.loading">Loading office scene…</div>
      </div>

      <div class="scene-tooltip is-hidden" id="scene-tooltip" aria-hidden="true"></div>
      <div class="scene-detail is-empty" id="scene-detail"></div>
    </div>
  </main>

  <script>
    const I18N = {
      ja: {
        "scene.kicker": "Deepnoa AI Office",
        "scene.title": "AI Office Scene",
        "scene.live": "Live",
        "scene.loading": "オフィスシーンを読み込み中…",
        "scene.updated": "更新",
        "scene.no_agents": "表示できるエージェントがいません",
        "legend.idle": "待機",
        "legend.executing": "実行中",
        "legend.researching": "調査中",
        "legend.syncing": "同期中",
        "legend.error": "異常",
        "role.dev": "情報システム",
        "role.ops": "業務管理",

        .replace(/\bcreating\b/gi, "生成中")
        .replace(/\bbuilding\b/gi, "生成中")
        .replace(/\breviewing\b/gi, "確認中");

      translated = compactText(translated.replace(/\.$/, ""));
      for (const [re, text] of publicRewrites) {
        translated = translated.replace(re, text);
      }
      if (translated && /中$|待ち$/.test(translated)) {
        return translated;
      }

      const firstKeyword = [
        [/\banaly(s|z)ing\b/i, "分析中"],
        [/\bchecking\b|\breviewing\b|\bverifying\b/i, "確認中"],
        [/\bprocessing\b|\bworking\b|\bhandling\b|\brunning\b|\bexecuting\b/i, "処理中"],
        [/\bgenerating\b|\bcreating\b|\bbuilding\b|\bdrafting\b/i, "生成中"],
        [/\bsyncing\b|\bsynchronizing\b/i, "同期中"],
        [/\bupdating\b|\brefreshing\b/i, "更新中"],
        [/\bwaiting\b|\bidle\b|\bstanding by\b/i, "待機中"],
        [/\brouting\b|\bdispatching\b|\bforwarding\b/i, "振分中"],
      ];
      for (const [re, text] of firstKeyword) {
        if (re.test(raw)) return text;
      }

      if (state === "researching" || key === "research") return "情報整理中";
      if (state === "executing" || key === "dev") return "システム更新を処理中";
      if (key === "ops") return "業務を確認中";
      return raw;
    }

    function getSpeed(state) {
      const normalized = String(state || "").toLowerCase();
      if (normalized === "executing") return 0.03;
      if (normalized === "researching") return 0.035;
      if (normalized === "syncing" || normalized === "routing") return 0.055;
      if (normalized === "writing") return 0.028;
      if (normalized === "error") return 0;
      return 0.016;
    }

    function getVisitorScenario(nowSeconds = Date.now() / 1000) {
      const phase = (nowSeconds + VISITOR_EVENT.startOffset) % VISITOR_EVENT.cycleSeconds;
      if (phase > VISITOR_EVENT.activeSeconds) {
        return { active: false };
      }
      const cycleIndex = Math.floor((nowSeconds + VISITOR_EVENT.startOffset) / VISITOR_EVENT.cycleSeconds);
      const kind = cycleIndex % 2 === 0 ? "inquiry" : "request";
      const point = snapToWalkmap(WALKMAP.points.entry_guest || { x: 0.545, y: 0.835 });
      return {
        active: true,
        kind,
        point,
        name: t("visitor.name", "Visitor"),
        roleLabelText: t("visitor.role", "External"),
        stateLabelText: t("visitor.state", "visiting"),
        displayDetail: t(`visitor.summary.${kind}`, kind),
        stateColorValue: "#9eb4d4",
      };
    }

    async function ensureWalkmaskLoaded() {
      if (sceneState.walkmask.ready) return;
      const img = document.getElementById("scene-walkmask");
      if (!img.complete) {
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });
      }
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      sceneState.walkmask = {
        ready: true,
        width: canvas.width,
        height: canvas.height,
        data: ctx.getImageData(0, 0, canvas.width, canvas.height).data,
      };
    }

    function sampleWalkmask(normalizedPoint) {
      if (!sceneState.walkmask.ready || !sceneState.walkmask.data) return 255;
      const px = Math.max(0, Math.min(sceneState.walkmask.width - 1, Math.round(normalizedPoint.x * (sceneState.walkmask.width - 1))));
      const py = Math.max(0, Math.min(sceneState.walkmask.height - 1, Math.round(normalizedPoint.y * (sceneState.walkmask.height - 1))));
      const idx = (py * sceneState.walkmask.width + px) * 4;
      return sceneState.walkmask.data[idx];
    }

    function snapToWalkmap(point) {
      if (sampleWalkmask(point) >= 180) {
        return point;
      }
      let bestPoint = point;
      let bestDist = Infinity;
      const maxRadius = 36;
      const xStep = 1 / Math.max(1, sceneState.walkmask.width - 1);
      const yStep = 1 / Math.max(1, sceneState.walkmask.height - 1);
      for (let radius = 1; radius <= maxRadius; radius += 1) {
        for (let dx = -radius; dx <= radius; dx += 1) {
          for (let dy = -radius; dy <= radius; dy += 1) {
            if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) continue;
            const candidate = {
              x: Math.max(0, Math.min(1, point.x + dx * xStep)),
              y: Math.max(0, Math.min(1, point.y + dy * yStep)),
            };
            if (sampleWalkmask(candidate) < 180) continue;
            const dist = Math.hypot(candidate.x - point.x, candidate.y - point.y);
            if (dist < bestDist) {
              bestPoint = candidate;
              bestDist = dist;
            }
          }
        }
        if (bestDist < Infinity) break;
      }
      return bestPoint;
    }

    function nudgeTowardWalkable(point, radius = 10) {
      if (sampleWalkmask(point) >= 180) return point;
      let bestPoint = point;
      let bestScore = Infinity;
      const xStep = 1 / Math.max(1, sceneState.walkmask.width - 1);
      const yStep = 1 / Math.max(1, sceneState.walkmask.height - 1);
      for (let dx = -radius; dx <= radius; dx += 1) {
        for (let dy = -radius; dy <= radius; dy += 1) {
          const candidate = {
            x: Math.max(0, Math.min(1, point.x + dx * xStep)),
            y: Math.max(0, Math.min(1, point.y + dy * yStep)),
          };
          if (sampleWalkmask(candidate) < 180) continue;
          const score = Math.hypot(dx, dy);
          if (score < bestScore) {
            bestScore = score;
            bestPoint = candidate;
          }
        }
      }
      return bestPoint;
    }

    function resolveRoutePoints(pointIds) {
      return (pointIds || []).map((id) => {
        const source = WALKMAP.points[id] || { x: 0.5, y: 0.5, pause: 1 };
        const snapped = snapToWalkmap(source);
        return { ...source, x: snapped.x, y: snapped.y, id };
      });
    }

    function computeRoutePosition(route, progress) {
      if (!route || !route.length) return { x: 0.5, y: 0.5, paused: false };
      if (route.length === 1) return { x: route[0].x, y: route[0].y, paused: true };
      const segments = [];
      let total = 0;
      for (let i = 0; i < route.length; i += 1) {
        const start = route[i];
        const end = route[(i + 1) % route.length];
        const dist = Math.hypot(end.x - start.x, end.y - start.y);
        const move = Math.max(dist / 0.08, 0.45);
        const pause = Math.max(start.pause || 0, 0);
        segments.push({ type: "move", start, end, duration: move });
        total += move;
        if (pause) {
          segments.push({ type: "pause", point: start, duration: pause });
          total += pause;
        }
      }
      let cursor = (progress % total + total) % total;
      for (const segment of segments) {
        if (cursor > segment.duration) {
          cursor -= segment.duration;
          continue;
        }
        if (segment.type === "pause") {
          return { x: segment.point.x, y: segment.point.y, paused: true };
        }
        const ratio = segment.duration ? cursor / segment.duration : 0;
        return {
          x: segment.start.x + (segment.end.x - segment.start.x) * ratio,
          y: segment.start.y + (segment.end.y - segment.start.y) * ratio,
          paused: false,
        };
      }
      return { x: route[0].x, y: route[0].y, paused: false };
    }

    function motion(agent, time) {
      const state = String(agent.state || "idle").toLowerCase();
      const speed = getSpeed(state);
      if (!speed) {
        const anchor = agent.anchor || agent.route[0] || { x: 0.5, y: 0.5 };
        const snapped = snapToWalkmap(anchor);
        return { x: snapped.x, y: snapped.y, paused: true };
      }
      const wave = time + agent.phase;
      const base = computeRoutePosition(agent.route, wave * speed * 10);
      let x = base.x;
      let y = base.y;
      if (state === "researching") {
        y += Math.sin(wave * 0.75) * 0.0025;
      } else if (state === "executing") {
        x += Math.sin(wave * 1.2) * 0.0016;
        y += Math.cos(wave * 0.9) * 0.0012;
      } else if (state === "syncing" || state === "routing") {
        x += Math.cos(wave * 1.1) * 0.003;
        y += Math.sin(wave * 0.95) * 0.002;
      } else if (state === "idle") {
        y += Math.sin(wave * 0.55) * 0.0011;
      } else if (state === "writing") {
        x += Math.sin(wave * 0.7) * 0.0016;
        y += Math.cos(wave * 0.55) * 0.0012;
      }
      const corrected = nudgeTowardWalkable({ x, y }, 8);
      return { x: corrected.x, y: corrected.y, paused: base.paused };
    }

    function resolveBehaviorProfile(agent) {
      const profile = routeProfiles[agent.key] || routeProfiles.default;
      const state = String(agent.state || "idle").toLowerCase();
      const routeKey = profile[state] ? state : state === "writing" && profile.executing ? "executing" : "idle";
      const route = resolveRoutePoints(profile[routeKey] || profile.idle || [profile.home || "center_mid"]);
      const anchorSource = WALKMAP.points[profile.home] || route[0] || { x: 0.5, y: 0.5 };
      const anchor = snapToWalkmap(anchorSource);
      return { route, anchor };
    }

    function getSceneEntityByKey(key) {
      if (!key) return null;
      if (key === "visitor") return sceneState.visitor;
      return sceneState.agentMap.get(key) || null;
    }

    function summarizeAgent(agent) {
      return agent.detail || agent.status_label || agent.summary || agent.state || "idle";
    }

    function buildSceneAgents(agents) {
      const priority = ["dev", "ops", "research"];
      return (agents || [])
        .filter((agent) => agent.key !== "reception")
        .sort((a, b) => {
          const ai = priority.indexOf(a.key);
          const bi = priority.indexOf(b.key);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        })
        .slice(0, 3)
        .map((agent, index) => {
          const key = agent.key || `agent-${index}`;
          const state = agent.state || "idle";
          const behavior = resolveBehaviorProfile({ ...agent, key, state });
          return {
            key,
            name: agentDisplayName(key, agent.name || agent.key || `agent-${index}`),
            role: agent.role || roleLabel(key),
            roleLabelText: roleLabel(key),
            state,
            route: behavior.route,
            baseRoute: behavior.route,
            anchor: behavior.anchor,
            baseAnchor: behavior.anchor,
            phase: index * 1.1,
            detail: summarizeAgent(agent),
            baseDetail: translateSummary(summarizeAgent(agent), key, state),
            displayDetail: translateSummary(summarizeAgent(agent), key, state),
            updated_at: agent.updated_at || agent.last_seen || agent.last_update || "",
            source: agent.source || "",
          };
        });
    }

    function renderDetailPanel(agent) {
      const detail = document.getElementById("scene-detail");
      if (!agent) {
        detail.classList.add("is-empty");
        detail.innerHTML = `
          <div class="detail-name">${t("detail.placeholder.name", "Select an agent")}</div>
          <div class="detail-summary">${t("detail.placeholder.summary", "Click a staff member to see the current role and work summary.")}</div>
        `;
        return;
      }
      detail.classList.remove("is-empty");
      detail.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="detail-name">${agent.name}</div>
            <div class="detail-meta">
              <span class="role-pill">${getEntityRole(agent)}</span>
              <span class="status-pill" style="--pill-color:${getEntityStateColor(agent)}">${getEntityStatus(agent)}</span>
            </div>
          </div>
          <button class="detail-close" type="button" aria-label="${t("detail.close", "Close")}">×</button>
        </div>
        <div class="detail-summary">${agent.displayDetail || agent.detail}</div>
        <div class="detail-grid">
          <div class="detail-label">${t("detail.role", "Role")}</div>
          <div class="detail-value">${getEntityRole(agent)}</div>
          <div class="detail-label">${t("detail.status", "Status")}</div>
          <div class="detail-value">${getEntityStatus(agent)}</div>
          <div class="detail-label">${t("detail.summary", "Current work")}</div>
          <div class="detail-value">${agent.displayDetail || agent.detail}</div>
          <div class="detail-label">${t("detail.updated", "Updated")}</div>
          <div class="detail-value">${safeDate(agent.updated_at)}</div>
          ${agent.source ? `<div class="detail-label">${t("detail.source", "Source")}</div><div class="detail-value">${agent.source}</div>` : ""}
        </div>
      `;
      const closeButton = detail.querySelector(".detail-close");
      if (closeButton) {
        closeButton.addEventListener("click", () => {
          sceneState.selectedKey = null;
          syncSelection();
        });
      }
    }

    function renderTooltip(agent, point) {
      const tooltip = document.getElementById("scene-tooltip");
      if (!agent || !point) {
        tooltip.classList.add("is-hidden");
        tooltip.classList.remove("is-visible");
        tooltip.innerHTML = "";
        return;
      }
      tooltip.innerHTML = `
        <div class="tooltip-name">${agent.name}</div>
        <div class="tooltip-meta">
              <span class="role-pill">${getEntityRole(agent)}</span>
          <span class="status-pill" style="--pill-color:${getEntityStateColor(agent)}">${getEntityStatus(agent)}</span>
        </div>
        <div class="tooltip-summary">${agent.displayDetail || agent.detail}</div>
      `;
      tooltip.style.left = `${point.x}px`;
      tooltip.style.top = `${Math.max(48, point.y - 14)}px`;
      tooltip.classList.remove("is-hidden");
      tooltip.classList.add("is-visible");
    }

    function syncSelection() {
      if (sceneState.selectedKey) {
        sceneState.hoveredKey = null;
        renderTooltip(null);
      }
      for (const agent of sceneState.agents) {
        if (agent.node) {
          agent.node.classList.toggle("is-selected", sceneState.selectedKey === agent.key);
        }
      }
      if (sceneState.visitor && sceneState.visitor.node) {
        sceneState.visitor.node.classList.toggle("is-selected", sceneState.selectedKey === "visitor");
      }
      const selected = getSceneEntityByKey(sceneState.selectedKey);
      renderDetailPanel(selected || null);
    }

    function syncLegend() {
      const activeStates = new Set(sceneState.agents.map((agent) => String(agent.state || "idle").toLowerCase()));
      for (const chip of document.querySelectorAll(".legend-chip")) {
        const state = Array.from(chip.classList).find((name) => STATE_COLORS[name]);
        chip.classList.toggle("is-active", !!state && activeStates.has(state));
      }
    }

    function bindAgentInteractions() {
      const shell = document.querySelector(".scene-shell");
      for (const agent of sceneState.agents) {
        if (!agent.node) continue;
        agent.node.addEventListener("pointerenter", () => {
          sceneState.hoveredKey = agent.key;
          renderTooltip(agent, agent.lastScreenPoint || { x: 120, y: 120 });
        });
        agent.node.addEventListener("pointerleave", () => {
          if (sceneState.hoveredKey === agent.key) {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
        });
        agent.node.addEventListener("click", () => {
          sceneState.selectedKey = sceneState.selectedKey === agent.key ? null : agent.key;
          if (sceneState.selectedKey) {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
          syncSelection();
        });
      }
      if (sceneState.visitor && sceneState.visitor.node && !sceneState.visitor.node.dataset.bound) {
        sceneState.visitor.node.addEventListener("pointerenter", () => {
          if (!sceneState.visitor || !sceneState.visitor.active) return;
          sceneState.hoveredKey = "visitor";
          renderTooltip(sceneState.visitor, sceneState.visitor.lastScreenPoint || { x: 120, y: 120 });
        });
        sceneState.visitor.node.addEventListener("pointerleave", () => {
          if (sceneState.hoveredKey === "visitor") {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
        });
        sceneState.visitor.node.addEventListener("click", () => {
          if (!sceneState.visitor || !sceneState.visitor.active) return;
          sceneState.selectedKey = sceneState.selectedKey === "visitor" ? null : "visitor";
          if (sceneState.selectedKey) {
            sceneState.hoveredKey = null;
            renderTooltip(null);
          }
          syncSelection();
        });
        sceneState.visitor.node.dataset.bound = "1";
      }
      if (shell && !shell.dataset.detailBound) {
        shell.addEventListener("click", (event) => {
          if (event.target.closest(".agent") || event.target.closest(".scene-detail")) return;
          sceneState.selectedKey = null;
          syncSelection();
        });
        shell.dataset.detailBound = "1";
      }
    }

    function renderAgents(agents) {
      const target = document.getElementById("sprite-layer");
      const shadowTarget = document.getElementById("shadow-layer");
      if (!agents.length) {
        target.innerHTML = `<div class="scene-brand" style="top:auto; bottom:76px; left:16px; max-width:280px;">${t("scene.no_agents", "No visible agents")}</div>`;
        shadowTarget.innerHTML = "";
        sceneState.agents = [];
        sceneState.agentMap = new Map();
        renderTooltip(null);
        renderDetailPanel(null);
        return;
      }
      shadowTarget.innerHTML = agents.map((agent) => `
        <div class="agent-shadow" data-shadow-key="${agent.key}"></div>
      `).join("") + `
        <div class="agent-shadow is-hidden" data-shadow-key="visitor"></div>
      `;
      target.innerHTML = agents.map((agent) => `
        <div class="agent ${roleClass(agent.key)} ${stateClass(agent.state)}" data-agent-key="${agent.key}" title="${agent.name} · ${stateLabel(agent.state)}" style="--state-color:${stateColor(agent.state)}">
          <span class="state-glow"></span>
          <span class="agent-badge"></span>
          <span class="staff">
            <span class="staff-part staff-head"></span>
            <span class="staff-part staff-hair"></span>
            <span class="staff-part staff-body"></span>
            <span class="staff-part staff-accent"></span>
            <span class="staff-part staff-feet"></span>
          </span>
        </div>
      `).join("") + `
        <div class="agent role-visitor is-hidden" data-agent-key="visitor" title="${t("visitor.name", "Visitor")}">
          <span class="agent-badge"></span>
          <span class="staff">
            <span class="staff-part staff-head"></span>
            <span class="staff-part staff-hair"></span>
            <span class="staff-part staff-body"></span>
            <span class="staff-part staff-accent"></span>
            <span class="staff-part staff-feet"></span>
          </span>
        </div>
      `;
      sceneState.agents = agents.map((agent) => ({
        ...agent,
        node: target.querySelector(`[data-agent-key="${agent.key}"]`),
        shadowNode: shadowTarget.querySelector(`[data-shadow-key="${agent.key}"]`),
      }));
      sceneState.agentMap = new Map(sceneState.agents.map((agent) => [agent.key, agent]));
      sceneState.visitor = {
        key: "visitor",
        kind: "visitor",
        active: false,
        name: t("visitor.name", "Visitor"),
        roleLabelText: t("visitor.role", "External"),
        stateLabelText: t("visitor.state", "visiting"),
        displayDetail: t("visitor.summary.inquiry", "making an inquiry"),
        node: target.querySelector('[data-agent-key="visitor"]'),
        shadowNode: shadowTarget.querySelector('[data-shadow-key="visitor"]'),
        stateColorValue: "#9eb4d4",
        updated_at: "",
      };
      if (sceneState.selectedKey && !sceneState.agentMap.has(sceneState.selectedKey)) {
        if (sceneState.selectedKey !== "visitor") {
          sceneState.selectedKey = null;
        }
      }
      bindAgentInteractions();
      syncLegend();
      syncSelection();
    }

    function applyVisitorEvent(nowSeconds) {
      const visitor = sceneState.visitor;
      const scenario = getVisitorScenario(nowSeconds);
      const ops = sceneState.agentMap.get("ops");
      const signature = scenario.active ? `${scenario.kind}` : "inactive";
      if (signature === sceneState.lastVisitorSignature) {
        return;
      }
      sceneState.lastVisitorSignature = signature;

      if (ops) {
        ops.route = ops.baseRoute;
        ops.anchor = ops.baseAnchor;
        ops.displayDetail = ops.baseDetail;
      }

      if (!visitor) return;

      if (!scenario.active) {
        visitor.active = false;
        visitor.node.classList.add("is-hidden");
        visitor.shadowNode.classList.add("is-hidden");
        if (sceneState.selectedKey === "visitor") {
          sceneState.selectedKey = null;
        }
        if (sceneState.hoveredKey === "visitor") {
          sceneState.hoveredKey = null;
          renderTooltip(null);
        }
        syncSelection();
        return;
      }

      visitor.active = true;
      visitor.kind = scenario.kind;
      visitor.name = scenario.name;
      visitor.roleLabelText = scenario.roleLabelText;
      visitor.stateLabelText = scenario.stateLabelText;
      visitor.displayDetail = scenario.displayDetail;
      visitor.point = scenario.point;
      visitor.node.classList.remove("is-hidden");
      visitor.shadowNode.classList.remove("is-hidden");

      if (ops && String(ops.state || "").toLowerCase() !== "error") {
        ops.route = resolveRoutePoints(VISITOR_EVENT.supportRoute);
        ops.anchor = snapToWalkmap(WALKMAP.points.entry_guest_ops || ops.baseAnchor);
        ops.displayDetail = t(`ops.event.${scenario.kind}`, scenario.kind);
      }

      if (sceneState.selectedKey === "visitor" || sceneState.selectedKey === "ops") {
        syncSelection();
      }
    }

    function ensureAnimation() {
      if (sceneState.frameHandle) return;
      const tick = (ts) => {
        const shell = document.querySelector(".scene-shell");
        const width = shell ? shell.clientWidth : 0;
        const height = shell ? shell.clientHeight : 0;
        const time = ts / 1000;
        applyVisitorEvent(Date.now() / 1000);
        for (const agent of sceneState.agents) {
          if (!agent.node || !width || !height) continue;
          const next = motion(agent, time);
          const x = width * next.x;
          const y = height * next.y;
          agent.node.style.transform = `translate(${x}px, ${y}px)`;
          agent.node.style.zIndex = String(Math.round(y));
          agent.lastScreenPoint = { x, y };
          if (agent.shadowNode) {
            agent.shadowNode.style.transform = `translate(${x}px, ${y + 13}px)`;
            agent.shadowNode.style.opacity = next.paused ? "0.85" : "0.7";
          }
          agent.node.classList.toggle("is-paused", !!next.paused);
          if (sceneState.hoveredKey === agent.key) {
            renderTooltip(agent, agent.lastScreenPoint);
          }
        }
        if (sceneState.visitor && sceneState.visitor.node && width && height) {
          if (sceneState.visitor.active && sceneState.visitor.point) {
            const x = width * sceneState.visitor.point.x;
            const y = height * sceneState.visitor.point.y;
            sceneState.visitor.node.style.transform = `translate(${x}px, ${y}px)`;
            sceneState.visitor.node.style.zIndex = String(Math.round(y));
            sceneState.visitor.lastScreenPoint = { x, y };
            sceneState.visitor.shadowNode.style.transform = `translate(${x}px, ${y + 12}px)`;
            sceneState.visitor.shadowNode.style.opacity = "0.56";
            if (sceneState.hoveredKey === "visitor") {
              renderTooltip(sceneState.visitor, sceneState.visitor.lastScreenPoint);
            }
          } else {
            sceneState.visitor.node.classList.add("is-hidden");
            sceneState.visitor.shadowNode.classList.add("is-hidden");
          }
        }
        sceneState.frameHandle = window.requestAnimationFrame(tick);
      };
      sceneState.frameHandle = window.requestAnimationFrame(tick);
    }

    async function loadPublicState() {
      const response = await fetch(`/api/public/state?v={{VERSION_TIMESTAMP}}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`public-state:${response.status}`);
      }
      return response.json();
    }

    async function refreshScene() {
      try {
        await ensureWalkmaskLoaded();
        const data = await loadPublicState();
        renderAgents(buildSceneAgents(data.agents || []));
        document.getElementById("live-sub").textContent = `${t("scene.updated", "Updated")} ${safeDate(data.health && data.health.latest_update)}`;
      } catch (error) {
        document.getElementById("live-sub").textContent = t("scene.loading", "Loading office scene…");
        renderAgents([]);
        console.error(error);
      }
    }

    function startPolling() {
      if (sceneState.pollHandle) {
        window.clearInterval(sceneState.pollHandle);
      }
      sceneState.pollHandle = window.setInterval(refreshScene, 15000);
    }

    sceneState.lang = resolveLang();
    window.localStorage.setItem(LANG_KEY, sceneState.lang);
    applyI18n();
    applyEmbedOptions();
    refreshScene();
    ensureAnimation();
    startPolling();

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        if (sceneState.pollHandle) window.clearInterval(sceneState.pollHandle);
        sceneState.pollHandle = window.setInterval(refreshScene, 45000);
        return;
      }
      refreshScene();
      startPolling();
    });
  </script>
<script>
(function(){
  var r=document.documentElement;
  window.dnSetTheme=function(t){t=t==="light"?"light":"dark";r.setAttribute("data-theme",t);try{localStorage.setItem("dn-theme",t);}catch(e){}};
  document.addEventListener("click",function(e){var x=e.target.closest("[data-theme-toggle]");if(!x)return;e.preventDefault();var c=(r.getAttribute("data-theme")||"dark")==="dark"?"dark":"light";window.dnSetTheme(c==="dark"?"light":"dark");});
  try{var mq=window.matchMedia("(prefers-color-scheme: light)");mq.addEventListener("change",function(){try{if(localStorage.getItem("dn-theme"))return;}catch(z){}window.dnSetTheme(mq.matches?"light":"dark");});}catch(y){}
})();
</script>
