<!DOCTYPE html>
<html lang="ja" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Deepnoa AI Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:          #040b15;
      --bg-deep:     #020810;
      --surface:     rgba(6, 16, 30, 0.88);
      --border:      rgba(70, 120, 190, 0.13);
      --border-glow: rgba(80, 200, 160, 0.28);
      --text:        #ddeeff;
      --muted:       #4e6e8e;
      --dim:         #1e3050;
      --accent:      #50ddb0;
      --amber:       #e0a030;
      --red:         #e85060;
      --mono:        "IBM Plex Mono", monospace;
    }

    /* ── RESET ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }

    /* ── BACKGROUND LAYERS ───────────────────────────────────── */
    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 55% at 50% 50%, rgba(30,65,130,0.18), transparent),
        radial-gradient(circle at 12% 48%, rgba(30,90,160,0.22), transparent 30%),
        radial-gradient(circle at 88% 48%, rgba(20,170,120,0.10), transparent 30%),
        linear-gradient(180deg, #071020 0%, var(--bg) 100%);
    }

    .grid-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(80,140,220,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,140,220,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
    }

    /* ── THEATER SHELL ───────────────────────────────────────── */
    .theater {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      z-index: 1;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .theater-bar {
      flex: 0 0 auto;
      height: 50px;
      display: flex; align-items: center; gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(4, 9, 18, 0.78);
      backdrop-filter: blur(14px);
      z-index: 20;
    }

    .brand {
      font-family: var(--mono);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .brand-divider {
      width: 1px; height: 18px;
      background: var(--border);
    }

    .brand-sub {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
    }

    .bar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 16px;
    }

    .live-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: live-pulse 2.4s ease-in-out infinite;
    }

    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .bar-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.18s, border-color 0.18s;
      display: inline-flex; align-items: center;
    }

    .bar-btn:hover { color: var(--text); border-color: rgba(90,160,230,0.35); }

    /* ── CANVAS ──────────────────────────────────────────────── */
    .flow-canvas {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── AMBIENT PARTICLES ───────────────────────────────────── */
    .ambient-layer {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 1;
      overflow: hidden;
    }

    .amb-p {
      position: absolute;
      border-radius: 50%;
      background: rgba(70, 140, 220, 0.5);
      animation: amb-drift linear infinite;
    }

    @keyframes amb-drift {
      from { transform: translateY(0) translateX(0); opacity: var(--op0, 0.4); }
      to   { transform: translateY(calc(-70px - 40px * var(--rx, 0.5))) translateX(calc(24px * var(--dx, 0.5) - 12px)); opacity: 0; }
    }

    /* ── SVG FLOW LINES ──────────────────────────────────────── */
    .flow-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
    }

    /* ── STAGE LABELS ────────────────────────────────────────── */
    .stage-lbl {
      position: absolute;
      top: 18px;
      font-family: var(--mono);
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.55;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none; z-index: 6;
    }

    /* ── ZONE DIVIDERS ───────────────────────────────────────── */
    .zone-div {
      position: absolute;
      top: 44px; bottom: 36px;
      width: 1px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(60,100,180,0.14) 20%,
        rgba(60,100,180,0.14) 80%,
        transparent 100%);
      pointer-events: none; z-index: 3;
    }

    /* ── ROUTING NEXUS ───────────────────────────────────────── */
    .routing-nexus {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 8;
    }

    .routing-ring {
      position: relative;
      width: 22px; height: 22px;
    }

    .routing-ring::before {
      content: "";
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(80,140,220,0.22);
      animation: nexus-pulse 3.2s ease-in-out infinite;
    }

    @keyframes nexus-pulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50%       { transform: scale(1.3); opacity: 0.12; }
    }

    .routing-core {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: rgba(25, 55, 120, 0.55);
      border: 1px solid rgba(80, 140, 220, 0.42);
      box-shadow: 0 0 14px rgba(80, 140, 220, 0.22);
    }

    /* ── AGENT NODES ─────────────────────────────────────────── */
    .agent-node {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; z-index: 10;
      transition: transform 0.25s ease, opacity 0.3s;
    }

    .agent-node:hover { transform: translate(-50%, -50%) scale(1.08); }

    .agent-ring {
      position: relative;
      width: 52px; height: 52px;
    }

    .agent-ring::before {
      content: "";
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--nring, transparent);
      opacity: 0;
    }

    .agent-node.is-active .agent-ring::before {
      animation: ring-expand 2.4s ease-out infinite;
    }

    @keyframes ring-expand {
      0%   { opacity: 0.55; transform: scale(1); }
      100% { opacity: 0;    transform: scale(1.65); }
    }

    .agent-core {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 12px; font-weight: 700;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s, background 0.4s, box-shadow 0.4s, color 0.4s;
    }

    .agent-core::after {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      left: -100%; width: 60%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      opacity: 0;
    }

    .agent-node.is-active .agent-core::after {
      opacity: 1;
      animation: core-scan 2.8s linear infinite;
    }

    @keyframes core-scan {
      from { left: -60%; }
      to   { left: 130%; }
    }

    .agent-node.is-active .agent-core {
      animation: core-breathe 3.2s ease-in-out infinite;
    }

    @keyframes core-breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.70; }
    }

    .agent-node[data-err="1"] .agent-core {
      animation: core-warn 1.8s ease-in-out infinite;
    }

    @keyframes core-warn {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .agent-lbl {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      pointer-events: none;
    }

    .agent-name {
      font-size: 12px; font-weight: 600;
      color: var(--text); opacity: 0.88;
      white-space: nowrap;
    }

    .agent-role-tag {
      font-family: var(--mono);
      font-size: 9px; letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .agent-activity-lbl {
      position: absolute;
      left: calc(100% + 16px);
      top: 50%; transform: translateY(-50%);
      font-size: 11px; font-style: italic;
      color: var(--muted);
      max-width: 190px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .agent-node.is-active .agent-activity-lbl { opacity: 0.72; }

    /* ── FLOW TOKENS (animated particles) ───────────────────── */
    .flow-tok {
      position: absolute;
      border-radius: 50%;
      pointer-events: none; z-index: 18;
      transform: translate(-50%, -50%);
    }

    .flow-tok::after {
      content: "";
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: inherit;
      filter: blur(3px);
      opacity: 0.4;
    }

    .flow-tok.is-clickable {
      pointer-events: all;
      cursor: pointer;
    }
    .flow-tok.is-clickable:hover { filter: brightness(1.5); }

    .tok-lbl {
      position: absolute;
      left: calc(100% + 5px);
      top: 50%; transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 8px; letter-spacing: 0.05em;
      color: rgba(200,230,255,0.42);
      white-space: nowrap;
      pointer-events: none;
      line-height: 1;
    }

    .scene-hint {
      font-family: var(--mono);
      font-size: 9px; letter-spacing: 0.08em;
      color: var(--muted);
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── INTAKE COLUMN ───────────────────────────────────────── */
    .intake-col {
      position: absolute;
      left: 4%;
      top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
      pointer-events: none; z-index: 8;
    }

    .intake-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(55, 115, 195, 0.45);
      border: 1px solid rgba(80, 140, 220, 0.32);
      box-shadow: 0 0 7px rgba(80, 140, 220, 0.22);
      animation: intake-breathe 2.2s ease-in-out infinite;
    }

    @keyframes intake-breathe {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1; }
    }

    /* ── RESULT STREAM ───────────────────────────────────────── */
    .result-stream {
      position: absolute;
      right: 3%;
      top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 7px; align-items: flex-end;
      max-height: 240px; overflow: hidden;
      pointer-events: none; z-index: 8;
    }

    .result-item {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.04em;
      color: var(--muted);
      opacity: 0;
      transform: translateX(14px);
      transition: opacity 0.5s, transform 0.5s;
      max-width: 140px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      text-align: right;
    }

    .result-item.is-on { opacity: 0.55; transform: translateX(0); }

    /* ── DETAIL OVERLAY ──────────────────────────────────────── */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(2, 6, 14, 0.72);
      z-index: 50;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(5px);
    }

    .detail-overlay.open { display: flex; }

    .detail-card {
      background: rgba(4, 12, 24, 0.97);
      border: 1px solid var(--border-glow);
      border-radius: 22px;
      padding: 26px;
      max-width: 460px; width: 90%;
      box-shadow: 0 40px 120px rgba(0,0,0,0.65);
      animation: card-pop 0.22s ease;
    }

    @keyframes card-pop {
      from { opacity: 0; transform: scale(0.94) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .dc-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }

    .dc-icon {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
    }

    .dc-meta { flex: 1; }
    .dc-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .dc-role { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .dc-close {
      background: none; border: none; color: var(--muted);
      font-size: 22px; line-height: 1; cursor: pointer; padding: 0;
      transition: color 0.18s;
    }
    .dc-close:hover { color: var(--text); }

    .dc-state-row { display: flex; gap: 8px; margin-bottom: 12px; }

    .dc-pill {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px; border-radius: 999px; border: 1px solid;
    }

    .dc-summary {
      font-size: 13px; line-height: 1.65;
      color: #b0cce8;
      margin-bottom: 18px;
    }

    .dc-timestamp {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); margin-bottom: 18px;
    }

    .dc-actions { display: flex; gap: 10px; }

    .dc-btn {
      padding: 8px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid; text-decoration: none;
      transition: background 0.18s;
      display: inline-flex; align-items: center;
    }

    .dc-btn.primary {
      background: rgba(45,195,145,0.14);
      border-color: rgba(45,195,145,0.38);
      color: var(--accent);
    }
    .dc-btn.primary:hover { background: rgba(45,195,145,0.24); }

    .dc-btn.ghost {
      background: none;
      border-color: var(--border);
      color: var(--muted);
    }
    .dc-btn.ghost:hover { color: var(--text); border-color: rgba(90,160,230,0.3); }

    /* ── LOADING VEIL ────────────────────────────────────────── */
    #loading-veil {
      position: fixed; inset: 0;
      background: var(--bg-deep);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.55s ease;
    }
    #loading-veil.gone { opacity: 0; pointer-events: none; }

    .spinner {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--dim);
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ──────────────────────────────────────────────── */
    .theater-foot {
      flex: 0 0 auto; height: 32px;
      display: flex; align-items: center;
      padding: 0 28px; gap: 16px;
      border-top: 1px solid var(--border);
      background: rgba(3, 8, 16, 0.65);
      z-index: 20;
    }

    .foot-status {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.05em;
    }

    .foot-nav { margin-left: auto; display: flex; gap: 18px; }

    .foot-nav a {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      transition: color 0.18s;
    }
    .foot-nav a:hover { color: var(--text); }

    /* ── EMPTY STATE ─────────────────────────────────────────── */
    .no-agents {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      pointer-events: none; z-index: 5;
    }
    .no-agents.show { display: flex; }
    .no-agents-text {
      font-family: var(--mono); font-size: 11px;
      color: var(--muted); letter-spacing: 0.10em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- background -->
<div class="bg-layer" aria-hidden="true"></div>
<div class="grid-layer" aria-hidden="true"></div>

<!-- loading veil -->
<div id="loading-veil"><div class="spinner"></div></div>

<!-- theater -->
<div class="theater">

  <!-- header bar -->
  <header class="theater-bar">
    <div class="brand" id="office-name-lbl">DEEPNOA AI OFFICE</div>
    <div class="brand-divider"></div>
    <div class="brand-sub">AI OPERATIONS THEATER</div>
    <div class="bar-right">
      <span class="foot-status" id="bar-agents" style="display:none"></span>
      <span class="live-pill"><span class="live-dot"></span><span id="live-lbl">LIVE</span></span>
      <button class="bar-btn" id="lang-btn" type="button">EN</button>
      <a class="bar-btn" href="/internal">↗ INTERNAL</a>
    </div>
  </header>

  <!-- main flow canvas -->
  <div class="flow-canvas" id="flow-canvas">

    <!-- ambient drift particles -->
    <div class="ambient-layer" id="ambient-layer"></div>

    <!-- SVG paths -->
    <svg class="flow-svg" id="flow-svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-sm">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-xs">
          <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="paths-bg"></g>
      <g id="paths-active"></g>
    </svg>

    <!-- stage labels -->
    <span class="stage-lbl" id="lbl-intake"  style="left:8%">INTAKE</span>
    <span class="stage-lbl" id="lbl-routing" style="left:26%">ROUTING</span>
    <span class="stage-lbl" id="lbl-agents"  style="left:50%">AGENTS</span>
    <span class="stage-lbl" id="lbl-runtime" style="left:74%">RUNTIME</span>
    <span class="stage-lbl" id="lbl-result"  style="left:92%">RESULT</span>

    <!-- vertical zone dividers -->
    <div class="zone-div" style="left:16%"></div>
    <div class="zone-div" style="left:36%"></div>
    <div class="zone-div" style="left:64%"></div>
    <div class="zone-div" style="left:84%"></div>

    <!-- routing nexus node -->
    <div class="routing-nexus" id="routing-nexus" style="left:26%;top:50%">
      <div class="routing-ring"><div class="routing-core"></div></div>
    </div>

    <!-- agent nodes (populated by JS) -->
    <div id="agent-nodes"></div>

    <!-- animated flow tokens (populated by JS) -->
    <div id="flow-tokens"></div>

    <!-- intake queue dots -->
    <div class="intake-col" id="intake-col"></div>

    <!-- recent completions -->
    <div class="result-stream" id="result-stream"></div>

    <!-- empty / error state -->
    <div class="no-agents" id="no-agents">
      <div class="spinner" style="border-top-color:var(--muted)"></div>
      <div class="no-agents-text" id="no-agents-lbl">connecting…</div>
    </div>

  </div>

  <!-- footer -->
  <footer class="theater-foot">
    <span class="foot-status" id="foot-status">—</span>
    <span class="scene-hint">Inspect in Scene ↗</span>
    <nav class="foot-nav">
      <a href="/runs">RUNS</a>
      <a href="/internal">INTERNAL</a>
      <a href="/scene">SCENE</a>
    </nav>
  </footer>

</div>

<!-- agent detail overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-card" id="detail-card"></div>
</div>

<script>
/* ================================================================
   CONSTANTS
================================================================ */
const LANG_KEY    = "deepnoa_theater_lang";
const POLL_ON     = 15000;
const POLL_HIDDEN = 45000;
const VER         = "{{VERSION_TIMESTAMP}}";

/* Horizontal stage positions as fraction of canvas width */
const SX = { intake: 0.08, routing: 0.26, agent: 0.50, runtime: 0.74, result: 0.92 };

/* Vertical positions for N agents (fraction of canvas height) */
const AGENT_Y = { 1:[0.50], 2:[0.36,0.64], 3:[0.28,0.50,0.72], 4:[0.24,0.42,0.60,0.78] };

/* Visual style tokens per state */
const ST = {
  idle:        { bg:"rgba(15,34,62,0.62)",  brd:"rgba(52,90,150,0.35)",  glow:"none",                           txt:"#3a5a82", tok:"#263c5a" },
  writing:     { bg:"rgba(14,72,50,0.70)",  brd:"rgba(48,185,135,0.52)", glow:"0 0 22px rgba(48,185,135,0.28)", txt:"#68e4b0", tok:"#24b078" },
  executing:   { bg:"rgba(14,72,50,0.70)",  brd:"rgba(48,185,135,0.52)", glow:"0 0 22px rgba(48,185,135,0.28)", txt:"#68e4b0", tok:"#24b078" },
  researching: { bg:"rgba(54,40,8,0.70)",   brd:"rgba(205,148,32,0.52)", glow:"0 0 22px rgba(205,148,32,0.22)", txt:"#d4b050", tok:"#b87e18" },
  syncing:     { bg:"rgba(10,46,86,0.70)",  brd:"rgba(65,150,220,0.52)", glow:"0 0 22px rgba(65,150,220,0.22)", txt:"#72bae6", tok:"#3480c2" },
  error:       { bg:"rgba(74,16,22,0.72)",  brd:"rgba(205,72,82,0.52)",  glow:"0 0 22px rgba(205,72,82,0.22)",  txt:"#e05a68", tok:"#c02838" },
  blocked:     { bg:"rgba(74,44,8,0.72)",   brd:"rgba(205,136,32,0.52)", glow:"0 0 22px rgba(205,136,32,0.22)", txt:"#d89828", tok:"#b87018" },
};

const ACTIVE = new Set(["writing","executing","researching","syncing"]);

/* i18n dictionaries */
const DICT = {
  ja: {
    live:"ライブ", close:"閉じる", view_runs:"実行履歴",
    no_agents:"エージェントなし", connecting:"接続中…",
    updated:"更新", s_ago:"{n}秒前", m_ago:"{n}分前",
    agents_online:"{n}エージェント",
    intake:"受付", routing:"ルーティング", agents:"エージェント",
    runtime:"実行中", result:"完了",
    idle:"待機中", writing:"作業中", executing:"実行中",
    researching:"調査中", syncing:"同期中",
    error:"エラー", blocked:"ブロック",
    dev:"開発", ops:"オペレーション", research:"リサーチ", reception:"受付",
  },
  en: {
    live:"LIVE", close:"close", view_runs:"run history",
    no_agents:"no agents", connecting:"connecting…",
    updated:"updated", s_ago:"{n}s ago", m_ago:"{n}m ago",
    agents_online:"{n} agents",
    intake:"INTAKE", routing:"ROUTING", agents:"AGENTS",
    runtime:"RUNTIME", result:"RESULT",
    idle:"idle", writing:"writing", executing:"executing",
    researching:"researching", syncing:"syncing",
    error:"error", blocked:"blocked",
    dev:"dev", ops:"ops", research:"research", reception:"reception",
  },
};

/* ================================================================
   APP STATE
================================================================ */
const app = {
  lang:"ja", agents:[], intake:[], activity:[], health:null,
  pollHandle:null, animHandle:null, inited:false,
  tokens:[], lastSpawn:0,
};

/* ================================================================
   I18N
================================================================ */
function t(k, fb) {
  const v = (DICT[app.lang] || DICT.ja)[k];
  return v !== undefined ? v : (fb || k);
}
function tf(k, vars, fb) {
  let s = t(k, fb);
  if (vars) for (const [k2,v] of Object.entries(vars)) s = s.replace("{"+k2+"}", v);
  return s;
}
function resolveLang() {
  const p = new URLSearchParams(location.search);
  if (p.has("lang")) return p.get("lang");
  const ls = localStorage.getItem(LANG_KEY);
  if (ls) return ls;
  return (navigator.language||"").startsWith("ja") ? "ja" : "en";
}

/* ================================================================
   UTILS
================================================================ */
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function initials(name) {
  const parts = String(name||"").split(/\s+/).filter(Boolean);
  return (parts.length>=2 ? parts[0][0]+parts[1][0] : String(name||"??").slice(0,2)).toUpperCase();
}
function norm(s)    { const k=String(s||"idle").toLowerCase(); return (k in ST)?k:"idle"; }
function isAct(s)   { return ACTIVE.has(norm(s)); }
function st(s)      { return ST[norm(s)]||ST.idle; }
function cvs()      { const c=document.getElementById("flow-canvas"); return {w:c.clientWidth,h:c.clientHeight}; }
function lerp(a,b,t){ return a+(b-a)*t; }

function timeAgo(iso) {
  if (!iso) return "";
  try {
    const secs = Math.round((Date.now()-new Date(iso).getTime())/1000);
    if (secs<0||secs>86400) return "";
    if (secs<60) return tf("s_ago",{n:secs});
    return tf("m_ago",{n:Math.floor(secs/60)});
  } catch { return ""; }
}

/* ================================================================
   AMBIENT PARTICLES
================================================================ */
function spawnAmbient() {
  const layer = document.getElementById("ambient-layer");
  const {w}   = cvs();
  layer.innerHTML = "";
  const n = Math.max(4, Math.floor(w/150));
  for (let i=0; i<n; i++) {
    const p = document.createElement("div");
    p.className = "amb-p";
    const sz = 1.2 + Math.random()*2;
    p.style.cssText = [
      `left:${(Math.random()*100).toFixed(1)}%`,
      `bottom:${(Math.random()*28).toFixed(1)}%`,
      `width:${sz.toFixed(1)}px`,`height:${sz.toFixed(1)}px`,
      `--op0:${(0.18+Math.random()*0.35).toFixed(2)}`,
      `--rx:${Math.random().toFixed(2)}`,`--dx:${Math.random().toFixed(2)}`,
      `animation-duration:${(4.5+Math.random()*7).toFixed(1)}s`,
      `animation-delay:${(-Math.random()*10).toFixed(1)}s`,
    ].join(";");
    layer.appendChild(p);
  }
}

/* ================================================================
   AGENT NODES
================================================================ */
function buildAgentNodes(agents) {
  const cont    = document.getElementById("agent-nodes");
  const {w,h}   = cvs();
  const total   = Math.min(agents.length,4);
  const ys      = AGENT_Y[total]||AGENT_Y[4];

  const keys = new Set(agents.map(a=>a.key));
  for (const el of [...cont.children]) { if (!keys.has(el.dataset.key)) el.remove(); }

  agents.slice(0,4).forEach((agent,i) => {
    const s   = st(agent.state);
    const act = isAct(agent.state);
    const err = ["error","blocked"].includes(norm(agent.state));
    const x   = Math.round(SX.agent*w);
    const y   = Math.round(ys[i]*h);

    let node = cont.querySelector(`[data-key="${agent.key}"]`);
    if (!node) {
      node = document.createElement("div");
      node.className = "agent-node";
      node.dataset.key = agent.key;
      node.innerHTML = `
        <div class="agent-ring">
          <div class="agent-core"></div>
        </div>
        <div class="agent-lbl">
          <div class="agent-name"></div>
          <div class="agent-role-tag"></div>
        </div>
        <div class="agent-activity-lbl"></div>
      `;
      node.addEventListener("click", () => openDetail(agent.key));
      cont.appendChild(node);
    }

    node.style.left = x+"px";
    node.style.top  = y+"px";
    node.classList.toggle("is-active", act);
    node.dataset.err = err?"1":"0";

    const core = node.querySelector(".agent-core");
    core.textContent = initials(agent.name);
    core.style.background  = s.bg;
    core.style.borderColor = s.brd;
    core.style.color       = s.txt;
    core.style.boxShadow   = s.glow;
    node.style.setProperty("--nring", s.brd);

    node.querySelector(".agent-name").textContent     = agent.name||agent.key;
    node.querySelector(".agent-role-tag").textContent = agent.key;
    node.querySelector(".agent-activity-lbl").textContent = agent.detail||t(norm(agent.state))||"";

    agent._x=x; agent._y=y;
  });
}

/* ================================================================
   SVG FLOW PATHS
================================================================ */
function buildPaths(agents) {
  const {w,h} = cvs();
  const bgG   = document.getElementById("paths-bg");
  const acG   = document.getElementById("paths-active");

  const iX  = Math.round(SX.intake  *w);
  const rX  = Math.round(SX.routing *w);
  const aX  = Math.round(SX.agent   *w);
  const rnX = Math.round(SX.runtime *w);
  const rsX = Math.round(SX.result  *w);
  const mY  = Math.round(h*0.5);

  let bg="", ac="";

  bg += `<line x1="${iX}" y1="${mY}" x2="${rX}" y2="${mY}" stroke="rgba(50,100,185,0.22)" stroke-width="1.2"/>`;
  bg += `<line x1="${rX}" y1="${mY}" x2="${rnX}" y2="${mY}" stroke="rgba(50,100,185,0.10)" stroke-width="1" stroke-dasharray="5 9"/>`;
  bg += `<line x1="${rnX}" y1="${mY}" x2="${rsX}" y2="${mY}" stroke="rgba(38,175,125,0.17)" stroke-width="1.2"/>`;

  agents.slice(0,4).forEach(agent => {
    const ay  = agent._y||mY;
    const act = isAct(agent.state);
    const s   = st(agent.state);
    const cx  = Math.round((rX+aX)/2);
    const cx2 = Math.round((aX+rnX)/2);
    const p1  = `M ${rX} ${mY} C ${cx} ${mY}, ${cx} ${ay}, ${aX} ${ay}`;
    const p2  = `M ${aX} ${ay} C ${cx2} ${ay}, ${cx2} ${mY}, ${rnX} ${mY}`;

    if (act) {
      ac += `<path d="${p1}" stroke="${s.tok}" stroke-width="1.6" fill="none" opacity="0.58" filter="url(#glow-xs)"/>`;
      ac += `<path d="${p2}" stroke="${s.tok}" stroke-width="1.6" fill="none" opacity="0.58" filter="url(#glow-xs)"/>`;
    } else {
      bg += `<path d="${p1}" stroke="rgba(48,86,158,0.18)" stroke-width="1" fill="none"/>`;
      bg += `<path d="${p2}" stroke="rgba(48,86,158,0.18)" stroke-width="1" fill="none"/>`;
    }
  });

  bgG.innerHTML=bg; acG.innerHTML=ac;
}

/* ================================================================
   INTAKE INDICATORS
================================================================ */
function buildIntake(intake) {
  const col = document.getElementById("intake-col");
  col.innerHTML = "";
  (intake||[]).slice(0,6).forEach((_,i) => {
    const d = document.createElement("div");
    d.className = "intake-dot";
    d.style.animationDelay = `${(-i*0.4).toFixed(1)}s`;
    col.appendChild(d);
  });
}

/* ================================================================
   RESULT STREAM
================================================================ */
function buildResult(activity) {
  const stream = document.getElementById("result-stream");
  stream.innerHTML = (activity||[]).slice(0,5).map(it =>
    `<div class="result-item">${esc(it.summary||it.agent||"—")}</div>`
  ).join("");
  stream.querySelectorAll(".result-item").forEach((el,i) => {
    setTimeout(() => el.classList.add("is-on"), i*140);
  });
}

/* ================================================================
   ANIMATED FLOW TOKENS
================================================================ */
const TOK_STATE_LBL = {
  writing:"reply", executing:"process", researching:"analyze", syncing:"route",
};

const TOK_SPEED_FACTOR = {
  dev: 1.16,       /* slightly faster */
  ops: 1.00,       /* stable baseline */
  research: 0.86,  /* slightly slower */
};

function spawnFlowTok(agent, taskId) {
  const {w,h} = cvs();
  const mY    = h*0.5;
  const ay    = agent._y||mY;
  const s     = st(agent.state);

  const pts = [
    {x:SX.intake *w, y:mY},
    {x:SX.routing*w, y:mY},
    {x:SX.agent  *w, y:ay},
    {x:SX.runtime*w, y:mY},
    {x:SX.result *w, y:mY},
  ];

  const el = document.createElement("div");
  el.className = "flow-tok";
  const sz = 5 + Math.random()*3.5;
  el.style.cssText = [
    `width:${sz.toFixed(1)}px`,`height:${sz.toFixed(1)}px`,
    `background:${s.tok}`,
    `box-shadow:0 0 8px 1px ${s.tok}88`,
  ].join(";");

  const lbl = TOK_STATE_LBL[norm(agent.state)] || "";
  if (lbl) {
    const lblEl = document.createElement("span");
    lblEl.className = "tok-lbl";
    lblEl.textContent = lbl;
    el.appendChild(lblEl);
  }

  if (taskId) {
    el.classList.add("is-clickable");
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      window.location.href = "/scene?task=" + encodeURIComponent(taskId);
    });
  }

  document.getElementById("flow-tokens").appendChild(el);
  const roleFactor = TOK_SPEED_FACTOR[String(agent.key || "").toLowerCase()] || 1;
  const baseSpeed = 0.0011 + Math.random()*0.0012;
  app.tokens.push({ el, pts, phase:0, speed:baseSpeed * roleFactor, alive:true });
}

function tickTokens() {
  for (let i=app.tokens.length-1; i>=0; i--) {
    const tk = app.tokens[i];
    if (!tk.alive) { tk.el.remove(); app.tokens.splice(i,1); continue; }
    tk.phase += tk.speed;
    if (tk.phase>=1) { tk.alive=false; continue; }

    const n   = tk.pts.length-1;
    const seg = Math.min(Math.floor(tk.phase*n), n-1);
    const frac= tk.phase*n - seg;
    const p0  = tk.pts[seg], p1 = tk.pts[seg+1];

    tk.el.style.left = lerp(p0.x,p1.x,frac)+"px";
    tk.el.style.top  = lerp(p0.y,p1.y,frac)+"px";

    const a = tk.phase<0.08 ? tk.phase/0.08 : tk.phase>0.88 ? (1-tk.phase)/0.12 : 1;
    tk.el.style.opacity = (Math.min(1,a)*0.82).toFixed(2);
  }
}

function maybeSpawn() {
  const now = Date.now();
  if (now-app.lastSpawn < 2600) return;
  app.lastSpawn = now;
  const active = app.agents.filter(a=>isAct(a.state));
  if (active.length) {
    active.forEach(a=>{ if (Math.random()<0.62) spawnFlowTok(a, a.task_id||null); });
  } else if (app.agents.length && Math.random()<0.28) {
    spawnFlowTok({...app.agents[Math.floor(Math.random()*app.agents.length)], state:"idle"}, null);
  }
}

function animLoop() {
  tickTokens();
  maybeSpawn();
  app.animHandle = requestAnimationFrame(animLoop);
}

/* ================================================================
   DETAIL OVERLAY
================================================================ */
function openDetail(agentKey) {
  const agent = app.agents.find(a=>a.key===agentKey);
  if (!agent) return;
  const s = st(agent.state);
  const handlingTask = agent.task_id
    ? `<div class="dc-timestamp">Currently handling: ${esc(agent.task_id)}</div>`
    : "";
  const sceneHref = agent.task_id
    ? `<a class="dc-btn primary" href="/scene?task=${encodeURIComponent(agent.task_id)}">↗ scene</a>`
    : "";
  document.getElementById("detail-card").innerHTML = `
    <div class="dc-head">
      <div class="dc-icon" style="background:${s.bg};border:1.5px solid ${s.brd};color:${s.txt}">
        ${esc(initials(agent.name))}
      </div>
      <div class="dc-meta">
        <div class="dc-name">${esc(agent.name)}</div>
        <div class="dc-role">${esc(agent.key)}</div>
      </div>
      <button class="dc-close" id="dc-x">×</button>
    </div>
    <div class="dc-state-row">
      <span class="dc-pill" style="color:${s.txt};border-color:${s.brd}88">
        ${esc(t(norm(agent.state))||agent.state)}
      </span>
    </div>
    ${handlingTask}
    ${agent.detail ? `<div class="dc-summary">${esc(agent.detail)}</div>` : ""}
    <div class="dc-actions">
      ${sceneHref}
      <button class="dc-btn ghost" id="dc-x2">${esc(t("close","close"))}</button>
    </div>
  `;
  document.getElementById("detail-overlay").classList.add("open");
  document.getElementById("dc-x").onclick  = closeDetail;
  document.getElementById("dc-x2").onclick = closeDetail;
}

function closeDetail() { document.getElementById("detail-overlay").classList.remove("open"); }

document.getElementById("detail-overlay").addEventListener("click", e => {
  if (e.target===e.currentTarget) closeDetail();
});

/* ================================================================
   STATUS
================================================================ */
function updateStatus() {
  const since = app.health ? timeAgo(app.health.latest_update) : "";
  document.getElementById("foot-status").textContent =
    since ? (t("updated")+" "+since) : "—";
  const bar = document.getElementById("bar-agents");
  if (app.agents.length) {
    bar.textContent = tf("agents_online",{n:app.agents.length});
    bar.style.display="";
  } else {
    bar.style.display="none";
  }
}

/* ================================================================
   RENDER
================================================================ */
function render(ps) {
  const agents = (ps.agents||[]).filter(a=>a.key!=="reception").slice(0,4);
  app.agents   = agents;
  app.intake   = ps.intake  ||[];
  app.activity = ps.activity||[];
  app.health   = ps.health  ||null;

  buildAgentNodes(agents);
  buildPaths(agents);
  buildIntake(app.intake);
  buildResult(app.activity);
  updateStatus();

  ["intake","routing","agents","runtime","result"].forEach(k => {
    const el = document.getElementById("lbl-"+k);
    if (el) el.textContent = t(k, k.toUpperCase());
  });

  document.getElementById("no-agents").classList.toggle("show", agents.length===0);
}

/* ================================================================
   FETCH
================================================================ */
async function fetchJson(url) {
  const r = await fetch(url,{cache:"no-store"});
  if (!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

async function refresh() {
  try {
    const ps = await fetchJson(`/api/public/state?v=${VER}`);
    render(ps);
    if (!app.inited) {
      app.inited = true;
      document.getElementById("loading-veil").classList.add("gone");
      spawnAmbient();
      animLoop();
    }
  } catch(err) {
    console.error("refresh:", err);
    document.getElementById("foot-status").textContent = "connection error";
    if (!app.inited) {
      document.getElementById("no-agents").classList.add("show");
      document.getElementById("no-agents-lbl").textContent = "connection error";
    }
  }
}

/* ================================================================
   POLLING
================================================================ */
function startPoll(ms) {
  if (app.pollHandle) clearInterval(app.pollHandle);
  app.pollHandle = setInterval(refresh, ms);
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    startPoll(POLL_HIDDEN);
    if (app.animHandle) { cancelAnimationFrame(app.animHandle); app.animHandle=null; }
  } else {
    refresh();
    startPoll(POLL_ON);
    if (!app.animHandle) animLoop();
  }
});

/* ================================================================
   LANG TOGGLE
================================================================ */
document.getElementById("lang-btn").addEventListener("click", () => {
  app.lang = app.lang==="ja" ? "en" : "ja";
  localStorage.setItem(LANG_KEY, app.lang);
  document.getElementById("lang-btn").textContent = app.lang==="ja" ? "EN" : "JA";
  document.getElementById("live-lbl").textContent = t("live");
  if (app.agents.length) render({
    agents:app.agents, intake:app.intake,
    activity:app.activity, health:app.health,
  });
});

/* ================================================================
   RESIZE
================================================================ */
let rszTimer;
window.addEventListener("resize", () => {
  clearTimeout(rszTimer);
  rszTimer = setTimeout(() => {
    if (app.agents.length) { buildAgentNodes(app.agents); buildPaths(app.agents); }
    spawnAmbient();
  }, 200);
});

/* ================================================================
   INIT
================================================================ */
app.lang = resolveLang();
localStorage.setItem(LANG_KEY, app.lang);
document.getElementById("lang-btn").textContent = app.lang==="ja" ? "EN" : "JA";
document.getElementById("live-lbl").textContent = t("live");
document.getElementById("no-agents-lbl").textContent = t("connecting","connecting…");
refresh();
startPoll(POLL_ON);
</script>
